// SLAB INVENTORY — Track PSA slabs you own (purchased or returned from grading)
// ============================================================================
function SlabInventory({ data }) {
  const { slabs, addSlab, updateSlab, deleteSlab } = data;
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ player: '', year: '2025', set: 'Prizm', card: '', parallel: '', grade: '10', source: 'purchased', buyDate: today(), costBasis: '', comp: '', sellChannel: 'eBay', sellPrice: '', sellDate: '', status: 'holding', notes: '', rookie: true, grader: 'PSA', excludeCost: false, seller: '' });
  const [sortCol, setSortCol] = useState(0);
  const [sortDir, setSortDir] = useState('desc');

  const startEdit = (slab) => {
    setForm({
      player: slab.player, year: slab.year || '2025', set: slab.set || 'Prizm', card: slab.card,
      parallel: slab.parallel || '', grade: String(slab.grade || 10), source: slab.source || 'purchased',
      buyDate: slab.buyDate || '', costBasis: String(slab.costBasis || ''), comp: String(slab.comp || ''),
      sellChannel: slab.sellChannel || 'eBay', sellPrice: String(slab.sellPrice || ''), sellDate: slab.sellDate || '',
      status: slab.status || 'holding', notes: slab.notes || '', rookie: slab.rookie !== false, grader: slab.grader || 'PSA', seller: slab.seller || '', excludeCost: slab.excludeCost || false
    });
    setEditId(slab.id);
    setShowForm(true);
  };

  const handleSubmit = () => {
    if (!form.player || !form.card) return;
    const slab = {
      player: form.player, year: form.year, set: form.set, card: form.card,
      parallel: form.parallel, grade: parseInt(form.grade) || 10,
      source: form.source, buyDate: form.buyDate, costBasis: parseFloat(form.costBasis) || 0,
      comp: parseFloat(form.comp) || 0, sellChannel: form.sellChannel,
      sellPrice: form.sellPrice ? parseFloat(form.sellPrice) : null,
      sellDate: form.sellDate || null, status: form.status, notes: form.notes, rookie: form.rookie, grader: form.grader, excludeCost: form.excludeCost, seller: form.seller || ''
    };
    if (editId) {
      updateSlab(editId, slab);
      setEditId(null);
    } else {
      addSlab(slab);
    }
    setShowForm(false);
    setForm({ player: '', year: '2025', set: 'Prizm', card: '', parallel: '', grade: '10', source: 'purchased', buyDate: today(), costBasis: '', comp: '', sellChannel: 'eBay', sellPrice: '', sellDate: '', status: 'holding', notes: '', rookie: true, grader: 'PSA', excludeCost: false });
  };

  // Stats — inventory source cards don't count toward NEW cost (already in B/S)
  const holding = slabs.filter(s => s.status === 'holding');
  const listed = slabs.filter(s => s.status === 'listed');
  const sold = slabs.filter(s => s.status === 'sold');
  const fromPSA = slabs.filter(s => s.source === 'psa_return');
  const purchased = slabs.filter(s => s.source === 'purchased');
  const fromInventory = slabs.filter(s => s.source === 'inventory');
  
  // Total cost = all slabs (for reference)
  const totalCost = slabs.reduce((s, x) => s + (x.costBasis || 0), 0);
  // New $ out = only purchased + PSA return (inventory is already counted in B/S)
  const newCostOut = slabs.filter(s => !s.excludeCost && s.source !== 'inventory').reduce((s, x) => s + (x.costBasis || 0), 0);
  const inventoryCost = fromInventory.reduce((s, x) => s + (x.costBasis || 0), 0);
  
  const totalComp = [...holding, ...listed].reduce((s, x) => s + (x.comp || 0), 0);
  
  // Sale P&L — calculate fees based on sell channel
  const calcSlabFees = (slab) => {
    if (!slab.sellPrice) return 0;
    const p = slab.sellPrice;
    if (slab.sellChannel === 'eBay') return p * 0.1325 + 0.30;
    if (slab.sellChannel === 'Whatnot') return Math.min(p * 0.08, 1500) + p * 0.029 + 0.30;
    if (slab.sellChannel === 'COMC') return p * 0.10;
    return 0; // Card Show, Hold, Other = no platform fees
  };
  
  const totalSoldGross = sold.reduce((s, x) => s + (x.sellPrice || 0), 0);
  const totalSoldFees = sold.reduce((s, x) => s + calcSlabFees(x), 0);
  const totalSoldNet = totalSoldGross - totalSoldFees;
  const totalSoldCost = sold.reduce((s, x) => s + (x.costBasis || 0), 0);
  // For sold inventory-source cards, the "profit" is just the net sale (cost already in B/S)
  const soldNewCost = sold.filter(s => !s.excludeCost && s.source !== 'inventory').reduce((s, x) => s + (x.costBasis || 0), 0);
  const soldInvCost = sold.filter(s => s.source === 'inventory').reduce((s, x) => s + (x.costBasis || 0), 0);
  
  const realizedPL = totalSoldNet - soldNewCost; // inventory cost excluded since it's in B/S
  const unrealizedPL = totalComp - [...holding, ...listed].filter(s => !s.excludeCost && s.source !== 'inventory').reduce((s, x) => s + (x.costBasis || 0), 0);

  const cols = [
    { header: 'Player', accessor: s => s.player, type: 'string' },
    { header: 'RC', accessor: s => s.rookie !== false ? 1 : 0, type: 'number', render: v => v ? '🟢 RC' : '—' },
    { header: 'Card', accessor: s => `${s.set} ${s.card}`, type: 'string' },
    { header: 'Parallel', accessor: s => s.parallel || '', type: 'string' },
    { header: 'Grade', accessor: s => s.grade, type: 'number', render: (v, row) => `${row?.grader || 'PSA'} ${v}` },
    { header: 'Source', accessor: s => s.source === 'psa_return' ? 'PSA Return' : s.source === 'purchased' ? 'Purchased' : s.source === 'inventory' ? 'Inventory' : s.source, type: 'string' },
    { header: 'Seller', accessor: s => s.seller || '', type: 'string', render: v => v || '—' },
    { header: 'Cost', accessor: s => s.costBasis || 0, type: 'number', render: (v, row) => {
      const excl = row?.excludeCost === true || row?.source === 'inventory';
      return <span style={{ textDecoration: excl ? 'line-through' : 'none', opacity: excl ? 0.5 : 1 }}>{fmt(v)}</span>;
    }, color: C.orangeLight },
    { header: 'In P&L', accessor: s => s.excludeCost ? 0 : 1, type: 'number', render: (v, row) => {
      const excl = row?.excludeCost === true;
      return (
        <div onClick={(e) => { e.stopPropagation(); updateSlab(row.id, { excludeCost: !row.excludeCost }); }}
          style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${excl ? C.slateDim : C.neon}`, background: excl ? 'transparent' : C.neon, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.bg, fontWeight: 700, fontSize: 12 }}>
            {excl ? '' : '✓'}
          </div>
          <span style={{ fontSize: 10, color: excl ? C.slateDim : C.neon }}>{excl ? 'No' : 'Yes'}</span>
        </div>
      );
    } },
    { header: 'Comp', accessor: s => s.comp || 0, type: 'number', render: v => fmt(v), color: C.cyanLight },
    { header: 'P&L', accessor: s => {
      const fees = s.sellPrice ? (s.sellChannel === 'eBay' ? s.sellPrice * 0.1325 + 0.30 : s.sellChannel === 'Whatnot' ? Math.min(s.sellPrice * 0.08, 1500) + s.sellPrice * 0.029 + 0.30 : s.sellChannel === 'COMC' ? s.sellPrice * 0.10 : 0) : 0;
      const revenue = s.status === 'sold' ? (s.sellPrice || 0) - fees : (s.comp || 0);
      const cost = s.excludeCost || s.source === 'inventory' ? 0 : (s.costBasis || 0);
      return revenue - cost;
    }, type: 'number', render: (v, row) => {
      const isExcluded = row?.excludeCost === true || row?.source === 'inventory';
      return <span title={isExcluded ? 'Cost excluded (inventory source)' : ''}>{fmt(v)}{isExcluded ? ' *' : ''}</span>;
    }, color: v => v >= 0 ? C.greenLight : C.orangeLight },
    { header: 'Sell Via', accessor: s => s.sellChannel, type: 'string' },
    { header: 'Status', accessor: s => s.status, type: 'string', render: v => v === 'holding' ? '📦 Holding' : v === 'listed' ? '🏷 Listed' : v === 'sold' ? '✅ Sold' : v },
    { header: 'Date', accessor: s => s.buyDate || '', type: 'string' },
  ];

  const sorted = [...slabs].sort((a, b) => {
    const col = cols[sortCol];
    const va = col.accessor(a), vb = col.accessor(b);
    const cmp = col.type === 'string' ? String(va).localeCompare(String(vb)) : va - vb;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  return (
    <>
      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
        <KPI icon={Award} label="Total Slabs" value={slabs.length} sub={`${holding.length} holding · ${listed.length} listed · ${sold.length} sold`} color={C.cyan} />
        <KPI icon={DollarSign} label="New $ Out" value={fmtShort(newCostOut)} sub={`${purchased.length} bought · ${fromPSA.length} PSA · ${fromInventory.length} inv (${fmt(inventoryCost)} not counted)`} color={C.orange} />
        <KPI icon={TrendingUp} label="Comp Value (Holding)" value={fmtShort(totalComp)} sub={`Unrealized: ${fmt(unrealizedPL)}`} color={C.green} trend={unrealizedPL >= 0 ? 'up' : 'down'} />
        <KPI icon={DollarSign} label="Realized P&L" value={fmt(realizedPL)} sub={`Gross: ${fmt(totalSoldGross)} · Fees: ${fmt(totalSoldFees)} · Net: ${fmt(totalSoldNet)}`} color={realizedPL >= 0 ? C.green : C.orange} trend={realizedPL >= 0 ? 'up' : 'down'} />
      </div>

      {/* Add/Edit button */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: 0 }}>Slab Inventory</h2>
        <button onClick={() => { setEditId(null); setForm({ player: '', year: '2025', set: 'Prizm', card: '', parallel: '', grade: '10', source: 'purchased', buyDate: today(), costBasis: '', comp: '', sellChannel: 'eBay', sellPrice: '', sellDate: '', status: 'holding', notes: '', rookie: true, grader: 'PSA', excludeCost: false }); setShowForm(!showForm); }}
          style={btnStyle(showForm ? C.orange : C.cyan)}>
          {showForm ? <><X size={14} /> Close</> : <><PlusCircle size={14} /> Add Slab</>}
        </button>
      </div>

      {/* Form */}
      {showForm && (
        <div style={{ background: C.navyLight, borderRadius: 12, padding: 20, marginBottom: 16, border: `1px solid ${editId ? C.blueLight : C.cyan}55` }}>
          {editId && <div style={{ color: C.blueLight, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>✎ Editing slab</div>}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: 12, alignItems: 'end' }}>
            <FormField label="Player"><input type="text" value={form.player} onChange={e => setForm({...form, player: e.target.value})} style={inputStyle} placeholder="e.g. Jaxson Dart" /></FormField>
            <FormField label="Year"><input type="text" value={form.year} onChange={e => setForm({...form, year: e.target.value})} style={inputStyle} /></FormField>
            <FormField label="Set"><input type="text" value={form.set} onChange={e => setForm({...form, set: e.target.value})} style={inputStyle} placeholder="Prizm" /></FormField>
            <FormField label="Card"><input type="text" value={form.card} onChange={e => setForm({...form, card: e.target.value})} style={inputStyle} placeholder="Silver, Red Wave, etc" /></FormField>
            <FormField label="Parallel"><input type="text" value={form.parallel} onChange={e => setForm({...form, parallel: e.target.value})} style={inputStyle} placeholder="/149, Silver Auto" /></FormField>
            <FormField label="Grading Co"><select value={form.grader} onChange={e => setForm({...form, grader: e.target.value})} style={selectStyle}>
              {['PSA','SGC','Beckett','CGC'].map(g => <option key={g} value={g}>{g}</option>)}
            </select></FormField>
            <FormField label="Grade"><select value={form.grade} onChange={e => setForm({...form, grade: e.target.value})} style={selectStyle}>
              {[10,9.5,9,8.5,8,7.5,7,6,5,'Auth'].map(g => <option key={g} value={g}>{g}</option>)}
            </select></FormField>
            <FormField label="Source"><select value={form.source} onChange={e => setForm({...form, source: e.target.value})} style={selectStyle}>
              <option value="purchased">Purchased (eBay/Whatnot)</option>
              <option value="psa_return">PSA Return (my sub)</option>
              <option value="inventory">From Inventory (already in B/S)</option>
              <option value="trade">Trade</option>
            </select></FormField>
            <FormField label="Buy/Return Date"><input type="date" value={form.buyDate} onChange={e => setForm({...form, buyDate: e.target.value})} style={inputStyle} /></FormField>
            <FormField label="Seller / From"><input type="text" value={form.seller} onChange={e => setForm({...form, seller: e.target.value})} style={inputStyle} placeholder="e.g. eBay seller, show" /></FormField>
            <FormField label="Cost Basis $"><input type="number" step="0.01" value={form.costBasis} onChange={e => setForm({...form, costBasis: e.target.value})} style={inputStyle} placeholder="Total cost" /></FormField>
            <FormField label="Comp/Target $"><input type="number" step="0.01" value={form.comp} onChange={e => setForm({...form, comp: e.target.value})} style={inputStyle} placeholder="Market value" /></FormField>
            <FormField label="Sell Channel"><select value={form.sellChannel} onChange={e => setForm({...form, sellChannel: e.target.value})} style={selectStyle}>
              {['eBay','Whatnot','Card Show','COMC','Hold','Other'].map(c => <option key={c} value={c}>{c}</option>)}
            </select></FormField>
            <FormField label="Status"><select value={form.status} onChange={e => setForm({...form, status: e.target.value})} style={selectStyle}>
              <option value="holding">Holding</option>
              <option value="listed">Listed</option>
              <option value="sold">Sold</option>
            </select></FormField>
            {(form.status === 'sold' || form.status === 'listed') && (
              <>
                <FormField label="Sell Price $"><input type="number" step="0.01" value={form.sellPrice} onChange={e => setForm({...form, sellPrice: e.target.value})} style={inputStyle} placeholder={form.status === 'listed' ? 'Listed at' : 'Sold for'} /></FormField>
                {form.status === 'sold' && (
                  <FormField label="Sell Date"><input type="date" value={form.sellDate} onChange={e => setForm({...form, sellDate: e.target.value})} style={inputStyle} /></FormField>
                )}
                {form.sellPrice && parseFloat(form.sellPrice) > 0 && (
                  <FormField label="Est. Fees">
                    <div style={{ padding: '10px 12px', background: C.navy, borderRadius: 8, color: C.orangeLight, fontSize: 13 }}>
                      {form.sellChannel === 'eBay' ? fmt(parseFloat(form.sellPrice) * 0.1325 + 0.30) + ' (13.25%)' :
                       form.sellChannel === 'Whatnot' ? fmt(Math.min(parseFloat(form.sellPrice) * 0.08, 1500) + parseFloat(form.sellPrice) * 0.029 + 0.30) + ' (10.9%)' :
                       form.sellChannel === 'COMC' ? fmt(parseFloat(form.sellPrice) * 0.10) + ' (10%)' :
                       '$0 (no platform fees)'}
                    </div>
                  </FormField>
                )}
              </>
            )}
            <FormField label="Notes"><input type="text" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} style={inputStyle} placeholder="Optional" /></FormField>
            <FormField label="Rookie">
              <div onClick={() => setForm({...form, rookie: !form.rookie})} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', padding: '10px 12px', background: form.rookie ? `${C.cyan}22` : C.navy, border: `1px solid ${form.rookie ? C.cyan : C.navyMid}`, borderRadius: 8 }}>
                <div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${form.rookie ? C.cyan : C.slateDim}`, background: form.rookie ? C.cyan : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.bg, fontWeight: 700, fontSize: 14 }}>{form.rookie ? '✓' : ''}</div>
                <span style={{ color: form.rookie ? C.cyan : C.slateDim, fontSize: 13, fontWeight: 600 }}>RC</span>
              </div>
            </FormField>
            <div><button onClick={handleSubmit} style={btnStyle()}><PlusCircle size={14} /> {editId ? 'Save' : 'Add Slab'}</button></div>
          </div>
        </div>
      )}

      {/* Table */}
      {slabs.length === 0 ? (
        <div style={{ padding: 40, textAlign: 'center', color: C.slateDim, background: C.navyLight, borderRadius: 12, border: `1px dashed ${C.navyMid}` }}>
          No slabs tracked yet. Add slabs you've purchased graded or that come back from your PSA submissions.
        </div>
      ) : (
        <div style={{ overflowX: 'auto', borderRadius: 8, border: `1px solid ${C.navyMid}` }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 900 }}>
            <thead>
              <tr>{cols.map((col, i) => (
                <th key={i} onClick={() => { if (sortCol === i) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(i); setSortDir('desc'); }}}
                  style={{ padding: '8px 10px', textAlign: 'left', color: C.cyan, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `2px solid ${C.cyan}33`, whiteSpace: 'nowrap', cursor: 'pointer', background: C.navyLight }}>
                  {col.header} {sortCol === i ? (sortDir === 'desc' ? '▼' : '▲') : ''}
                </th>

              <th style={{ padding: '8px', background: C.navyLight, borderBottom: `2px solid ${C.cyan}33`, width: 60 }} />
              </tr>
            </thead>
            <tbody>
              {sorted.map(slab => (
                <tr key={slab.id} style={{ borderBottom: `1px solid ${C.navyMid}`, background: slab.status === 'sold' ? `${C.green}08` : slab.status === 'listed' ? `${C.cyan}08` : 'transparent' }}>
                  {cols.map((col, j) => {
                    const val = col.accessor(slab);
                    const colorFn = typeof col.color === 'function' ? col.color(val) : col.color;
                    return (
                      <td key={j} style={{ padding: '8px 10px', color: colorFn || (j === 0 ? C.white : C.slate), fontWeight: j === 0 ? 600 : 400, whiteSpace: 'nowrap' }}>
                        {col.render ? col.render(val, slab) : val}
                      </td>
                    );
                  })}
                  <td style={{ padding: '4px 8px', display: 'flex', gap: 4 }}>
                    <button onClick={() => startEdit(slab)} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer' }}><Edit3 size={13} /></button>
                    <button onClick={() => deleteSlab(slab.id)} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer' }}><X size={13} /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* SALES TRACKING SECTION */}
      {sold.length > 0 && (
        <>
          <div style={{ marginTop: 28, marginBottom: 16, paddingTop: 20, borderTop: `2px solid ${C.purpleLight}33` }}>
            <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: '0 0 16px 0' }}>Slab Sales History</h2>
          </div>

          {/* Sales KPIs */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
            <KPI icon={DollarSign} label="Slabs Sold" value={sold.length} color={C.purpleLight} />
            <KPI icon={TrendingUp} label="Gross Revenue" value={fmt(totalSoldGross)} color={C.green} />
            <KPI icon={CreditCard} label="Total Fees" value={fmt(totalSoldFees)} sub={`Avg ${totalSoldGross > 0 ? (totalSoldFees / totalSoldGross * 100).toFixed(1) : 0}%`} color={C.orange} />
            <KPI icon={DollarSign} label="Net Revenue" value={fmt(totalSoldNet)} color={C.greenLight} />
            <KPI icon={realizedPL >= 0 ? TrendingUp : TrendingDown} label="Realized Profit" value={fmt(realizedPL)} 
              sub={`ROI: ${soldNewCost > 0 ? (realizedPL / soldNewCost * 100).toFixed(0) : '∞'}%`}
              color={realizedPL >= 0 ? C.green : C.orange} trend={realizedPL >= 0 ? 'up' : 'down'} />
            <KPI icon={DollarSign} label="Avg Net/Slab" value={sold.length > 0 ? fmt(totalSoldNet / sold.length) : '$0'} color={C.cyan} />
          </div>

          {/* Sales by Channel + Profit per slab charts */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: 16, marginBottom: 16 }}>
            {(() => {
              const byChannel = {};
              sold.forEach(s => {
                const ch = s.sellChannel || 'Other';
                if (!byChannel[ch]) byChannel[ch] = { name: ch, gross: 0, fees: 0, net: 0, count: 0 };
                const fees = calcSlabFees(s);
                byChannel[ch].gross += (s.sellPrice || 0);
                byChannel[ch].fees += fees;
                byChannel[ch].net += (s.sellPrice || 0) - fees;
                byChannel[ch].count += 1;
              });
              return (
                <ChartCard title="Sales by Channel" height={240}>
                  <ResponsiveContainer>
                    <BarChart data={Object.values(byChannel).sort((a, b) => b.gross - a.gross)} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                      <XAxis type="number" tick={{ fill: C.slateDim, fontSize: 11 }} tickFormatter={fmtShort} />
                      <YAxis type="category" dataKey="name" tick={{ fill: C.slateDim, fontSize: 11 }} width={80} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="gross" name="Gross" fill={C.green} radius={[0,4,4,0]} />
                      <Bar dataKey="net" name="Net" fill={C.greenLight} radius={[0,4,4,0]} />
                      <Bar dataKey="fees" name="Fees" fill={C.orange} radius={[0,4,4,0]} />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>
              );
            })()}

            {(() => {
              const salesData = [...sold].sort((a, b) => (a.sellDate || a.buyDate || '').localeCompare(b.sellDate || b.buyDate || '')).map(s => {
                const fees = calcSlabFees(s);
                const net = (s.sellPrice || 0) - fees;
                const cost = s.excludeCost || s.source === 'inventory' ? 0 : (s.costBasis || 0);
                return { name: `${s.player.split(' ').pop()} ${(s.card || '').split(' ')[0]}`, gross: s.sellPrice || 0, fees, net, cost, profit: net - cost };
              });
              return (
                <ChartCard title="Profit per Slab Sold" height={240}>
                  <ResponsiveContainer>
                    <BarChart data={salesData}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                      <XAxis dataKey="name" tick={{ fill: C.slateDim, fontSize: 9 }} />
                      <YAxis tick={{ fill: C.slateDim, fontSize: 11 }} tickFormatter={fmtShort} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="profit" name="Profit" radius={[2,2,0,0]}>
                        {salesData.map((s, i) => <Cell key={i} fill={s.profit >= 0 ? C.green : C.orange} />)}
                      </Bar>
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>
              );
            })()}
          </div>

          {/* Detailed sales table */}
          <div style={{ background: C.navyLight, borderRadius: 12, border: `1px solid ${C.purpleLight}33`, padding: 16, overflowX: 'auto' }}>
            <div style={{ color: C.purpleLight, fontSize: 13, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12, fontFamily: "'Oswald', sans-serif" }}>Sale Details</div>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 800 }}>
              <thead>
                <tr>{['Player','Card','Grade','Source','Cost','Channel','Gross','Fees','Net','Profit','Date'].map((h, i) => (
                  <th key={i} style={{ padding: '8px 10px', textAlign: 'left', color: C.purpleLight, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.purpleLight}33`, whiteSpace: 'nowrap' }}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {[...sold].sort((a, b) => (b.sellDate || b.buyDate || '').localeCompare(a.sellDate || a.buyDate || '')).map((s, i) => {
                  const fees = calcSlabFees(s);
                  const net = (s.sellPrice || 0) - fees;
                  const cost = s.excludeCost || s.source === 'inventory' ? 0 : (s.costBasis || 0);
                  const profit = net - cost;
                  return (
                    <tr key={i} style={{ borderBottom: `1px solid ${C.navyMid}` }}>
                      <td style={{ padding: '8px 10px', color: C.white, fontWeight: 600 }}>{s.player}</td>
                      <td style={{ padding: '8px 10px', color: C.slate }}>{s.set} {s.card} {s.parallel}</td>
                      <td style={{ padding: '8px 10px', color: C.cyan }}>{s.grader || 'PSA'} {s.grade}</td>
                      <td style={{ padding: '8px 10px', color: s.source === 'inventory' ? C.purpleLight : C.slate }}>
                        {s.source === 'inventory' ? 'Inv *' : s.source === 'psa_return' ? 'PSA Return' : s.source === 'purchased' ? 'Bought' : s.source}
                      </td>
                      <td style={{ padding: '8px 10px', color: s.source === 'inventory' ? C.slateDim : C.orangeLight }}>
                        {s.source === 'inventory' ? `(${fmt(s.costBasis)})` : fmt(s.costBasis)}
                      </td>
                      <td style={{ padding: '8px 10px', color: C.slate }}>{s.sellChannel}</td>
                      <td style={{ padding: '8px 10px', color: C.green }}>{fmt(s.sellPrice)}</td>
                      <td style={{ padding: '8px 10px', color: C.orangeLight }}>{fmt(fees)}</td>
                      <td style={{ padding: '8px 10px', color: C.greenLight }}>{fmt(net)}</td>
                      <td style={{ padding: '8px 10px', color: profit >= 0 ? C.greenLight : C.orangeLight, fontWeight: 600 }}>{fmt(profit)}</td>
                      <td style={{ padding: '8px 10px', color: C.slateDim }}>{s.sellDate || '—'}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{ borderTop: `2px solid ${C.purpleLight}33` }}>
                  <td colSpan={4} style={{ padding: '10px', color: C.purpleLight, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>TOTALS</td>
                  <td style={{ padding: '10px', color: C.orangeLight, fontWeight: 700 }}>{fmt(soldNewCost)}</td>
                  <td />
                  <td style={{ padding: '10px', color: C.green, fontWeight: 700 }}>{fmt(totalSoldGross)}</td>
                  <td style={{ padding: '10px', color: C.orangeLight, fontWeight: 700 }}>{fmt(totalSoldFees)}</td>
                  <td style={{ padding: '10px', color: C.greenLight, fontWeight: 700 }}>{fmt(totalSoldNet)}</td>
                  <td style={{ padding: '10px', color: realizedPL >= 0 ? C.greenLight : C.orangeLight, fontWeight: 700 }}>{fmt(realizedPL)}</td>
                  <td />
                </tr>
              </tfoot>
            </table>
            <div style={{ fontSize: 10, color: C.slateDim, marginTop: 8 }}>* Inventory source — cost already in Buy/Sell, shown in parentheses for reference but excluded from profit</div>
          </div>
        </>
      )}
    </>
  );
}

// IL ST-1 TAX TRACKER — Quarterly sales tax filing for Illinois
// ============================================================================
function ST1TaxTracker({ sales }) {
  const IL_STATE_RATE = 0.0625; // 6.25% general merchandise
  const VENDOR_DISCOUNT_RATE = 0.0175; // 1.75% timely filing discount
  const VENDOR_DISCOUNT_CAP = 1000; // $1,000 cap per period

  // Marketplace facilitators collect and remit tax — these are TAX-EXEMPT for your ST-1
  const MARKETPLACE_PLATFORMS = ['Whatnot', 'eBay', 'COMC'];

  // Quarters
  const quarters = [
    { id: 'Q1', label: 'Q1 (Jan-Mar)', months: ['01','02','03'], due: 'Apr 20' },
    { id: 'Q2', label: 'Q2 (Apr-Jun)', months: ['04','05','06'], due: 'Jul 20' },
    { id: 'Q3', label: 'Q3 (Jul-Sep)', months: ['07','08','09'], due: 'Oct 20' },
    { id: 'Q4', label: 'Q4 (Oct-Dec)', months: ['10','11','12'], due: 'Jan 20 (next yr)' },
  ];

  // Get available years from sales data
  const years = [...new Set(sales.map(s => s.d?.slice(0, 4)).filter(Boolean))].sort().reverse();
  const [selectedYear, setSelectedYear] = useState(years[0] || '2026');

  // Build quarterly data from sales
  const quarterlyData = useMemo(() => {
    return quarters.map(q => {
      const qSales = sales.filter(s => {
        if (!s.d) return false;
        const yr = s.d.slice(0, 4);
        const mo = s.d.slice(5, 7);
        return yr === selectedYear && q.months.includes(mo);
      });

      const marketplace = qSales.filter(s => MARKETPLACE_PLATFORMS.includes(s.p));
      const direct = qSales.filter(s => !MARKETPLACE_PLATFORMS.includes(s.p));

      const marketplaceGross = marketplace.reduce((sum, s) => sum + s.g, 0);
      const marketplaceNet = marketplace.reduce((sum, s) => sum + s.net, 0);
      const marketplaceCards = marketplace.reduce((sum, s) => sum + s.n, 0);

      const directGross = direct.reduce((sum, s) => sum + s.g, 0);
      const directNet = direct.reduce((sum, s) => sum + s.net, 0);
      const directCards = direct.reduce((sum, s) => sum + s.n, 0);

      const totalGross = qSales.reduce((sum, s) => sum + s.g, 0);

      // Tax calculation — only on DIRECT sales (marketplace already collected)
      const taxableReceipts = directGross;
      const taxDue = taxableReceipts * IL_STATE_RATE;
      const vendorDiscount = Math.min(taxDue * VENDOR_DISCOUNT_RATE, VENDOR_DISCOUNT_CAP);
      const netTaxDue = Math.max(taxDue - vendorDiscount, 0);

      return {
        ...q,
        year: selectedYear,
        totalSales: qSales.length,
        totalGross,
        marketplaceGross, marketplaceNet, marketplaceCards, marketplaceSales: marketplace.length,
        directGross, directNet, directCards, directSales: direct.length,
        taxableReceipts,
        taxDue,
        vendorDiscount,
        netTaxDue,
        dueDate: `${q.due}, ${q.id === 'Q4' ? parseInt(selectedYear) + 1 : selectedYear}`,
      };
    });
  }, [sales, selectedYear]);

  const yearTotals = useMemo(() => ({
    totalGross: quarterlyData.reduce((s, q) => s + q.totalGross, 0),
    marketplaceGross: quarterlyData.reduce((s, q) => s + q.marketplaceGross, 0),
    directGross: quarterlyData.reduce((s, q) => s + q.directGross, 0),
    taxDue: quarterlyData.reduce((s, q) => s + q.taxDue, 0),
    vendorDiscount: quarterlyData.reduce((s, q) => s + q.vendorDiscount, 0),
    netTaxDue: quarterlyData.reduce((s, q) => s + q.netTaxDue, 0),
  }), [quarterlyData]);

  // Determine current quarter for status badges
  const now = new Date();
  const currentQ = Math.floor(now.getMonth() / 3); // 0-3

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.neon, fontSize: 22, margin: 0 }}>IL ST-1 Sales Tax Tracker</h2>
          <div style={{ color: C.slateDim, fontSize: 12, marginTop: 4 }}>Quarterly filing · Illinois Retailers' Occupation Tax · General Merchandise 6.25%</div>
        </div>
        <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)}
          style={{ ...selectStyle, width: 'auto', padding: '8px 16px', fontSize: 14, fontFamily: "'Oswald', sans-serif" }}>
          {years.map(y => <option key={y} value={y}>{y}</option>)}
        </select>
      </div>

      {/* Year summary KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
        <KPI icon={DollarSign} label={`${selectedYear} Total Gross`} value={fmtShort(yearTotals.totalGross)} color={C.green} />
        <KPI icon={ShoppingCart} label="Marketplace (Tax-Exempt)" value={fmtShort(yearTotals.marketplaceGross)} sub="Whatnot/eBay collect tax" color={C.blue} />
        <KPI icon={Radio} label="Direct Sales (Taxable)" value={fmtShort(yearTotals.directGross)} sub="Card Shows / Other" color={C.orange} />
        <KPI icon={AlertCircle} label="Total Tax Due" value={fmt(yearTotals.netTaxDue)} sub={`Discount: ${fmt(yearTotals.vendorDiscount)}`} color={C.neon} />
      </div>

      {/* Info banner */}
      <div style={{ background: `${C.neon}11`, border: `1px solid ${C.neon}33`, borderRadius: 10, padding: 14, marginBottom: 20, fontSize: 12, color: C.slate, lineHeight: 1.6 }}>
        <strong style={{ color: C.neon }}>How this works:</strong> Whatnot and eBay are marketplace facilitators — they collect and remit IL sales tax on your behalf. Those sales are <strong>tax-exempt on your ST-1</strong>. You only owe tax on <strong>direct sales</strong> (card shows, Facebook, private sales, etc.). The 1.75% vendor discount applies when you file and pay on time (capped at $1,000/quarter).
      </div>

      {/* Quarterly breakdown */}
      {quarterlyData.map((q, qi) => {
        const isCurrent = parseInt(selectedYear) === now.getFullYear() && qi === currentQ;
        const isPast = parseInt(selectedYear) < now.getFullYear() || (parseInt(selectedYear) === now.getFullYear() && qi < currentQ);
        const statusColor = isCurrent ? C.neon : isPast ? C.green : C.slateDim;
        const statusLabel = isCurrent ? '● CURRENT' : isPast ? '✓ PAST' : '○ UPCOMING';

        return (
          <div key={q.id} style={{ background: C.navyLight, border: `1px solid ${isCurrent ? C.neon + '44' : C.navyMid}`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, paddingBottom: 12, borderBottom: `1px solid ${C.navyMid}` }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <h3 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 18, margin: 0 }}>{q.label} {selectedYear}</h3>
                <span style={{ color: statusColor, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{statusLabel}</span>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>Due Date</div>
                <div style={{ color: isCurrent ? C.neon : C.slate, fontWeight: 600, fontSize: 14 }}>{q.dueDate}</div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(232px, 1fr))', gap: 16 }}>
              {/* Marketplace (exempt) */}
              <div style={{ background: C.navy, borderRadius: 8, padding: 14, border: `1px solid ${C.blue}22` }}>
                <div style={{ color: C.blue, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', marginBottom: 8 }}>Tax-Exempt (Marketplace)</div>
                {[
                  ['Sales', q.marketplaceSales],
                  ['Cards', q.marketplaceCards.toLocaleString()],
                  ['Gross', fmt(q.marketplaceGross)],
                ].map(([l, v], i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: 12 }}>
                    <span style={{ color: C.slateDim }}>{l}</span>
                    <span style={{ color: C.white }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop: 6, fontSize: 10, color: C.slateDim, fontStyle: 'italic' }}>Whatnot/eBay remit tax for you</div>
              </div>

              {/* Direct (taxable) */}
              <div style={{ background: C.navy, borderRadius: 8, padding: 14, border: `1px solid ${C.orange}22` }}>
                <div style={{ color: C.orange, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', marginBottom: 8 }}>Taxable (Direct Sales)</div>
                {[
                  ['Sales', q.directSales],
                  ['Cards', q.directCards.toLocaleString()],
                  ['Gross', fmt(q.directGross)],
                ].map(([l, v], i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: 12 }}>
                    <span style={{ color: C.slateDim }}>{l}</span>
                    <span style={{ color: C.white }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop: 6, fontSize: 10, color: C.slateDim, fontStyle: 'italic' }}>You owe tax on these</div>
              </div>

              {/* Tax calculation */}
              <div style={{ background: C.navy, borderRadius: 8, padding: 14, border: `1px solid ${C.neon}22` }}>
                <div style={{ color: C.neon, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', marginBottom: 8 }}>ST-1 Tax Calculation</div>
                {[
                  ['Taxable receipts', fmt(q.taxableReceipts)],
                  ['Tax @ 6.25%', fmt(q.taxDue)],
                  ['Vendor discount (1.75%)', `(${fmt(q.vendorDiscount)})`],
                ].map(([l, v], i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: 12 }}>
                    <span style={{ color: C.slateDim }}>{l}</span>
                    <span style={{ color: C.white }}>{v}</span>
                  </div>
                ))}
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, paddingTop: 8, borderTop: `1px dashed ${C.neon}33` }}>
                  <span style={{ color: C.neon, fontWeight: 700, fontFamily: "'Oswald', sans-serif" }}>NET TAX DUE</span>
                  <span style={{ color: C.neon, fontWeight: 700, fontSize: 16 }}>{fmt(q.netTaxDue)}</span>
                </div>
              </div>
            </div>
          </div>
        );
      })}

      {/* Annual summary table */}
      <div style={{ background: C.navyLight, borderRadius: 12, border: `1px solid ${C.neon}33`, padding: 16, overflowX: 'auto' }}>
        <div style={{ color: C.neon, fontSize: 13, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12, fontFamily: "'Oswald', sans-serif" }}>{selectedYear} Annual Summary</div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr>{['Quarter','Due Date','Total Gross','Marketplace (Exempt)','Direct (Taxable)','Tax @ 6.25%','Discount','Net Tax Due'].map((h, i) => (
              <th key={i} style={{ padding: '8px 10px', textAlign: 'left', color: C.neon, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.neon}33`, whiteSpace: 'nowrap' }}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {quarterlyData.map(q => (
              <tr key={q.id} style={{ borderBottom: `1px solid ${C.navyMid}` }}>
                <td style={{ padding: '8px 10px', color: C.white, fontWeight: 600 }}>{q.id}</td>
                <td style={{ padding: '8px 10px', color: C.slate }}>{q.dueDate}</td>
                <td style={{ padding: '8px 10px', color: C.green }}>{fmt(q.totalGross)}</td>
                <td style={{ padding: '8px 10px', color: C.blue }}>{fmt(q.marketplaceGross)}</td>
                <td style={{ padding: '8px 10px', color: C.orange }}>{fmt(q.directGross)}</td>
                <td style={{ padding: '8px 10px', color: C.white }}>{fmt(q.taxDue)}</td>
                <td style={{ padding: '8px 10px', color: C.greenLight }}>({fmt(q.vendorDiscount)})</td>
                <td style={{ padding: '8px 10px', color: C.neon, fontWeight: 700 }}>{fmt(q.netTaxDue)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr style={{ borderTop: `2px solid ${C.neon}33` }}>
              <td colSpan={2} style={{ padding: '10px', color: C.neon, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>ANNUAL TOTAL</td>
              <td style={{ padding: '10px', color: C.green, fontWeight: 700 }}>{fmt(yearTotals.totalGross)}</td>
              <td style={{ padding: '10px', color: C.blue, fontWeight: 700 }}>{fmt(yearTotals.marketplaceGross)}</td>
              <td style={{ padding: '10px', color: C.orange, fontWeight: 700 }}>{fmt(yearTotals.directGross)}</td>
              <td style={{ padding: '10px', color: C.white, fontWeight: 700 }}>{fmt(yearTotals.taxDue)}</td>
              <td style={{ padding: '10px', color: C.greenLight, fontWeight: 700 }}>({fmt(yearTotals.vendorDiscount)})</td>
              <td style={{ padding: '10px', color: C.neon, fontWeight: 700, fontSize: 14 }}>{fmt(yearTotals.netTaxDue)}</td>
            </tr>
          </tfoot>
        </table>
      </div>

      {/* Filing reminders */}
      <div style={{ marginTop: 16, background: C.navyLight, border: `1px dashed ${C.neon}33`, borderRadius: 10, padding: 16, fontSize: 12, color: C.slate, lineHeight: 1.6 }}>
        <strong style={{ color: C.neon }}>Filing Reminders:</strong>
        <div style={{ marginTop: 8 }}>• File Form ST-1 via <strong>MyTax Illinois</strong> (mytax.illinois.gov)</div>
        <div>• Line 1: Enter total gross receipts (marketplace + direct)</div>
        <div>• Schedule A deductions: Deduct marketplace-facilitated sales (tax-exempt)</div>
        <div>• Vendor discount applies automatically when filed and paid by due date</div>
        <div>• Keep records of all Whatnot/eBay order reports as proof of marketplace collection</div>
        <div style={{ marginTop: 8, color: C.slateDim }}>Note: This tracker computes state ROT only. Local taxes (municipal, county, RTA) may apply depending on your location. Consult your tax advisor for complete filing requirements.</div>
      </div>
    </>
  );
}


/* ----- Mount with visible error reporting ----- */
try {
  const _root = ReactDOM.createRoot(document.getElementById('root'));
  _root.render(<VVCBusinessHubV3 />);
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div class="vvc-err"><b>Load error:</b>\n\n' + (err && err.stack ? err.stack : String(err)) + '</div>';
}
window.addEventListener('error', function (e) {
  var root = document.getElementById('root');
  if (root && root.querySelector('.vvc-boot')) {
    root.innerHTML = '<div class="vvc-err"><b>Runtime error:</b>\n\n' + (e.message || String(e)) + '</div>';
  }
});
</script>
</body>
</html>
