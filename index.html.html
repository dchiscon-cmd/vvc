          </div>

          {/* Top sellers pie */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: 16, marginBottom: 16 }}>
            <ChartCard title="Spend by Seller (Top 10)" height={280}>
              <ResponsiveContainer>
                <PieChart>
                  <Pie data={sellerStats.slice(0, 10)} dataKey="totalSpent" nameKey="name" cx="50%" cy="50%" outerRadius={90}
                    label={({ name, percent }) => `${(name || '').slice(0, 12)} ${(percent*100).toFixed(0)}%`}
                    labelLine={{ stroke: C.slateDim }}
                    style={{ fontSize: 10 }}>
                    {sellerStats.slice(0, 10).map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                  </Pie>
                  <Tooltip content={<CustomTooltip />} />
                </PieChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title="Avg Cost per Card by Seller (Top 10)" height={280}>
              <ResponsiveContainer>
                <BarChart data={sellerStats.slice(0, 10)} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                  <XAxis type="number" tick={{ fill: C.slateDim, fontSize: 11 }} tickFormatter={fmt} />
                  <YAxis type="category" dataKey="name" tick={{ fill: C.slateDim, fontSize: 9 }} width={110} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="avgPerCard" name="Avg $/Card" fill={CHART_PRIMARY} radius={[0,4,4,0]}>
                    {sellerStats.slice(0, 10).map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>

          {/* Full seller table — sortable */}
          {(() => {
            const cols = [
              { header: 'Seller', accessor: s => s.name, type: 'string' },
              { header: 'Platform', accessor: s => s.sources, type: 'string' },
              { header: 'Txns', accessor: s => s.transactions, type: 'number' },
              { header: 'Cards', accessor: s => s.totalCards, type: 'number' },
              { header: 'Total Spent', accessor: s => s.totalSpent, type: 'number', render: v => fmt(v), color: C.orangeLight },
              { header: 'Avg $/Card', accessor: s => s.avgPerCard, type: 'number', render: v => fmt(v), color: C.cyan },
              { header: '🟢 Open', accessor: s => s.tierCounts?.opener || 0, type: 'number', render: (v, row) => v > 0 ? <span style={{ color: C.green }}>{v} <span style={{ fontSize: 9, color: C.slateDim }}>({fmt(row.tierSpend?.opener||0)})</span></span> : <span style={{ color: C.slateDim }}>—</span> },
              { header: '🔵 Core', accessor: s => s.tierCounts?.core || 0, type: 'number', render: (v, row) => v > 0 ? <span style={{ color: C.cyan }}>{v} <span style={{ fontSize: 9, color: C.slateDim }}>({fmt(row.tierSpend?.core||0)})</span></span> : <span style={{ color: C.slateDim }}>—</span> },
              { header: '🟣 Prem', accessor: s => s.tierCounts?.premium || 0, type: 'number', render: (v, row) => v > 0 ? <span style={{ color: C.purpleLight }}>{v} <span style={{ fontSize: 9, color: C.slateDim }}>({fmt(row.tierSpend?.premium||0)})</span></span> : <span style={{ color: C.slateDim }}>—</span> },
              { header: 'Avg $/Tx', accessor: s => s.avgPerTx, type: 'number', render: v => fmt(v) },
              { header: '% Spend', accessor: s => s.pctOfSpend, type: 'number', render: v => (v * 100).toFixed(1) + '%' },
              { header: 'First Buy', accessor: s => s.firstDate, type: 'string' },
              { header: 'Last Buy', accessor: s => s.lastDate, type: 'string' },
            ];
            const sorted = [...sellerStats].sort((a, b) => {
              const col = cols[sellerSortCol];
              const va = col.accessor(a), vb = col.accessor(b);
              const cmp = col.type === 'string' ? String(va).localeCompare(String(vb)) : va - vb;
              return sellerSortDir === 'asc' ? cmp : -cmp;
            });
            return (
              <div style={{ background: C.navyLight, borderRadius: 12, border: `1px solid ${C.cyan}33`, padding: 16, overflowX: 'auto' }}>
                <div style={{ color: C.cyan, fontSize: 13, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4, fontFamily: "'Oswald', sans-serif" }}>All Sellers · Full History</div>
                <div style={{ fontSize: 11, color: C.slateDim, marginBottom: 12 }}>All-time, across every era (not affected by the time filter). Tap any seller to see their complete buy history.</div>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 800 }}>
                  <thead>
                    <tr>{cols.map((col, i) => (
                      <th key={i} onClick={() => { if (sellerSortCol === i) setSellerSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSellerSortCol(i); setSellerSortDir('desc'); }}}
                        style={{ padding: '8px 10px', textAlign: 'left', color: C.cyan, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.cyan}33`, whiteSpace: 'nowrap', cursor: 'pointer', userSelect: 'none' }}>
                        {col.header} {sellerSortCol === i ? (sellerSortDir === 'desc' ? '▼' : '▲') : ''}
                      </th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {sorted.map((s, i) => {
                      const open = expandedSeller === s.name;
                      const destLabel = (p) => {
                        const sid = p.showId;
                        if (!sid || sid === '__hold') return '⏸ Hold';
                        if (sid === '__legacy') return '📚 Legacy';
                        const d = findDest(sid); if (d) return d.label;
                        const sh = (enrichedShows || []).find(x => x.id === sid);
                        return sh ? `🎥 ${sh.d}` : '🎥 Show';
                      };
                      return (
                        <React.Fragment key={i}>
                          <tr onClick={() => setExpandedSeller(open ? null : s.name)}
                            style={{ borderBottom: `1px solid ${C.navyMid}`, background: open ? `${C.cyan}14` : (s.repeat ? `${C.cyan}08` : 'transparent'), cursor: 'pointer' }}>
                            {cols.map((col, j) => (
                              <td key={j} style={{ padding: '8px 10px', color: col.color || (j === 0 ? C.white : C.slate), fontWeight: j === 0 ? 600 : 400, whiteSpace: 'nowrap' }}>
                                {j === 0 && <span style={{ color: C.slateDim, marginRight: 5, display: 'inline-block', transform: open ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▸</span>}
                                {col.render ? col.render(col.accessor(s), s) : col.accessor(s)}
                              </td>
                            ))}
                          </tr>
                          {open && (
                            <tr>
                              <td colSpan={cols.length} style={{ padding: 0, background: C.bg }}>
                                <div style={{ padding: '14px 16px' }}>
                                  <div style={{ display: 'flex', gap: 18, flexWrap: 'wrap', marginBottom: 12 }}>
                                    <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Lifetime</div><div style={{ fontSize: 16, fontWeight: 700, color: C.white }}>{fmt(s.totalSpent)} <span style={{ fontSize: 11, color: C.slateDim, fontWeight: 500 }}>· {s.totalCards} cards</span></div></div>
                                    <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Avg / Card</div><div style={{ fontSize: 16, fontWeight: 700, color: C.cyan }}>{fmt(s.avgPerCard)}</div></div>
                                    <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Buys</div><div style={{ fontSize: 16, fontWeight: 700, color: C.white }}>{s.transactions}</div></div>
                                    <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Span</div><div style={{ fontSize: 13, fontWeight: 600, color: C.slate }}>{s.firstDate} → {s.lastDate}</div></div>
                                    <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Tier mix</div><div style={{ fontSize: 13, fontWeight: 600 }}><span style={{ color: '#3aa05a' }}>{s.tierCounts.opener}🟢</span> <span style={{ color: '#3f5e8c' }}>{s.tierCounts.core}🔵</span> <span style={{ color: '#7c6fae' }}>{s.tierCounts.premium}🟣</span></div></div>
                                    {(() => {
                                      const ts = (data.baseline && data.baseline.trackingStart) || '2026-04-11';
                                      let lc = 0, ls = 0, tc = 0, tsp = 0;
                                      s.rawEntries.forEach(p => { if ((p.showId === '__legacy') || (p.d < ts)) { lc += p.n || 0; ls += p.t || 0; } else { tc += p.n || 0; tsp += p.t || 0; } });
                                      if (lc === 0) return null;
                                      return (
                                        <div><div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase' }}>Era split</div><div style={{ fontSize: 12.5, fontWeight: 600, color: C.slate }}>📚 {lc} · {fmt(ls)} <span style={{ color: C.slateDim, fontWeight: 400 }}>legacy</span> &nbsp;|&nbsp; {tc} · {fmt(tsp)} <span style={{ color: C.slateDim, fontWeight: 400 }}>tracked</span></div></div>
                                      );
                                    })()}
                                  </div>
                                  {(() => {
                                    // COMP SIGNAL — median $/card + recent-vs-historical trend (the seller's own baseline)
                                    const pcs = s.rawEntries.map(p => (p.n > 0 ? p.t / p.n : p.t)).filter(v => v > 0).sort((a, b) => a - b);
                                    if (pcs.length < 2) return null;
                                    const median = pcs.length % 2 ? pcs[(pcs.length - 1) / 2] : (pcs[pcs.length / 2 - 1] + pcs[pcs.length / 2]) / 2;
                                    const hist = s.avgPerCard;
                                    const k = Math.min(3, s.rawEntries.length);
                                    const recent = s.rawEntries.slice(0, k); // newest-first
                                    const rc = recent.reduce((a, p) => a + p.n, 0);
                                    const recentAvg = rc > 0 ? recent.reduce((a, p) => a + p.t, 0) / rc : hist;
                                    const delta = hist > 0 ? (recentAvg - hist) / hist : 0;
                                    const hot = delta > 0.1, soft = delta < -0.1;
                                    const col = soft ? C.green : hot ? C.orange : C.slate;
                                    const word = soft ? 'soft' : hot ? 'running hot' : 'in line';
                                    return (
                                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', background: `${col}12`, border: `1px solid ${col}33`, borderRadius: 9, padding: '9px 12px', marginBottom: 12, fontSize: 11.5 }}>
                                        <span style={{ fontWeight: 700, color: col, textTransform: 'uppercase', letterSpacing: '0.03em', fontFamily: "'Oswald', sans-serif" }}>Comp signal</span>
                                        <span style={{ color: C.slate }}>Median <b style={{ color: C.white }}>{fmt(median)}</b>/card</span>
                                        <span style={{ color: C.slateDim }}>·</span>
                                        <span style={{ color: C.slate }}>Last {k} buys avg <b style={{ color: C.white }}>{fmt(recentAvg)}</b></span>
                                        <span style={{ color: col, fontWeight: 600 }}>{soft ? '↓' : hot ? '↑' : '→'} {word} ({delta >= 0 ? '+' : ''}{(delta * 100).toFixed(0)}% vs their {fmt(hist)} avg)</span>
                                      </div>
                                    );
                                  })()}
                                  <div style={{ maxHeight: 280, overflowY: 'auto', border: `1px solid rgba(0,0,0,0.08)`, borderRadius: 8, background: '#fff' }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11.5 }}>
                                      <thead><tr style={{ position: 'sticky', top: 0, background: '#fff' }}>
                                        {['Date', 'Cards', 'Cost', '$/Card', 'Tier', 'Destination'].map(h => <th key={h} style={{ padding: '6px 10px', textAlign: 'left', color: C.slateDim, fontSize: 9.5, textTransform: 'uppercase', borderBottom: '1px solid rgba(0,0,0,0.08)', whiteSpace: 'nowrap' }}>{h}</th>)}
                                      </tr></thead>
                                      <tbody>
                                        {s.rawEntries.map((p, k) => {
                                          const ppc = p.n > 0 ? p.t / p.n : p.t;
                                          const tdot = ppc <= 8 ? '🟢' : ppc <= 14 ? '🔵' : '🟣';
                                          return (
                                            <tr key={k} style={{ borderBottom: '1px solid rgba(0,0,0,0.04)' }}>
                                              <td style={{ padding: '5px 10px', color: C.white, whiteSpace: 'nowrap' }}>{p.d}</td>
                                              <td style={{ padding: '5px 10px', color: C.slate }}>{p.n}</td>
                                              <td style={{ padding: '5px 10px', color: C.white, fontWeight: 600 }}>{fmt(p.t)}</td>
                                              <td style={{ padding: '5px 10px', color: C.slate }}>{fmt(ppc)}</td>
                                              <td style={{ padding: '5px 10px' }}>{tdot}</td>
                                              <td style={{ padding: '5px 10px', color: C.slateDim, whiteSpace: 'nowrap' }}>{destLabel(p)}</td>
                                            </tr>
                                          );
                                        })}
                                      </tbody>
                                    </table>
                                  </div>
                                </div>
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
                {sellerStats.length === 0 && (
                  <div style={{ padding: 30, textAlign: 'center', color: C.slateDim }}>No seller data yet. Add the seller name when logging purchases to start tracking.</div>
                )}
              </div>
            );
          })()}
        </>
      )}

      {/* ATTRIBUTION MODAL */}
      {attrShow && (() => {
        const showDate = new Date(attrShow.d + 'T12:00:00');
        const windowStart = new Date(showDate.getTime() - 30 * 24 * 60 * 60 * 1000);
        const windowEnd = new Date(showDate.getTime() + 3 * 24 * 60 * 60 * 1000);
        const candidates = data.purchases.filter(p => {
          const pDate = new Date(p.d + 'T12:00:00');
          if (pDate > windowEnd || pDate < windowStart) return false;
          return !p.showId || p.showId === attrShow.id;
        }).sort((a, b) => b.d.localeCompare(a.d));
        const totalAttr = candidates.filter(p => p.showId === attrShow.id).reduce((s, p) => s + p.t, 0);
        const totalCards = candidates.filter(p => p.showId === attrShow.id).reduce((s, p) => s + p.n, 0);

        return (
          <div onClick={() => setAttrShow(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(6,13,26,0.88)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <div onClick={e => e.stopPropagation()} style={{ background: C.navyLight, border: `1px solid ${C.cyan}44`, borderRadius: 12, padding: 24, maxWidth: 700, width: '100%', maxHeight: '85vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <div>
                  <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 18, margin: 0 }}>
                    Attribute Purchases → {attrShow.d} · {attrShow.plat}
                  </h2>
                  <div style={{ color: C.slateDim, fontSize: 11, marginTop: 4 }}>
                    Showing purchases from 30 days before through 3 days after this show. Check the ones that were inventory for this show.
                  </div>
                </div>
                <button onClick={() => setAttrShow(null)} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer' }}><X size={20} /></button>
              </div>

              {/* Summary strip */}
              <div style={{ display: 'flex', gap: 16, marginBottom: 16, padding: '10px 14px', background: C.navy, borderRadius: 8, border: `1px solid ${C.cyan}22` }}>
                <div><span style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>Attributed Cards</span><div style={{ color: C.cyan, fontWeight: 700, fontSize: 16 }}>{totalCards}</div></div>
                <div><span style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>Attributed Cost</span><div style={{ color: C.orangeLight, fontWeight: 700, fontSize: 16 }}>{fmt(totalAttr)}</div></div>
                <div><span style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>Show Net Sales</span><div style={{ color: C.greenLight, fontWeight: 700, fontSize: 16 }}>{fmt(attrShow.net)}</div></div>
                <div><span style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>Show Margin</span><div style={{ color: (attrShow.net - totalAttr) >= 0 ? C.greenLight : C.orangeLight, fontWeight: 700, fontSize: 16 }}>{fmt(attrShow.net - totalAttr)}</div></div>
              </div>

              {candidates.length === 0 ? (
                <div style={{ padding: 30, textAlign: 'center', color: C.slateDim }}>No purchases found in the 30-day window around this show.</div>
              ) : (
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                    <thead>
                      <tr>{['','Date','Source','Seller','# Cards','Total','Avg/Card'].map((h, i) => (
                        <th key={i} style={{ padding: '8px 10px', textAlign: 'left', color: C.cyan, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.cyan}33` }}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {candidates.map((p, i) => {
                        const isAttr = p.showId === attrShow.id;
                        return (
                          <tr key={i} style={{ borderBottom: `1px solid ${C.navyMid}`, background: isAttr ? `${C.cyan}11` : 'transparent', cursor: 'pointer' }}
                            onClick={() => data.attributePurchase(p, isAttr ? null : attrShow.id)}>
                            <td style={{ padding: '8px 10px', textAlign: 'center' }}>
                              <div style={{
                                width: 20, height: 20, borderRadius: 4,
                                border: `2px solid ${isAttr ? C.cyan : C.slateDim}`,
                                background: isAttr ? C.cyan : 'transparent',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                color: C.navy, fontWeight: 700, fontSize: 14
                              }}>{isAttr ? '✓' : ''}</div>
                            </td>
                            <td style={{ padding: '8px 10px', color: C.white }}>{p.d}</td>
                            <td style={{ padding: '8px 10px', color: C.slate }}>{p.s}</td>
                            <td style={{ padding: '8px 10px', color: C.slateDim }}>{p.sl || '—'}</td>
                            <td style={{ padding: '8px 10px', color: C.slate }}>{p.n}</td>
                            <td style={{ padding: '8px 10px', color: C.orangeLight }}>{fmt(p.t)}</td>
                            <td style={{ padding: '8px 10px', color: C.slateDim }}>{p.n > 0 ? fmt(p.t / p.n) : '—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 16 }}>
                <button onClick={() => setAttrShow(null)} style={btnStyle()}>Done</button>
              </div>
            </div>
          </div>
        );
      })()}
    </>
  );
}

// ============================================================================
// V10 — BUDGET & GROWTH PLANNER
// Live calculator: set a per-show budget → see the tier allocation, the break-even
// AOV, and projected profit at your CURRENT sell price vs your tier TARGET. Current
// AOV and follower growth are pulled from real data so the model stays honest.
// ============================================================================
function BudgetPlanner({ data, enrichedShows }) {
  const sales = data.sales || [];
  const totG = sales.reduce((a, s) => a + (s.g || 0), 0);
  const totN = sales.reduce((a, s) => a + (s.n || 0), 0);
  const liveAov = totN > 0 ? Math.round((totG / totN) * 100) / 100 : 15.41;
  // recent follower growth (avg of last 3 show-to-show deltas)
  const tfSeq = [...enrichedShows].filter(x => x.tf > 0).sort((a, b) => a.d.localeCompare(b.d));
  let folGrowth = 0;
  if (tfSeq.length >= 2) { const d = []; for (let i = 1; i < tfSeq.length; i++) d.push(tfSeq[i].tf - tfSeq[i - 1].tf); folGrowth = Math.round(d.slice(-3).reduce((a, b) => a + b, 0) / Math.min(3, d.length)); }
  const curFollowers = tfSeq.length ? tfSeq[tfSeq.length - 1].tf : 0;

  const [budget, setBudget] = React.useState(2600);
  const [buyAvg, setBuyAvg] = React.useState(12.50);
  const [sellThru, setSellThru] = React.useState(85);
  const [curAov, setCurAov] = React.useState(liveAov);
  const [tgtAov, setTgtAov] = React.useState(22.50);
  const FEE = 0.125;

  const cards = buyAvg > 0 ? Math.round(budget / buyAvg) : 0;
  const sold = Math.round(cards * sellThru / 100);
  const mix = { Opener: 0.30, Core: 0.50, Premium: 0.20 };
  const buy = { Opener: 6, Core: 12, Premium: 23 };
  const tierKey = { Opener: 'opener', Core: 'core', Premium: 'premium' };
  const tiers = Object.keys(mix).map(k => { const c = Math.round(cards * mix[k]); return { k, c, cost: c * buy[k] }; });
  const cost = tiers.reduce((s, t) => s + t.cost, 0);
  const breakEven = sold > 0 ? cost / (sold * (1 - FEE)) : 0;
  const grossCur = sold * curAov, netCur = grossCur * (1 - FEE), profCur = netCur - cost;
  const grossTgt = sold * tgtAov, netTgt = grossTgt * (1 - FEE), profTgt = netTgt - cost;

  const lbl = { fontSize: 10, color: C.slateDim, textTransform: 'uppercase', letterSpacing: '0.04em', fontWeight: 700 };
  const numIn = (v, set, step, w) => (
    <input type="number" step={step} value={v} onChange={e => set(parseFloat(e.target.value) || 0)}
      style={{ width: w, background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 9, padding: '8px 10px', fontSize: 14, fontWeight: 700, color: C.white, outline: 'none', marginTop: 4 }} />
  );
  const Scenario = ({ title, aov, gross, net, prof, accent }) => (
    <div style={{ flex: 1, minWidth: 210, background: C.navyLight, border: `1px solid ${accent}44`, borderRadius: 12, padding: 16 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: accent, textTransform: 'uppercase', letterSpacing: '0.03em' }}>{title}</div>
      <div style={{ fontSize: 11, color: C.slateDim, marginTop: 2 }}>AOV {fmt(aov)} · {sold} sold</div>
      <div style={{ fontSize: 30, fontWeight: 700, color: prof >= 0 ? C.green : C.crimson, marginTop: 8, lineHeight: 1 }}>{prof >= 0 ? '+' : ''}{fmt(prof)}</div>
      <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 4 }}>profit / show</div>
      <div style={{ display: 'flex', gap: 12, marginTop: 10, fontSize: 11, color: C.slate }}>
        <span>gross <b style={{ color: C.white }}>{fmt(gross)}</b></span>
        <span>net <b style={{ color: C.white }}>{fmt(net)}</b></span>
      </div>
      <div style={{ fontSize: 10.5, color: prof >= 0 ? C.green : C.orange, marginTop: 6 }}>ROI {cost > 0 ? Math.round(prof / cost * 100) : 0}%</div>
    </div>
  );

  return (
    <>
      <div style={{ marginBottom: 16 }}>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: 0 }}>Budget &amp; Growth Planner</h2>
        <p style={{ fontSize: 12, color: C.slateDim, margin: '3px 0 0' }}>Set your per-show buy budget. Profit is modeled at your current sell price vs your tier target — the gap is the real lever.</p>
      </div>

      <div style={{ background: C.navyLight, borderRadius: 14, border: '1px solid rgba(0,0,0,0.08)', padding: 18, marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', flexWrap: 'wrap', gap: 8 }}>
          <div style={lbl}>Per-show budget</div>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 26, fontWeight: 700, color: C.cyan }}>{fmt(budget)}</div>
        </div>
        <input type="range" min={1500} max={3500} step={50} value={budget} onChange={e => setBudget(parseInt(e.target.value))}
          style={{ width: '100%', marginTop: 8, accentColor: C.cyan }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: C.slateDim }}><span>$1,500</span><span style={{ color: C.green }}>ideal $2,500–$2,700</span><span>$3,500</span></div>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginTop: 14 }}>
          <div><div style={lbl}>Avg buy/card</div>{numIn(buyAvg, setBuyAvg, 0.25, 80)}</div>
          <div><div style={lbl}>Sell-through %</div>{numIn(sellThru, setSellThru, 5, 70)}</div>
          <div><div style={lbl}>Current AOV</div>{numIn(curAov, setCurAov, 0.5, 80)}</div>
          <div><div style={lbl}>Target AOV</div>{numIn(tgtAov, setTgtAov, 0.5, 80)}</div>
        </div>
        <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 8 }}>Current AOV defaulted from your real sales ({fmt(liveAov)}). Fees modeled at 12.5%.</div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 16 }}>
        <KPI icon={Package} label="Cards to Buy" value={cards} sub={`${sold} expected sold`} color={C.cyan} />
        <KPI icon={DollarSign} label="Actual Spend" value={fmt(cost)} sub="at this tier mix" color={C.orangeLight} />
        <KPI icon={Zap} label="Break-even AOV" value={fmt(breakEven)} sub="sell above this to profit" color={breakEven <= curAov ? C.green : C.orange} />
        <KPI icon={TrendingUp} label="AOV Gap" value={fmt(Math.max(0, tgtAov - curAov))} sub="current → target" color={C.purpleLight} />
      </div>

      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 16 }}>
        <Scenario title="At current AOV" aov={curAov} gross={grossCur} net={netCur} prof={profCur} accent={profCur >= 0 ? C.green : C.crimson} />
        <Scenario title="At tier-target AOV" aov={tgtAov} gross={grossTgt} net={netTgt} prof={profTgt} accent={C.green} />
      </div>

      <div style={{ background: C.navyLight, borderRadius: 14, border: '1px solid rgba(0,0,0,0.08)', padding: 16, marginBottom: 16 }}>
        <div style={{ ...lbl, marginBottom: 10 }}>Tier allocation</div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead><tr>{['Tier', 'Cards', 'Buy avg', 'Tier cost', '% of spend'].map((h, i) => <th key={i} style={{ textAlign: i === 0 ? 'left' : 'right', padding: '6px 10px', color: C.slateDim, fontSize: 10, textTransform: 'uppercase', borderBottom: '1px solid rgba(0,0,0,0.08)' }}>{h}</th>)}</tr></thead>
          <tbody>
            {tiers.map(t => { const meta = TIER_META[tierKey[t.k]]; return (
              <tr key={t.k} style={{ borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
                <td style={{ padding: '7px 10px' }}><span style={{ color: meta.color, fontWeight: 700 }}>{meta.label}</span> <span style={{ color: C.slateDim, fontSize: 10 }}>{meta.range}</span></td>
                <td style={{ padding: '7px 10px', textAlign: 'right', color: C.white }}>{t.c}</td>
                <td style={{ padding: '7px 10px', textAlign: 'right', color: C.slate }}>{fmt(buy[t.k])}</td>
                <td style={{ padding: '7px 10px', textAlign: 'right', color: C.white, fontWeight: 600 }}>{fmt(t.cost)}</td>
                <td style={{ padding: '7px 10px', textAlign: 'right', color: C.slate }}>{cost > 0 ? Math.round(t.cost / cost * 100) : 0}%</td>
              </tr>
            ); })}
          </tbody>
        </table>
      </div>

      <div style={{ background: C.navyLight, borderRadius: 14, border: `1px solid ${C.purpleLight}33`, padding: 16 }}>
        <div style={{ ...lbl, marginBottom: 10 }}>Follower growth · the AOV engine</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>
          <div><div style={{ fontSize: 10, color: C.slateDim }}>Current followers</div><div style={{ fontSize: 22, fontWeight: 700, color: C.white }}>{curFollowers.toLocaleString()}</div></div>
          <div><div style={{ fontSize: 10, color: C.slateDim }}>Recent / show</div><div style={{ fontSize: 22, fontWeight: 700, color: C.green }}>+{folGrowth.toLocaleString()}</div></div>
          <div><div style={{ fontSize: 10, color: C.slateDim }}>~1 yr (50 shows)</div><div style={{ fontSize: 22, fontWeight: 700, color: C.purpleLight }}>{(curFollowers + folGrowth * 50).toLocaleString()}</div></div>
        </div>
        <div style={{ fontSize: 11, color: C.slateDim, marginTop: 10, lineHeight: 1.5 }}>More followers → more concurrent bidders → AOV drifts toward your tier target. Growing the audience is what turns a {fmt(budget)} buy from break-even into <b style={{ color: C.green }}>{fmt(profTgt)}</b>/show.</div>
      </div>
    </>
  );
}

function ShowsMode({ showsTab, setShowsTab, data, enrichedShows, showsByDow, showsByTimeSlot, openSlide }) {
  const [attrShow, setAttrShow] = useState(null);
  const todayStr = new Date().toISOString().split('T')[0];
  const upcoming = [...enrichedShows].filter(s => s.d >= todayStr).sort((a,b) => a.d.localeCompare(b.d));
  const tabs = [
    { id: 'preshow', label: 'Pre-Show', icon: Activity },
    { id: 'results', label: 'Results', icon: DollarSign },
    { id: 'analytics', label: 'Analytics', icon: TrendingUp },
    { id: 'planner', label: 'Planner', icon: Zap },
  ];

  return (
    <>
      <div style={{ display: 'flex', gap: 2, marginBottom: 20, background: '#fff', padding: 4, borderRadius: 50, width: 'fit-content' }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setShowsTab(t.id)}
            style={{ background: showsTab === t.id ? C.green : 'transparent', color: showsTab === t.id ? C.navy : C.slateDim, border: 'none', borderRadius: 50, padding: '7px 18px', fontSize: 11, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>
            <t.icon size={13} /> {t.label}
          </button>
        ))}
      </div>

      {showsTab === 'preshow' && (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: 0 }}>Upcoming Shows</h2>
            <button onClick={() => openSlide('show')} style={{ ...btnStyle(C.green), background: C.green, color: C.navy, border: 'none' }}>
              <PlusCircle size={14} /> Schedule Show
            </button>
          </div>
          {upcoming.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: C.slateDim, background: C.navyLight, borderRadius: 12, border: `1px dashed ${C.navyMid}` }}>
              No upcoming shows. Click Schedule Show to add one.
            </div>
          ) : upcoming.map(show => {
            const daysOut = Math.ceil((new Date(show.d + 'T12:00:00') - new Date()) / (1000*60*60*24));
            const attrP = data.purchases.filter(p => p.showId === show.id);
            const totalCards = attrP.reduce((s,p) => s+p.n, 0);
            const totalCost = attrP.reduce((s,p) => s+p.t, 0);
            const avgCost = totalCards > 0 ? totalCost / totalCards : 0;
            const tgt = data.showTargets?.[show.id] || {};
            const TARGET = tgt.targetCards || 200;
            const MAX_AVG = tgt.maxAvg || 12.50;
            const pctDone = Math.min(totalCards / TARGET, 1);
            const onBudget = avgCost <= MAX_AVG || totalCards === 0;
            const budgetLeft = Math.max(TARGET * MAX_AVG - totalCost, 0);
            const cardsLeft = Math.max(TARGET - totalCards, 0);
            const tierData = [
              { name: '🟢 Openers', maxBuy: 8, range: '$0-8', target: Math.round(TARGET*0.30), color: C.green },
              { name: '🔵 Core', maxBuy: 14, range: '$8-14', target: Math.round(TARGET*0.50), color: C.cyan },
              { name: '🟣 Premium', maxBuy: 25, range: '$14-25', target: Math.round(TARGET*0.20), color: C.purpleLight },
            ].map(t => {
              const pp = attrP.filter(p => { const a = p.n > 0 ? p.t/p.n : 0; return t.name.includes('Opener') ? a <= 8 : t.name.includes('Core') ? a > 8 && a <= 14 : a > 14; });
              const cards = pp.reduce((s,p)=>s+p.n,0), cost = pp.reduce((s,p)=>s+p.t,0);
              return { ...t, cards, cost, avg: cards > 0 ? cost/cards : 0, pctFilled: t.target > 0 ? Math.min(cards/t.target,1) : 0, remaining: Math.max(t.target-cards,0) };
            });
            return (
              <div key={show.id} style={{ background: C.navyLight, border: `2px solid ${daysOut <= 3 ? C.orange + '88' : C.green + '44'}`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, paddingBottom: 12, borderBottom: `1px solid ${C.navyMid}` }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Radio size={18} color={daysOut <= 3 ? C.orange : C.green} />
                    <div>
                      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, color: C.white, fontWeight: 700 }}>{show.d} · {show.plat}</div>
                      <div style={{ fontSize: 11, color: C.slateDim, marginTop: 2 }}>{show.st} start · {totalCards}/{TARGET} cards · {(pctDone*100).toFixed(0)}%</div>
                    </div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 30, fontWeight: 700, color: daysOut <= 3 ? C.orange : C.green, fontFamily: "'Oswald', sans-serif", lineHeight: 1 }}>
                      {daysOut === 0 ? 'TODAY' : daysOut === 1 ? 'TOMORROW' : `${daysOut}d`}
                    </div>
                    <div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase', marginTop: 2 }}>until show</div>
                  </div>
                </div>
                <div style={{ height: 8, background: C.navy, borderRadius: 4, overflow: 'hidden', marginBottom: 14 }}>
                  <div style={{ height: '100%', width: `${pctDone*100}%`, background: pctDone >= 1 ? C.neon : C.green, borderRadius: 4 }} />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: 8, marginBottom: 14 }}>
                  {[['Spent', fmt(totalCost), C.orange], ['Avg $/Card', totalCards > 0 ? `$${avgCost.toFixed(2)}` : '—', onBudget ? C.neon : C.orange], ['Budget Left', fmt(budgetLeft), budgetLeft > 0 ? C.cyan : C.orange], ['Cards Left', String(cardsLeft), C.cyan]].map(([l,v,cl]) => (
                    <div key={l} style={{ background: C.navy, borderRadius: 8, padding: 10, textAlign: 'center' }}>
                      <div style={{ fontSize: 9, color: C.slateDim, textTransform: 'uppercase', marginBottom: 2 }}>{l}</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: cl }}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 10, marginBottom: 12 }}>
                  {tierData.map(t => (
                    <div key={t.name} style={{ background: C.navy, borderRadius: 8, padding: 12, border: `1px solid ${t.color}33` }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                        <span style={{ color: t.color, fontSize: 12, fontWeight: 700, fontFamily: "'Oswald', sans-serif" }}>{t.name}</span>
                        <span style={{ color: t.pctFilled >= 1 ? C.neon : C.slateDim, fontSize: 11 }}>{t.cards}/{t.target}</span>
                      </div>
                      <div style={{ height: 5, background: '#fff', borderRadius: 3, marginBottom: 6, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: `${t.pctFilled*100}%`, background: t.color, borderRadius: 3 }} />
                      </div>
                      <div style={{ fontSize: 10, color: C.slate }}>Buy: {t.range}</div>
                      {t.cards > 0 && <div style={{ fontSize: 10, color: t.avg <= t.maxBuy ? C.neon : C.orange, marginTop: 2 }}>Avg: ${t.avg.toFixed(2)}</div>}
                      <div style={{ fontSize: 10, color: C.cyan, marginTop: 2 }}>{t.remaining > 0 ? `Need ${t.remaining} more` : '✅ Done'}</div>
                    </div>
                  ))}
                </div>
                <button onClick={() => setAttrShow(show)} style={btnStyle(C.cyan)}>Attribute Purchases ({totalCards})</button>
              </div>
            );
          })}
        </>
      )}

      {showsTab === 'results' && (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: 0 }}>Show Results</h2>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => openSlide('show')} style={{ background: 'rgba(0,0,0,0.04)', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '9px 16px', color: C.slate, fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
                <Radio size={14} /> Log Show
              </button>
              <button onClick={() => openSlide('sale')} style={{ ...btnStyle(C.green), background: C.green, color: C.navy, border: 'none' }}>
                <PlusCircle size={14} /> Log Sale
              </button>
            </div>
          </div>
          {enrichedShows.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(170px, 1fr))', gap: 12, marginBottom: 20 }}>
              <KPI icon={Radio} label="Shows Run" value={enrichedShows.length} color={C.green} />
              <KPI icon={DollarSign} label="Total Gross" value={fmtShort(enrichedShows.reduce((s,x)=>s+x.gross,0))} color={C.greenLight} />
              <KPI icon={TrendingUp} label="Avg Gross/Show" value={fmt(enrichedShows.reduce((s,x)=>s+x.gross,0)/Math.max(enrichedShows.length,1))} color={C.orangeLight} />
              <KPI icon={Users} label="Avg Viewers" value={Math.round(enrichedShows.reduce((s,x)=>s+(x.pv||0),0)/Math.max(enrichedShows.length,1))} color={C.blue} />
              <KPI icon={TrendingUp} label="Followers Gained" value={`+${enrichedShows.reduce((s,x)=>s+(x.nf||0),0).toLocaleString()}`} sub={`${Math.round(enrichedShows.reduce((s,x)=>s+(x.nf||0),0)/Math.max(enrichedShows.length,1))}/show avg`} color={C.neon} />
              {(() => { const withTf = [...enrichedShows].filter(x => x.tf > 0).sort((a,b) => a.d.localeCompare(b.d)); const latest = withTf[withTf.length-1]; const prev = withTf[withTf.length-2]; const growth = latest && prev ? latest.tf - prev.tf : null; return latest ? <KPI icon={Users} label="Current Followers" value={latest.tf.toLocaleString()} sub={growth !== null ? `+${growth} last show` : ''} color={C.purpleLight} /> : null; })()}
            </div>
          )}
          {enrichedShows.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: C.slateDim, background: C.navyLight, borderRadius: 12 }}>No shows logged yet.</div>
          ) : (
            <>
              <div style={{ background: C.navyLight, borderRadius: 12, border: `1px solid ${C.green}33`, padding: 16, overflowX: 'auto', marginBottom: 16 }}>
                <div style={{ color: C.green, fontSize: 13, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12, fontFamily: "'Oswald', sans-serif" }}>Per-Show P&L</div>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 1080 }}>
                  <thead>
                    <tr>
                      {['Date','Platform','DOW','Sold','GV','Gross','Net','Attr Cost','Margin','ROI','Peak','Δ Peak','Tot Views','Tot Foll','Δ Foll',''].map((h,i) => (
                        <th key={i} style={{ padding: '8px 10px', textAlign: 'left', color: C.green, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.green}33`, whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...enrichedShows].sort((a,b)=>b.d.localeCompare(a.d)).map(s => {
                      // V10 — bind dollars to the real Sales row(s); edits write back there.
                      const saleRows = (data.sales || []).filter(x => x.d === s.d && x.p === s.plat);
                      const realGross = saleRows.reduce((a, x) => a + (x.g || 0), 0);
                      const realOrders = saleRows.reduce((a, x) => a + (x.n || 0), 0);
                      const realNet = saleRows.reduce((a, x) => a + (x.net || 0), 0);
                      const realGv = saleRows.reduce((a, x) => a + (x.gv || 0), 0); // V10: giveaways tracked separate from sold
                      const multi = saleRows.length > 1;
                      const sWithSave = { ...s, _onStatSave: (field, val) => data.updateShow(s, { ...s, [field]: val }) }; // V10: editable follower stats
                      // V10 — follower growth = this show's total followers minus the most recent prior show that recorded a total.
                      const priorTf = [...enrichedShows].filter(x => x.tf > 0 && x.d < s.d).sort((a, b) => b.d.localeCompare(a.d))[0];
                      const tfDelta = (s.tf > 0 && priorTf) ? s.tf - priorTf.tf : null;
                      // V10 — peak-viewer growth, measured from the 5/21 show as baseline.
                      const VIEW_BASELINE = '2026-05-21';
                      const priorPv = [...enrichedShows].filter(x => x.pv > 0 && x.d >= VIEW_BASELINE && x.d < s.d).sort((a, b) => b.d.localeCompare(a.d))[0];
                      const pvDelta = (s.pv > 0 && s.d >= VIEW_BASELINE) ? (priorPv ? s.pv - priorPv.pv : 0) : null;
                      const pvIsBase = pvDelta != null && !priorPv; // the baseline show itself
                      const margin = realNet - s.attributedCost;
                      const roi = s.attributedCost > 0 ? margin / s.attributedCost : null;
                      const writeDollars = async (patch) => {
                        const base = saleRows[0] || null;
                        const g = patch.g != null ? patch.g : (base ? base.g : 0);
                        const n = patch.n != null ? patch.n : (base ? base.n : 0);
                        const gv = patch.gv != null ? patch.gv : (base ? (base.gv || 0) : 0); // giveaways: stat only — never touches cost/sales math
                        let net, f;
                        if (patch.net != null) { net = patch.net; f = Math.round((g - net) * 100) / 100; }            // manual net override -> back-solve fees
                        else if (patch.g != null) { f = Math.round(calcFees(s.plat, g) * 100) / 100; net = Math.round((g - f) * 100) / 100; } // gross changed -> recompute
                        else if (base) { net = base.net; f = base.f != null ? base.f : Math.round((g - base.net) * 100) / 100; } // editing sold/gv only -> keep existing net & fees
                        else { f = Math.round(calcFees(s.plat, g) * 100) / 100; net = Math.round((g - f) * 100) / 100; }
                        if (base) await data.updateSale(base, { ...base, g, n, gv, f, net });
                        else await data.addSale({ d: s.d, p: s.plat, n, g, f, net, gv });
                      };
                      const delShow = async () => {
                        const msg = saleRows.length
                          ? `Delete the ${s.d} ${s.plat} show AND its linked sale (${fmt(realGross)} · ${realOrders} orders)? This removes those dollars from P&L. Cannot be undone.`
                          : `Delete the ${s.d} ${s.plat} show record? (No linked sale to remove.)`;
                        if (typeof window !== 'undefined' && !window.confirm(msg)) return;
                        for (const sr of saleRows) { await data.deleteSale(sr); }
                        await data.deleteShow(s);
                      };
                      return (
                      <tr key={s.id} style={{ borderBottom: `1px solid ${C.navyMid}` }}>
                        <td style={{ padding: '8px 10px', color: C.white }}>{s.d}</td>
                        <td style={{ padding: '8px 10px', color: C.slate }}>{s.plat}</td>
                        <td style={{ padding: '8px 10px', color: C.slate }}>{s.dowName}</td>
                        <td style={{ padding: '8px 10px' }}><EditableShowDollar value={realOrders} money={false} color={C.slate} editable={!multi} onSave={(v) => writeDollars({ n: v })} hint={multi ? 'Multiple sale rows this date — edit in Sales tab' : 'Click to edit sold count — writes to Sales'} /></td>
                        <td style={{ padding: '8px 10px' }}><EditableShowDollar value={realGv} money={false} color={C.purpleLight} editable={!multi} onSave={(v) => writeDollars({ gv: v })} hint={multi ? 'Multiple sale rows this date — edit in Sales tab' : 'Click to edit giveaways — stat only, never affects cost or sales totals'} /></td>
                        <td style={{ padding: '8px 10px' }}><EditableShowDollar value={realGross} color={C.green} editable={!multi} onSave={(v) => writeDollars({ g: v })} hint={multi ? 'Multiple sale rows this date — edit in Sales tab' : 'Click to edit gross — fees & net auto-calc into Sales'} /></td>
                        <td style={{ padding: '8px 10px' }}><EditableShowDollar value={realNet} color={C.greenLight} editable={!multi} onSave={(v) => writeDollars({ net: v })} hint={multi ? 'Multiple sale rows this date — edit in Sales tab' : 'Click to edit net directly — overrides the auto fee calc'} /></td>
                        <td style={{ padding: '8px 10px', color: C.orangeLight }}>{s.attributedCost > 0 ? fmt(s.attributedCost) : '—'}</td>
                        <td style={{ padding: '8px 10px', color: margin >= 0 ? C.greenLight : C.orangeLight, fontWeight: 600 }}>{s.attributedCost > 0 ? fmt(margin) : '—'}</td>
                        <td style={{ padding: '8px 10px', color: (roi||0) >= 0 ? C.greenLight : C.orangeLight }}>{roi !== null ? pct(roi) : '—'}</td>
                        <td style={{ padding: '8px 10px' }}><EditableShowStat value={s.pv} show={sWithSave} field="pv" color={C.blue} /></td>
                        <td style={{ padding: '8px 10px', color: pvDelta == null ? C.slateDim : pvIsBase ? C.slateDim : (pvDelta >= 0 ? C.green : C.crimson), fontWeight: 600 }}>{pvDelta == null ? '—' : pvIsBase ? 'base' : (pvDelta >= 0 ? `+${pvDelta}` : pvDelta)}</td>
                        <td style={{ padding: '8px 10px' }}><EditableShowStat value={s.tv} show={sWithSave} field="tv" color={C.cyan} /></td>
                        <td style={{ padding: '8px 10px' }}><EditableShowStat value={s.tf} show={sWithSave} field="tf" color={C.purpleLight} /></td>
                        <td style={{ padding: '8px 10px', color: tfDelta == null ? C.slateDim : (tfDelta >= 0 ? C.green : C.crimson), fontWeight: 600 }}>{tfDelta == null ? '—' : (tfDelta >= 0 ? `+${tfDelta}` : tfDelta)}</td>
                        <td style={{ padding: '4px 8px', whiteSpace: 'nowrap' }}>
                          <button onClick={() => setAttrShow(s)} style={{ background: C.green, border: 'none', borderRadius: 4, padding: '4px 10px', color: C.navy, fontSize: 10, fontWeight: 700, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>Attr</button>
                          <button onClick={delShow} title="Delete show + linked sale" style={{ marginLeft: 6, background: 'transparent', border: `1px solid ${C.crimson}66`, borderRadius: 4, padding: '4px 8px', color: C.crimson, fontSize: 11, fontWeight: 700, cursor: 'pointer' }}><Trash2 size={12} /></button>
                        </td>
                      </tr>
                    ); })}
                  </tbody>
                </table>
              </div>
              <ChartCard title="Show Performance Over Time" height={260}>
                <ResponsiveContainer>
                  <BarChart data={[...enrichedShows].sort((a,b)=>a.d.localeCompare(b.d))}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                    <XAxis dataKey="d" tick={{ fill: C.slateDim, fontSize: 10 }} />
                    <YAxis tick={{ fill: C.slateDim, fontSize: 10 }} tickFormatter={fmtShort} />
                    <Tooltip content={<CustomTooltip />} />
                    <Bar dataKey="gross" name="Gross" fill={C.green} radius={[2,2,0,0]} />
                    <Bar dataKey="net" name="Net" fill={C.greenLight} radius={[2,2,0,0]} />
                    <Bar dataKey="attributedCost" name="Attr Cost" fill={C.orange} radius={[2,2,0,0]} />
                    <Legend wrapperStyle={{ fontSize: 11 }} />
                  </BarChart>
                </ResponsiveContainer>
              </ChartCard>
            </>
          )}
        </>
      )}

      {showsTab === 'analytics' && (
        <>
          <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 20, margin: '0 0 20px 0' }}>Show Analytics</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16 }}>
            <ChartCard title="Avg $/Show by Day of Week" height={240}>
              <ResponsiveContainer>
                <BarChart data={showsByDow.filter(d => d.count > 0)}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                  <XAxis dataKey="name" tick={{ fill: C.slateDim, fontSize: 11 }} />
                  <YAxis tick={{ fill: C.slateDim, fontSize: 10 }} tickFormatter={fmtShort} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="avgGross" name="Avg Gross" fill={CHART_PRIMARY} radius={[2,2,0,0]} />
                  <Bar dataKey="avgAOV" name="Avg AOV" fill={C.blue} radius={[2,2,0,0]} />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>
            <ChartCard title="Avg $/Show by Time Slot" height={240}>
              <ResponsiveContainer>
                <BarChart data={showsByTimeSlot.filter(s => s.count > 0)}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.navyMid} />
                  <XAxis dataKey="name" tick={{ fill: C.slateDim, fontSize: 10 }} />
                  <YAxis tick={{ fill: C.slateDim, fontSize: 10 }} tickFormatter={fmtShort} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="avgGross" name="Avg Gross" fill={C.orangeLight} radius={[2,2,0,0]} />
                  <Bar dataKey="avgAOV" name="Avg AOV" fill={C.purple} radius={[2,2,0,0]} />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>
        </>
      )}

      {attrShow && (() => {
        const showDate = new Date(attrShow.d + 'T12:00:00');
        const windowStart = new Date(showDate.getTime() - 30 * 24 * 60 * 60 * 1000);
        const windowEnd = new Date(showDate.getTime() + 3 * 24 * 60 * 60 * 1000);
        const candidates = data.purchases.filter(p => {
          const pDate = new Date(p.d + 'T12:00:00');
          return pDate <= windowEnd && pDate >= windowStart && (!p.showId || p.showId === attrShow.id);
        }).sort((a,b) => b.d.localeCompare(a.d));
        const totalAttr = candidates.filter(p => p.showId === attrShow.id).reduce((s,p) => s+p.t, 0);
        const totalCards = candidates.filter(p => p.showId === attrShow.id).reduce((s,p) => s+p.n, 0);
        return (
          <div onClick={() => setAttrShow(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(6,13,26,0.88)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <div onClick={e => e.stopPropagation()} style={{ background: C.navyLight, border: `1px solid ${C.cyan}44`, borderRadius: 12, padding: 24, maxWidth: 680, width: '100%', maxHeight: '85vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 18, margin: 0 }}>Attribute → {attrShow.d} · {attrShow.plat}</h2>
                <button onClick={() => setAttrShow(null)} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer' }}><X size={20} /></button>
              </div>
              <div style={{ display: 'flex', gap: 16, marginBottom: 16, padding: '10px 14px', background: C.navy, borderRadius: 8, flexWrap: 'wrap' }}>
                {[['Attr Cards', totalCards, C.cyan], ['Attr Cost', fmt(totalAttr), C.orangeLight], ['Show Net', fmt(attrShow.net), C.greenLight], ['Margin', fmt(attrShow.net - totalAttr), (attrShow.net - totalAttr) >= 0 ? C.greenLight : C.orangeLight]].map(([l,v,cl]) => (
                  <div key={l}><div style={{ color: C.slateDim, fontSize: 10, textTransform: 'uppercase' }}>{l}</div><div style={{ color: cl, fontWeight: 700, fontSize: 16 }}>{v}</div></div>
                ))}
              </div>
              {candidates.length === 0 ? (
                <div style={{ padding: 30, textAlign: 'center', color: C.slateDim }}>No purchases in the 30-day window.</div>
              ) : (
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                    <thead>
                      <tr>
                        {['','Date','Source','Seller','# Cards','Total','Avg'].map((h,i) => (
                          <th key={i} style={{ padding: '8px 10px', textAlign: 'left', color: C.cyan, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.cyan}33` }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {candidates.map((p,i) => {
                        const isAttr = p.showId === attrShow.id;
                        return (
                          <tr key={i} style={{ borderBottom: `1px solid ${C.navyMid}`, background: isAttr ? `${C.cyan}11` : 'transparent', cursor: 'pointer' }}
                            onClick={() => data.attributePurchase(p, isAttr ? null : attrShow.id)}>
                            <td style={{ padding: '8px 10px', textAlign: 'center' }}>
                              <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${isAttr ? C.cyan : C.slateDim}`, background: isAttr ? C.cyan : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.navy, fontWeight: 700, fontSize: 12 }}>{isAttr ? '✓' : ''}</div>
                            </td>
                            <td style={{ padding: '8px 10px', color: C.white }}>{p.d}</td>
                            <td style={{ padding: '8px 10px', color: C.slate }}>{p.s}</td>
                            <td style={{ padding: '8px 10px', color: C.slateDim }}>{p.sl || '—'}</td>
                            <td style={{ padding: '8px 10px', color: C.slate }}>{p.n}</td>
                            <td style={{ padding: '8px 10px', color: C.orangeLight }}>{fmt(p.t)}</td>
                            <td style={{ padding: '8px 10px', color: C.slateDim }}>{p.n > 0 ? fmt(p.t/p.n) : '—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 16 }}>
                <button onClick={() => setAttrShow(null)} style={{ background: C.cyan, border: 'none', borderRadius: 8, padding: '10px 20px', color: C.navy, fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>Done</button>
              </div>
            </div>
          </div>
        );
      })()}
      {showsTab === 'planner' && (
        <BudgetPlanner data={data} enrichedShows={enrichedShows} />
      )}
    </>
  );
}


function PSAMode({ data, psaData, psaStats, perSubStats, psaTab, setPsaTab, activeSub, setActiveSub }) {
  const [showAddSub, setShowAddSub] = useState(false);
  const [newSubName, setNewSubName] = useState('');
  const [renamingSubId, setRenamingSubId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [showAddCard, setShowAddCard] = useState(false);
  const [editingCard, setEditingCard] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [psaReturnModal, setPsaReturnModal] = useState(null);
  const [psaReturnStep, setPsaReturnStep] = useState(0);
  const [psaReturnForms, setPsaReturnForms] = useState({});
  const [cardForm, setCardForm] = useState({ player: '', year: '2025', set: 'Prizm', card: '', parallel: '', rawTarget: '', comp10: '', acqSource: 'new', note: '' });
  const editFormRef = useCallback(node => { if (node) node.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, [editingCard]);

  const resetForm = () => { setCardForm({ player: '', year: '2025', set: 'Prizm', card: '', parallel: '', rawTarget: '', comp10: '', acqSource: 'new' }); };

  const handleAddCard = () => {
    if (!cardForm.player || !cardForm.rawTarget || !cardForm.comp10) return;
    const newId = `c_${Date.now()}`;
    data.addPsaCard(activeSub, {
      id: newId, player: cardForm.player, year: cardForm.year, set: cardForm.set,
      card: cardForm.card, parallel: cardForm.parallel,
      rawTarget: parseFloat(cardForm.rawTarget), comp10: parseFloat(cardForm.comp10),
      rawActual: null, status: 'hunting', acqSource: cardForm.acqSource, note: cardForm.note || '',
    });
    resetForm();
    setShowAddCard(false);
  };

  const handleEditCard = () => {
    if (!cardForm.player || !cardForm.rawTarget || !cardForm.comp10) return;
    data.updatePsaCard(activeSub, editingCard.id, {
      player: cardForm.player, year: cardForm.year, set: cardForm.set,
      card: cardForm.card, parallel: cardForm.parallel,
      rawTarget: parseFloat(cardForm.rawTarget), comp10: parseFloat(cardForm.comp10),
      acqSource: cardForm.acqSource, note: cardForm.note || '',
    });
    setEditingCard(null);
    resetForm();
  };

  const startEdit = (card) => {
    setEditingCard(card);
    setShowAddCard(false);
    setCardForm({
      player: card.player, year: card.year, set: card.set,
      card: card.card, parallel: card.parallel,
      rawTarget: String(card.rawTarget), comp10: String(card.comp10),
      acqSource: card.acqSource || 'new', note: card.note || '',
    });
  };

  const tabs = [
    { id: 'sub', label: 'Sub Manager', icon: Package },
    { id: 'slabs', label: 'Slab Inventory', icon: Award },
    { id: 'overview', label: 'P&L Overview', icon: TrendingUp },
  ];
  const currentSub = psaData.subs.find(s => s.id === activeSub) || psaData.subs[0];

  const cardFormUI = (
    <div ref={editFormRef} style={{ background: C.navyLight, borderRadius: 12, padding: 20, marginBottom: 16, border: `1px solid ${editingCard ? C.blueLight : C.cyan}55` }}>
      {editingCard && <div style={{ color: C.blueLight, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>✎ Editing: {editingCard.player} · {editingCard.card}</div>}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: 12, alignItems: 'end' }}>
        <FormField label="Player"><input type="text" value={cardForm.player} onChange={e => setCardForm({...cardForm, player: e.target.value})} placeholder="Omarion Hampton" style={inputStyle} /></FormField>
        <FormField label="Year"><input type="text" value={cardForm.year} onChange={e => setCardForm({...cardForm, year: e.target.value})} placeholder="2025" style={inputStyle} /></FormField>
        <FormField label="Set"><select value={cardForm.set} onChange={e => setCardForm({...cardForm, set: e.target.value})} style={selectStyle}>
          {['Prizm','Optic','Mosaic','Select','Phoenix','Revolution','Absolute','Luminance','Other'].map(s => <option key={s} value={s}>{s}</option>)}
        </select></FormField>
        <FormField label="Card / Insert"><input type="text" value={cardForm.card} onChange={e => setCardForm({...cardForm, card: e.target.value})} placeholder="Rookie Autographs Red Wave" style={inputStyle} /></FormField>
        <FormField label="Parallel"><input type="text" value={cardForm.parallel} onChange={e => setCardForm({...cardForm, parallel: e.target.value})} placeholder="/149" style={inputStyle} /></FormField>
        <FormField label="Raw Target $"><input type="number" step="0.01" value={cardForm.rawTarget} onChange={e => setCardForm({...cardForm, rawTarget: e.target.value})} placeholder="100" style={inputStyle} /></FormField>
        <FormField label="PSA 10 Comp $"><input type="number" step="0.01" value={cardForm.comp10} onChange={e => setCardForm({...cardForm, comp10: e.target.value})} placeholder="400" style={inputStyle} /></FormField>
        <FormField label="Source"><select value={cardForm.acqSource} onChange={e => setCardForm({...cardForm, acqSource: e.target.value})} style={selectStyle}>
          <option value="new">New Buy</option>
          <option value="inventory">Inventory</option>
          <option value="card_show">Card Show</option>
          <option value="other">Other</option>
        </select></FormField>
        <FormField label="Note"><input type="text" value={cardForm.note} onChange={e => setCardForm({...cardForm, note: e.target.value})} placeholder="Optional note" style={inputStyle} /></FormField>
        <div>
          <button onClick={editingCard ? handleEditCard : handleAddCard} style={btnStyle()}>
            <PlusCircle size={14} /> {editingCard ? 'Save' : 'Add Card'}
          </button>
        </div>
        {(editingCard || showAddCard) && (
          <div>
            <button onClick={() => { setEditingCard(null); setShowAddCard(false); resetForm(); }}
              style={{ ...btnStyle(C.orange), background: 'transparent', border: `1px solid ${C.orange}`, color: C.orangeLight }}>
              <X size={14} /> Cancel
            </button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <>
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, background: C.navyLight, padding: 4, borderRadius: 10 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setPsaTab(t.id)}
            style={{ background: psaTab === t.id ? C.orange : 'transparent', color: psaTab === t.id ? '#fff' : C.slate, border: 'none', borderRadius: 6, padding: '8px 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>
            <t.icon size={13} /> {t.label}
          </button>
        ))}
      </div>

      {psaTab === 'sub' && currentSub && (
        <>
          {/* ADD SUB MODAL */}
          {showAddSub && (
            <div style={{ background: C.navyLight, border: `1px solid ${C.cyan}55`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
              <div style={{ color: C.cyan, fontSize: 13, fontWeight: 700, textTransform: 'uppercase', fontFamily: "'Oswald', sans-serif", marginBottom: 12 }}>New PSA Submission</div>
              <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end' }}>
                <div style={{ flex: 1 }}>
                  <label style={{ color: C.slate, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', display: 'block', marginBottom: 4 }}>Sub Name</label>
                  <input type="text" value={newSubName} onChange={e => setNewSubName(e.target.value)}
                    placeholder="e.g. PSA Sub #2 — May 2026"
                    onKeyDown={async e => { if (e.key === 'Enter' && newSubName.trim()) { const id = await data.addPsaSub(newSubName.trim()); setActiveSub(id); setNewSubName(''); setShowAddSub(false); }}}
                    style={{ background: C.navy, border: `1px solid ${C.navyMid}`, borderRadius: 8, padding: '10px 12px', color: C.white, fontSize: 14, outline: 'none', width: '100%', boxSizing: 'border-box' }} />
                </div>
                <button onClick={async () => { if (newSubName.trim()) { const id = await data.addPsaSub(newSubName.trim()); setActiveSub(id); setNewSubName(''); setShowAddSub(false); }}}
                  style={{ background: C.cyan, border: 'none', borderRadius: 8, padding: '10px 20px', color: C.navy, fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>
                  Create
                </button>
                <button onClick={() => { setShowAddSub(false); setNewSubName(''); }}
                  style={{ background: 'transparent', border: `1px solid ${C.orange}`, borderRadius: 8, padding: '10px 14px', color: C.orangeLight, fontSize: 13, cursor: 'pointer' }}>
                  Cancel
                </button>
              </div>
            </div>
          )}

          {/* RENAME SUB INLINE */}
          {renamingSubId && (
            <div style={{ background: C.navyLight, border: `1px solid ${C.blueLight}55`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ color: C.blueLight, fontSize: 12, fontWeight: 700, textTransform: 'uppercase', marginBottom: 10 }}>✎ Rename Sub</div>
              <div style={{ display: 'flex', gap: 10 }}>
                <input type="text" value={renameValue} onChange={e => setRenameValue(e.target.value)}
                  onKeyDown={async e => { if (e.key === 'Enter') { await data.renamePsaSub(renamingSubId, renameValue); setRenamingSubId(null); }}}
                  style={{ flex: 1, background: C.navy, border: `1px solid ${C.blueLight}`, borderRadius: 8, padding: '8px 12px', color: C.white, fontSize: 13, outline: 'none' }} />
                <button onClick={async () => { await data.renamePsaSub(renamingSubId, renameValue); setRenamingSubId(null); }}
                  style={{ background: C.blueLight, border: 'none', borderRadius: 8, padding: '8px 16px', color: C.navy, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: "'Oswald', sans-serif" }}>
                  Save
                </button>
                <button onClick={() => setRenamingSubId(null)}
                  style={{ background: 'transparent', border: `1px solid ${C.slateDim}`, borderRadius: 8, padding: '8px 12px', color: C.slateDim, fontSize: 12, cursor: 'pointer' }}>
                  Cancel
                </button>
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
            {psaData.subs.map(sub => {
              const statusColors = { building: C.cyan, submitted: C.gold, returned: C.neon };
              const statusLabels = { building: '🔨 Building', submitted: '📦 With PSA', returned: '✅ Returned' };
              const sc = statusColors[sub.status] || C.cyan;
              return (
                <div key={sub.id} onClick={() => setActiveSub(sub.id)} style={{ padding: '14px 20px', background: activeSub === sub.id ? C.navyMid : C.navyLight, border: `1.5px solid ${activeSub === sub.id ? sc : C.navyMid}`, borderRadius: 10, cursor: 'pointer', flex: 1, minWidth: 260 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                    <span style={{ fontSize: 10, color: C.slateDim, textTransform: 'uppercase' }}>{sub.cards.length} cards</span>
                    <span style={{ fontSize: 10, color: sc, fontWeight: 700 }}>{statusLabels[sub.status] || sub.status}</span>
                  </div>
                  <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, color: C.white, fontWeight: 600 }}>{sub.name}</div>
                </div>
              );
            })}
            <div onClick={() => { setShowAddSub(true); setShowAddCard(false); setEditingCard(null); }}
              style={{ padding: '14px 20px', background: C.navyLight, border: `2px dashed ${C.cyan}44`, borderRadius: 10, cursor: 'pointer', flex: '0 0 auto', minWidth: 160, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, color: C.cyan }}>
              <PlusCircle size={16} />
              <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600 }}>New Sub</span>
            </div>
          </div>

          {/* Sub header with status + action buttons */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <h2 style={{ fontFamily: "'Oswald', sans-serif", color: C.white, fontSize: 18, margin: 0 }}>{currentSub.name} · {currentSub.cards.length} cards</h2>
              <button onClick={() => { setRenamingSubId(currentSub.id); setRenameValue(currentSub.name); setShowAddSub(false); }}
                style={{ background: 'transparent', border: `1px solid ${C.blueLight}44`, borderRadius: 6, padding: '3px 10px', color: C.blueLight, fontSize: 10, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>
                ✎ Rename
              </button>
              {psaData.subs.length > 1 && (
                <button onClick={() => { if (confirm('Delete this sub and all its cards? This cannot be undone.')) { data.deletePsaSub(currentSub.id); setActiveSub(psaData.subs.find(s => s.id !== currentSub.id)?.id); }}}
                  style={{ background: 'transparent', border: `1px solid ${C.orange}44`, borderRadius: 6, padding: '3px 10px', color: C.orangeLight, fontSize: 10, cursor: 'pointer', fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>
                  🗑 Delete
                </button>
              )}
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {currentSub.status === 'building' && currentSub.cards.length > 0 && (
                <button onClick={() => {
                  if (confirm('Submit ' + currentSub.cards.length + ' cards to PSA? This will:\n• Mark sub as "With PSA"\n• Lock grading cost into P&L ($' + (currentSub.cards.length * 24.99).toFixed(2) + ')\n\nCards can still be added after submission.')) {
                    data.updatePsaCard && psaData.subs.forEach(s => {
                      if (s.id === currentSub.id) {
                        const next = { ...psaData, subs: psaData.subs.map(sub => sub.id === currentSub.id ? { ...sub, status: 'submitted', submissionDate: today() } : sub) };
                        data.updatePsaCard(currentSub.id, currentSub.cards[0]?.id, {}).then ? null :null;
                      }
                    });
                    // Direct update via the psa save
                    const next = { ...psaData, subs: psaData.subs.map(sub => sub.id === currentSub.id ? { ...sub, status: 'submitted', submissionDate: today() } : sub) };
                    window.storage.set(KEYS.psa, JSON.stringify(next)).then(() => location.reload());
                  }
                }} style={{ ...btnStyle(C.gold), background: `${C.gold}22` }}>
                  <Award size={14} /> Submit to PSA
                </button>
              )}
              {currentSub.status === 'submitted' && (
                <button onClick={() => {
                  const forms = {};
                  currentSub.cards.forEach(card => {
                    forms[card.id] = { grader: 'PSA', grade: '10', costBasis: card.rawActual != null ? String(card.rawActual) : '', comp: String(card.comp10 || ''), status: 'holding', notes: card.note || '', skip: false };
                  });
                  setPsaReturnForms(forms); setPsaReturnStep(0); setPsaReturnModal({ sub: currentSub });
                }} style={{ ...btnStyle(C.neon), background: `${C.neon}22` }}>
                  <Check size={14} /> Mark Returned
                </button>
              )}
              {currentSub.status === 'returned' && (
                <button onClick={() => {
                  setPsaTab('slabs');
                }} style={{ ...btnStyle(C.purpleLight), background: `${C.purpleLight}22` }}>
                  <ArrowRight size={14} /> Go to Slab Inventory
                </button>
              )}

                    <div style={{ display: 'flex', gap: 14, marginTop: 6 }}>

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>

                      <FormField label="Grader"><select value={cf.grader || 'PSA'} onChange={e => setCF({ grader: e.target.value })} style={selectStyle}>{['PSA','SGC','Beckett','CGC'].map(g => <option key={g} value={g}>{g}</option>)}</select></FormField>

                      <FormField label="Cost Basis $"><input type="number" step="0.01" value={cf.costBasis || ''} onChange={e => setCF({ costBasis: e.target.value })} placeholder={currentCard.rawActual != null ? String(currentCard.rawActual) : '0'} style={inputStyle} /></FormField>
