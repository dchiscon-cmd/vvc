// ---- Show pool: per-show sourcing builder -----------------------------------
function ShowPool({ enrichedShows, purchases, showTargets, saveShowTargets, openSlide }) {
  const todayStr = new Date().toISOString().split('T')[0];
  const upcoming = (enrichedShows || []).filter(s => s.d >= todayStr).sort((a, b) => a.d.localeCompare(b.d));
  const [sel, setSel] = React.useState(upcoming[0]?.id || '');
  const show = upcoming.find(s => s.id === sel) || upcoming[0];
  if (!show) return null;

  const attr = (purchases || []).filter(p => p.showId === show.id);
  const cards = attr.reduce((s, p) => s + (p.n || 0), 0);
  const cost = attr.reduce((s, p) => s + (p.t || 0), 0);
  const tgt = (showTargets || {})[show.id] || {};
  const TARGET = tgt.targetCards || 200;
  const MAX_AVG = tgt.maxAvg || 12.5;
  const avg = cards > 0 ? cost / cards : 0;
  const pctDone = Math.min(cards / TARGET, 1);
  const onBudget = avg <= MAX_AVG || cards === 0;
  const budgetLeft = TARGET * MAX_AVG - cost;
  const daysOut = Math.ceil((new Date(show.d + 'T12:00:00') - new Date()) / (1000 * 60 * 60 * 24));

  // Tier breakdown of the pool
  const tiers = { opener: { c: 0, $: 0 }, core: { c: 0, $: 0 }, premium: { c: 0, $: 0 } };
  attr.forEach(p => { const a = p.n > 0 ? p.t / p.n : p.t; const t = tierOf(a); tiers[t].c += (p.n || 0); tiers[t].$ += (p.t || 0); });

  const Stat = ({ label, value, sub, color }) => (
    <div style={{ background: C.bg, borderRadius: 10, padding: '12px 14px' }}>
      <div style={{ fontSize: 10, color: C.slateDim, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: color || C.white, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 10, color: C.slateDim, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  // Per-tier targets (default: 60 openers, 80 core, 60 premium = 200 total)
  const tierTargets = {
    opener:  tgt.openerTarget  ?? 60,
    core:    tgt.coreTarget    ?? 80,
    premium: tgt.premiumTarget ?? 60,
  };

  return (
    <div className="vvc-card" style={{ background: C.navyLight, border: `2px solid ${daysOut <= 3 ? C.orange + '88' : 'rgba(0,0,0,0.08)'}`, borderRadius: 16, padding: 20, marginBottom: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Radio size={18} color={daysOut <= 3 ? C.orange : C.cyan} />
          <div>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 700, color: C.white, margin: 0 }}>Show Pool Builder</h3>
            <div style={{ fontSize: 11, color: C.slateDim, marginTop: 2 }}>{daysOut <= 0 ? 'Today' : daysOut === 1 ? 'Tomorrow' : `${daysOut} days out`} · live as you assign cards</div>
          </div>
        </div>
        {upcoming.length > 1 && (
          <select value={sel} onChange={e => setSel(e.target.value)} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 980, padding: '7px 12px', fontSize: 12, fontWeight: 600, color: C.white, cursor: 'pointer' }}>
            {upcoming.map(s => <option key={s.id} value={s.id}>{s.d} · {s.plat}</option>)}
          </select>
        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12, marginBottom: 16 }}>
        <Stat label="Cards Sourced" value={<>{cards}<span style={{ color: C.slateDim, fontSize: 13 }}>/{TARGET}</span></>} sub={`${(pctDone * 100).toFixed(0)}% of target`} />
        <Stat label="Pool Cost" value={fmtShort(cost)} sub={`avg ${fmt(avg)}/card`} color={C.cyan} />
        <Stat label="Avg $/Card" value={cards > 0 ? fmt(avg) : '—'} sub={`max ${fmt(MAX_AVG)}`} color={onBudget ? C.green : C.orange} />
        <Stat label="Budget Left" value={fmt(Math.max(budgetLeft, 0))} sub={`of ${fmt(TARGET * MAX_AVG)}`} color={budgetLeft > 0 ? C.cyan : C.orange} />
        <Stat label="Cards Left" value={Math.max(TARGET - cards, 0)} sub="to hit target" />
      </div>

      <div style={{ height: 8, background: C.bg, borderRadius: 4, overflow: 'hidden', marginBottom: 16 }}>
        <div style={{ height: '100%', width: `${pctDone * 100}%`, background: pctDone >= 1 ? C.green : C.cyan, borderRadius: 4, transition: 'width .3s' }} />
      </div>

      {/* Tier breakdown with targets + price range reminders */}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        {['opener', 'core', 'premium'].map(t => {
          const meta = TIER_META[t];
          const have = tiers[t].c;
          const want = tierTargets[t];
          const pct = want > 0 ? Math.min(have / want, 1) : (have > 0 ? 1 : 0);
          const hit = have >= want;
          const over = have > want;
          return (
            <div key={t} style={{ flex: 1, minWidth: 150, background: C.bg, borderRadius: 10, padding: '12px 14px', borderLeft: `3px solid ${meta.color}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <div style={{ fontSize: 11, color: C.white, fontWeight: 600 }}>{meta.label}</div>
                <div style={{ fontSize: 10, color: C.slateDim, fontWeight: 500, background: `${meta.color}18`, borderRadius: 980, padding: '2px 7px' }}>{meta.range}</div>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, color: hit ? C.green : C.white, marginTop: 2 }}>
                {have}<span style={{ fontSize: 11, color: C.slateDim, fontWeight: 500 }}>/{want}</span>
              </div>
              <div style={{ height: 5, background: 'rgba(0,0,0,0.15)', borderRadius: 3, overflow: 'hidden', marginTop: 6 }}>
                <div style={{ height: '100%', width: `${pct * 100}%`, background: over ? C.orange : hit ? C.green : meta.color, borderRadius: 3, transition: 'width .3s' }} />
              </div>
              <div style={{ fontSize: 10, color: C.slateDim, marginTop: 4 }}>
                {fmt(tiers[t].$)}{have > 0 ? ` · avg ${fmt(tiers[t].$ / have)}` : ''}{!hit ? ` · ${want - have} to go` : over ? ` · ${have - want} over` : ' · hit'}
              </div>
            </div>
          );
        })}
      </div>

      {cards === 0 && (
        <div style={{ marginTop: 14, fontSize: 12, color: C.slateDim, textAlign: 'center', lineHeight: 1.6 }}>
          No cards assigned to this show yet. Assign in-hand stock from the <b style={{ color: C.white }}>Buy → Pipeline</b> screen.
        </div>
      )}
    </div>
  );
}

// ---- Whatnot card ledger: every card, tier-classified, filterable -----------
function WhatnotLedger({ data, enrichedShows }) {
  const [tierFilter, setTierFilter] = React.useState('all');
  const [era, setEra] = React.useState('all');
  const [recv, setRecv] = React.useState('all'); // V10: 'all' | 'pending' | 'inhand'
  const [q, setQ] = React.useState('');
  const [sortCol, setSortCol] = React.useState('date');
  const [sortDir, setSortDir] = React.useState('desc');
  const trackingStart = (data.baseline && data.baseline.trackingStart) || '2026-04-11';

  const withTier = React.useMemo(() => (data.purchases || [])
    .filter(p => p.s === 'Whatnot')
    .map(p => { const ppc = p.n > 0 ? p.t / p.n : p.t; return { ...p, ppc, tier: tierOf(ppc) }; }), [data.purchases]);

  const sum = { opener: { cards: 0, cost: 0 }, core: { cards: 0, cost: 0 }, premium: { cards: 0, cost: 0 } };
  withTier.forEach(p => { sum[p.tier].cards += p.n || 0; sum[p.tier].cost += p.t || 0; });
  const totalCards = withTier.reduce((s, p) => s + (p.n || 0), 0);
  const totalCost = withTier.reduce((s, p) => s + (p.t || 0), 0);
  const pendingCards = withTier.filter(p => p.received === false).reduce((s, p) => s + (p.n || 0), 0); // V10

  const { shown, rowCount } = React.useMemo(() => {
    let rows = withTier;
    if (tierFilter !== 'all') rows = rows.filter(p => p.tier === tierFilter);
    if (era === 'legacy') rows = rows.filter(p => p.d < trackingStart);
    if (era === 'tracking') rows = rows.filter(p => p.d >= trackingStart);
    if (recv === 'pending') rows = rows.filter(p => p.received === false);
    if (recv === 'inhand') rows = rows.filter(p => p.received !== false);
    if (q.trim()) { const s = q.trim().toLowerCase(); rows = rows.filter(p => (p.sl || '').toLowerCase().includes(s)); }
    rows = [...rows].sort((a, b) => {
      let va, vb;
      if (sortCol === 'date') { va = a.d; vb = b.d; }
      else if (sortCol === 'seller') { va = (a.sl || '').toLowerCase(); vb = (b.sl || '').toLowerCase(); }
      else if (sortCol === 'cost') { va = a.t; vb = b.t; }
      else { va = a.ppc; vb = b.ppc; }
      const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
      return sortDir === 'asc' ? cmp : -cmp;
    });
    const CAP = 400;
    return { shown: rows.slice(0, CAP), rowCount: rows.length };
  }, [withTier, tierFilter, era, recv, q, sortCol, sortDir, trackingStart]);

  const dest = (p) => {
    const sid = p.showId;
    if (!sid || sid === '__hold') return '⏸ Hold';

    const d = findDest(sid); if (d) return d.label.replace(/^[^ ]+ /, '');
    const sh = (enrichedShows || []).find(x => x.id === sid);

  const Th = ({ col, children, align }) => (
    <th onClick={() => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir(col === 'date' ? 'desc' : 'asc'); } }}

      {children} {sortCol === col ? (sortDir === 'desc' ? '▼' : '▲') : ''}
    </th>
  );

  return (
    <div>
      <div style={{ marginBottom: 14 }}>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 19, fontWeight: 700, color: C.white, margin: 0 }}>Whatnot Card Ledger</h2>
        <p style={{ fontSize: 12.5, color: C.slateDim, margin: '4px 0 0' }}>Every Whatnot card, tier-classified by its own price. {totalCards.toLocaleString()} cards · {fmt(totalCost)} all-time.</p>
      </div>

      {/* Tier summary — click to filter */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10, marginBottom: 14 }}>
        {[['all', 'All Cards', C.cyan, totalCards, totalCost],
          ['opener', TIER_META.opener.label, TIER_META.opener.color, sum.opener.cards, sum.opener.cost],
          ['core', TIER_META.core.label, TIER_META.core.color, sum.core.cards, sum.core.cost],
          ['premium', TIER_META.premium.label, TIER_META.premium.color, sum.premium.cards, sum.premium.cost]].map(([id, label, color, c, cost]) => (
          <button key={id} onClick={() => setTierFilter(id)}
            style={{ textAlign: 'left', background: tierFilter === id ? `${color}1a` : C.navyLight, border: `1px solid ${tierFilter === id ? color : 'rgba(0,0,0,0.08)'}`, borderRadius: 12, padding: '12px 14px', cursor: 'pointer', transition: 'all .15s' }}>
            <div style={{ fontSize: 11, color: C.slate, fontWeight: 600 }}>{label}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.white, marginTop: 3, lineHeight: 1 }}>{c.toLocaleString()}</div>
            <div style={{ fontSize: 11, color: C.slateDim, marginTop: 4 }}>{fmt(cost)} · {totalCost > 0 ? ((cost / totalCost) * 100).toFixed(0) : 0}% spend</div>
            <div style={{ height: 4, background: C.bg, borderRadius: 2, marginTop: 8, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${totalCards > 0 ? (c / totalCards) * 100 : 0}%`, background: color }} />
            </div>
          </button>
        ))}
      </div>

      {/* Filters */}
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', marginBottom: 12 }}>

        </div>
        <span style={{ fontSize: 11.5, color: C.slateDim, marginLeft: 'auto' }}>

        </span>

      <div style={{ background: C.navyLight, borderRadius: 12, border: `1px solid ${C.cyan}22`, padding: 12, overflowX: 'auto' }}>

          </tr></thead>
          <tbody>

              <tr key={p.id || i} style={{ borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
                <td style={{ padding: '7px 10px', color: C.white, whiteSpace: 'nowrap' }}>{p.d}</td>

// ---- V10: Unified Purchase Ledger — all sources, per-card, filterable -------
// Merges the former "Cards" (Whatnot-only per-card ledger) and "Purchases"
// (all-source seller summary) into one source of truth: per-card by default,
// with a group-by-seller toggle. Respects the global time filter but banners
// exactly how many rows it hides, so totals are never silently wrong.
function PurchaseLedger({ data, filteredP, window_, enrichedShows, openSlide }) {
  const [tierFilter, setTierFilter] = React.useState('all');
  const [recv, setRecv] = React.useState('all');   // all | pending | inhand
  const [source, setSource] = React.useState('all');
  const [destF, setDestF] = React.useState('all');  // all | unattributed | __hold | __legacy | <showId>
  const [q, setQ] = React.useState('');
  const [grouped, setGrouped] = React.useState(false);
  const [sortCol, setSortCol] = React.useState('date');
  const [sortDir, setSortDir] = React.useState('desc');

  const withTier = React.useMemo(() => (filteredP || [])
    .map(p => { const ppc = p.n > 0 ? p.t / p.n : p.t; return { ...p, ppc, tier: tierOf(ppc) }; }), [filteredP]);
  const sources = React.useMemo(() => [...new Set((data.purchases || []).map(p => p.s))].sort(), [data.purchases]);

  // Everything except the tier filter (so the tier tiles always show full counts).
  const preTier = withTier.filter(p => {
    if (recv === 'pending' && p.received !== false) return false;
    if (recv === 'inhand' && p.received === false) return false;
    if (source !== 'all' && p.s !== source) return false;
    if (destF === 'unattributed' && p.showId) return false;
    if (destF !== 'all' && destF !== 'unattributed' && p.showId !== destF) return false;
    if (q.trim() && !(p.sl || '').toLowerCase().includes(q.trim().toLowerCase())) return false;
    return true;
  });
  const sum = { opener: { cards: 0, cost: 0 }, core: { cards: 0, cost: 0 }, premium: { cards: 0, cost: 0 } };
  preTier.forEach(p => { sum[p.tier].cards += p.n || 0; sum[p.tier].cost += p.t || 0; });
  const totalCards = preTier.reduce((s, p) => s + (p.n || 0), 0);
  const totalCost = preTier.reduce((s, p) => s + (p.t || 0), 0);
  const pendingCards = preTier.filter(p => p.received === false).reduce((s, p) => s + (p.n || 0), 0);

  let rows = tierFilter !== 'all' ? preTier.filter(p => p.tier === tierFilter) : preTier;
  rows = [...rows].sort((a, b) => {
    let va, vb;
    if (sortCol === 'date') { va = a.d; vb = b.d; }
    else if (sortCol === 'seller') { va = (a.sl || '').toLowerCase(); vb = (b.sl || '').toLowerCase(); }
    else if (sortCol === 'cost') { va = a.t; vb = b.t; }
    else if (sortCol === 'source') { va = a.s || ''; vb = b.s || ''; }

// ---- V9/V10: Show Close-Out — gross + cards + show stats; updates existing show
function ShowQuickClose({ data }) {
  const today = new Date().toISOString().split('T')[0];
  const [g, setG] = React.useState('');
  const [n, setN] = React.useState('');
  const [gv, setGv] = React.useState('');
  const [d, setD] = React.useState(today);
  const [showStats, setShowStats] = React.useState(false); // V10: reveal performance fields
  const [pv, setPv] = React.useState('');
  const [tv, setTv] = React.useState('');
  const [nf, setNf] = React.useState('');
  const [tf, setTf] = React.useState('');
  const [sh, setSh] = React.useState('');
  const [dur, setDur] = React.useState('');
  const [note, setNote] = React.useState('');
  const [saved, setSaved] = React.useState(false);
  const gross = parseFloat(g) || 0;
  const fees = gross > 0 ? Math.round(calcFees('Whatnot', gross) * 100) / 100 : 0;
  const net = Math.round((gross - fees) * 100) / 100;
  // V10 — does a show record already exist for this date? (e.g. the seeded June 11 show)
  const existing = (data.shows || []).find(s => s.d === d && s.plat === 'Whatnot');
  const existingSale = (data.sales || []).find(s => s.d === d && s.p === 'Whatnot');
  const save = async () => {
    const cards = parseInt(n) || 0;
    if (gross <= 0 || cards <= 0) return;
    await data.addSale({ d, p: 'Whatnot', n: cards, g: gross, f: fees, net, gv: parseInt(gv) || 0 });
    // Collect any stats the user entered; only overwrite a field when they typed something.
    const num = (v) => (v === '' || v == null ? null : (parseInt(v) || 0));
    const stats = { pv: num(pv), tv: num(tv), nf: num(nf), tf: num(tf), sh: num(sh), dur: num(dur) };
    if (existing) {
      // Update the existing record (keeps its id + any stats already there); fill in
      // only the fields the user supplied this time.
      const merged = { ...existing, status: 'complete' };
      Object.entries(stats).forEach(([k, v]) => { if (v != null) merged[k] = v; });
      if (note.trim()) merged.note = note.trim();
      await data.updateShow(existing, merged);
    } else {
      await data.addShow({ d, plat: 'Whatnot', st: '21:00',
        dur: stats.dur ?? 0, pv: stats.pv ?? 0, tv: stats.tv ?? 0, nf: stats.nf ?? 0, tf: stats.tf ?? 0, sh: stats.sh ?? 0,
        status: 'complete', note: note.trim() || 'quick-close' });
    }
    setSaved(true);
    setTimeout(() => { setG(''); setN(''); setGv(''); setPv(''); setTv(''); setNf(''); setTf(''); setSh(''); setDur(''); setNote(''); setSaved(false); }, 1600);
  };
  const inp = (v, set, ph, w) => (
    <input type="number" inputMode="decimal" value={v} onChange={e => set(e.target.value)} placeholder={ph}
      style={{ width: w, background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 9, padding: '9px 10px', fontSize: 13.5, fontWeight: 600, color: C.white, outline: 'none' }} />
  );
  const statInp = (v, set, ph) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
      <span style={{ fontSize: 10, color: C.slateDim, fontWeight: 600 }}>{ph}</span>
      <input type="number" inputMode="numeric" value={v} onChange={e => set(e.target.value)} placeholder="—"
        style={{ width: 92, background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 9, padding: '8px 10px', fontSize: 13, fontWeight: 600, color: C.white, outline: 'none' }} />
    </div>
  );
  return (
    <div style={{ background: C.navyLight, border: `1px solid ${C.green}33`, borderRadius: 14, padding: '14px 16px', marginBottom: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
        <Radio size={15} color={C.green} />
        <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 700, color: C.white, textTransform: 'uppercase', letterSpacing: '0.03em' }}>Close Out a Show</span>
        <span style={{ fontSize: 11, color: C.slateDim }}>· Whatnot fees auto-calculated</span>
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
        <input type="date" value={d} onChange={e => setD(e.target.value)} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 9, padding: '9px 10px', fontSize: 12.5, color: C.white }} />
        {inp(g, setG, 'Gross $', 95)}
        {inp(n, setN, 'Cards sold', 90)}
        {inp(gv, setGv, 'Giveaways', 90)}
        <div style={{ fontSize: 12, color: C.slateDim, whiteSpace: 'nowrap' }}>
          fees <b style={{ color: C.orange }}>{fmt(fees)}</b> → net <b style={{ color: C.green }}>{fmt(net)}</b>
        </div>
        <button onClick={save} disabled={gross <= 0 || !(parseInt(n) > 0)}
          style={{ background: saved ? C.green : C.cyan, color: '#fff', border: 'none', borderRadius: 980, padding: '9px 18px', fontSize: 12.5, fontWeight: 700, cursor: 'pointer', opacity: gross > 0 && parseInt(n) > 0 ? 1 : 0.5, marginLeft: 'auto' }}>
          {saved ? '✓ Logged' : (existing ? 'Update show' : 'Close show')}
        </button>
      </div>
      {/* V10 — optional performance stats. Collapsed by default to keep dollar-only closes fast. */}
      <button onClick={() => setShowStats(s => !s)}
        style={{ marginTop: 10, background: 'transparent', border: 'none', color: C.green, fontSize: 12, fontWeight: 700, cursor: 'pointer', padding: 0 }}>
        {showStats ? '▾ Hide show stats' : '▸ Add show stats (viewers, follows, shares, duration)'}
      </button>
      {showStats && (
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'flex-end', marginTop: 8 }}>
          {statInp(pv, setPv, 'Peak viewers')}
          {statInp(tv, setTv, 'Total viewers')}
          {statInp(nf, setNf, 'New follows')}
          {statInp(tf, setTf, 'Total followers')}
          {statInp(sh, setSh, 'Shares')}
          {statInp(dur, setDur, 'Duration (min)')}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, flex: 1, minWidth: 160 }}>
            <span style={{ fontSize: 10, color: C.slateDim, fontWeight: 600 }}>Note</span>
            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="Theme, what worked…"
              style={{ width: '100%', background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 9, padding: '8px 10px', fontSize: 13, color: C.white, outline: 'none' }} />
          </div>
        </div>
      )}
      <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 8 }}>
        {existing
          ? `A show record already exists for ${d} — this logs the sale and fills in its stats.`
          : 'Logs the sale and creates the show record.'}
        {existingSale ? <span style={{ color: C.orange }}> ⚠ A Whatnot sale is already logged for {d} — saving adds a second row.</span> : null}
        {' '}Giveaways tracked separately so sold counts stay honest vs purchases.
      </div>
    </div>
  );
}

// ---- V9: Whatnot order-report import — paste rows, dedupe, attribute -------
function WhatnotImport({ data, onClose }) {
  const [text, setText] = React.useState('');
  const [excludeShip, setExcludeShip] = React.useState(false); // V10: default = total landed cost (incl shipping); on = card subtotal only
  const [preview, setPreview] = React.useState(null);
  const [done, setDone] = React.useState(null);
  const trackingStart = (data.baseline && data.baseline.trackingStart) || '2026-04-11';

  const parse = () => {
    const out = [];
    const lines = text.split('\n').map(l => l.replace(/\r$/, '')).filter(l => l.trim());
    if (!lines.length) { setPreview({ fresh: [], dupes: [], total: 0 }); return; }
    const split = (l) => (l.includes('\t') ? l.split('\t') : l.split(','));
    // Detect a header row so we can map columns by name — handles the full Whatnot
    // order report (seller…subtotal…shipping…total) or a simple seller/date/total paste.
    const headerCells = split(lines[0]).map(c => c.trim().toLowerCase());
    const hasHeader = headerCells.includes('seller') || headerCells.includes('processed date');
    const ix = (name) => headerCells.indexOf(name);
    const col = {
      seller: hasHeader ? ix('seller') : 0,
      date: hasHeader ? ix('processed date') : 1,
      subtotal: hasHeader ? ix('subtotal') : -1,
      sold: hasHeader ? ix('sold price') : -1,
      qty: hasHeader ? ix('quantity') : -1,
      ship: hasHeader ? ix('shipping price') : -1,
      total: hasHeader ? (ix('total') >= 0 ? ix('total') : -1) : 2,
    };
    const num = (v) => { const n = parseFloat(String(v == null ? '' : v).replace(/[$,\s]/g, '')); return isNaN(n) ? 0 : n; };
    (hasHeader ? lines.slice(1) : lines).forEach(line => {
      const cells = split(line);
      if (cells.length < 2) return;
      const sl = (cells[col.seller] || '').trim();
      if (!sl || sl.toLowerCase() === 'seller') return;
      const dRaw = (cells[col.date] || '').trim();
      const m = dRaw.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/) || dRaw.match(/(\d{4}-\d{2}-\d{2})/);
      if (!m) return;
      let d;
      if (m[2] != null) { const dt = new Date(`${m[1]}T${m[2]}:${m[3]}:00Z`); dt.setHours(dt.getHours() - 5); d = dt.toISOString().split('T')[0]; } // UTC → Central
      else d = m[1];
      // V10 — cost basis = TOTAL landed cost (card + shipping), the real amount paid.
      // Prefer the report's `total` column; else subtotal/sold + shipping. Toggle
      // `excludeShip` to track the card subtotal only. NO buyer premium.
      const subtotal = col.subtotal >= 0 ? num(cells[col.subtotal]) : 0;
      const soldPrice = col.sold >= 0 ? num(cells[col.sold]) : 0;
      const ship = col.ship >= 0 ? num(cells[col.ship]) : 0;
      const total = col.total >= 0 ? num(cells[col.total]) : 0;
      const cardOnly = subtotal || soldPrice || (total ? total - ship : 0);
      let t = excludeShip ? cardOnly : (total || (cardOnly + ship));
      t = Math.round(t * 100) / 100;
      let n = col.qty >= 0 ? parseInt(num(cells[col.qty]), 10) : 1; if (!n || n < 1) n = 1;
      out.push({ d, sl, t, n });
    });
    // Dedupe against existing Whatnot buys: same date + seller + total (±1¢)
    const existing = (data.purchases || []).filter(p => p.s === 'Whatnot');
    const used = existing.map(p => ({ d: p.d, sl: p.sl, t: p.t, hit: 0 }));
    const fresh = [], dupes = [];
    out.forEach(r => {
      const m2 = used.find(u => u.hit === 0 && u.d === r.d && u.sl === r.sl && Math.abs(u.t - r.t) < 0.011);
      if (m2) { m2.hit = 1; dupes.push(r); } else fresh.push(r);
    });
    setPreview({ fresh, dupes, total: out.length });
  };

  const doImport = async () => {
    if (!preview || !preview.fresh.length) return;
    const recs = preview.fresh.map(r => {
      // V10 — new uploads land in the Hold-for-Show pool, unreceived. Pre-tracking
      // buys stay archived as 📚 Legacy. Attribute to a specific show after receipt.
      const showId = r.d < trackingStart ? '__legacy' : '__hold';
      const received = r.d < trackingStart;
      return { d: r.d, s: 'Whatnot', n: r.n || 1, t: r.t, sl: r.sl, received, showId };
    });
    const added = await data.bulkAddPurchases(recs);
    setDone({ added, dupes: preview.dupes.length });
  };

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(6,13,26,0.7)', zIndex: 950, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: '#fff', borderRadius: 16, padding: 22, width: '100%', maxWidth: 560, maxHeight: '88vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 700, color: C.white }}>⬆ Import Whatnot Order Report</div>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer', fontSize: 18 }}>✕</button>
        </div>
        <div style={{ fontSize: 11.5, color: C.slateDim, marginBottom: 12, lineHeight: 1.5 }}>Paste the Whatnot order report (with its header row). Cost reads as <b style={{ color: C.slate }}>total landed cost</b> — card + shipping, what you actually paid. Toggle below to track the card subtotal only. A simple seller/date/total paste still works. Already-logged buys are skipped automatically.</div>
        {!done ? (
          <>
            <textarea value={text} onChange={e => { setText(e.target.value); setPreview(null); }} rows={7}
              placeholder={"beetskwod\t2026-06-10 04:32 (UTC)\t$3.00\nbeetskwod\t2026-06-10 04:30 (UTC)\t$12.00"}
              style={{ width: '100%', boxSizing: 'border-box', background: C.bg, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: 12, fontSize: 11.5, fontFamily: 'monospace', color: C.white, outline: 'none', resize: 'vertical' }} />
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: C.slate, margin: '10px 0' }}>
              <input type="checkbox" checked={excludeShip} onChange={e => { setExcludeShip(e.target.checked); setPreview(null); }} />
              Exclude shipping — track card subtotal only (default: total landed cost, incl. shipping)
            </label>
            {preview && (
              <div style={{ background: C.bg, borderRadius: 10, padding: '11px 14px', fontSize: 12.5, color: C.slate, marginBottom: 10 }}>
                Parsed <b style={{ color: C.white }}>{preview.total}</b> rows → <b style={{ color: C.green }}>{preview.fresh.length} new</b> ({fmt(preview.fresh.reduce((s, r) => s + r.t, 0))}) · <b style={{ color: C.slateDim }}>{preview.dupes.length} already logged</b>
                <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 4 }}>New buys: pre-{trackingStart} → 📚 Legacy · all others → 📌 Hold for Show (unreceived). Receive them, then attribute to a show.</div>
              </div>
            )}
            {preview && preview.fresh.length > 0 && (() => {
              // V10 — tier buy-model breakdown of this import (per-card cost → tier),
              // with spend vs the show budget guide (~$2,100 · ~168 cards · ~$12.50 avg).
              const t = { opener: { c: 0, $: 0 }, core: { c: 0, $: 0 }, premium: { c: 0, $: 0 } };
              preview.fresh.forEach(r => { const tier = tierOf(r.n > 0 ? r.t / r.n : r.t); t[tier].c += (r.n || 1); t[tier].$ += (r.t || 0); });
              const cards = preview.fresh.reduce((s, r) => s + (r.n || 1), 0);
              const spend = preview.fresh.reduce((s, r) => s + (r.t || 0), 0);
              const avg = cards > 0 ? spend / cards : 0;
              const BUDGET = 2500, MAXAVG = 12.50;
              const FEE = 0.109; // Whatnot ~10.9% + $0.30/order
              const breakevenGross = Math.round((spend + 0.30) / (1 - FEE)); // gross needed to recover this spend after fees
              return (
                <div style={{ background: C.bg, borderRadius: 10, padding: '12px 14px', marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.white, textTransform: 'uppercase', letterSpacing: '0.03em', marginBottom: 8 }}>Tier buy model</div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {['opener', 'core', 'premium'].map(k => {
                      const meta = TIER_META[k]; const row = t[k];
                      const share = cards > 0 ? Math.round((row.c / cards) * 100) : 0;
                      return (
                        <div key={k} style={{ flex: 1, minWidth: 96, background: '#fff', border: `1px solid ${meta.color}33`, borderRadius: 9, padding: '9px 11px' }}>
                          <div style={{ fontSize: 11.5, fontWeight: 700, color: meta.color }}>{meta.label}</div>
                          <div style={{ fontSize: 9.5, color: C.slateDim }}>{meta.range}</div>
                          <div style={{ fontSize: 18, fontWeight: 700, color: C.white, marginTop: 4 }}>{row.c}</div>
                          <div style={{ fontSize: 10.5, color: C.slate }}>{fmt(row.$)} · {share}%</div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 6, marginTop: 9, fontSize: 11.5, color: C.slate }}>
                    <span>{cards} cards · <b style={{ color: C.white }}>{fmt(spend)}</b></span>
                    <span>avg <b style={{ color: avg <= MAXAVG ? C.green : C.orange }}>{fmt(avg)}</b> <span style={{ color: C.slateDim }}>(target ≤ {fmt(MAXAVG)})</span></span>
                    <span style={{ color: C.slateDim }}>{Math.round((spend / BUDGET) * 100)}% of ${BUDGET.toLocaleString()} budget</span>
                  </div>
                  <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 6, borderTop: `1px solid rgba(0,0,0,0.06)`, paddingTop: 7 }}>
                    After ~10.9% Whatnot fees, you'd need <b style={{ color: C.cyan }}>{fmt(breakevenGross)}</b> in gross sales to recover this spend.
                  </div>
                </div>
              );
            })()}
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button onClick={parse} disabled={!text.trim()} style={{ background: 'rgba(0,0,0,0.05)', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '9px 18px', fontSize: 13, fontWeight: 600, color: C.white, cursor: 'pointer', opacity: text.trim() ? 1 : 0.5 }}>Preview</button>
              <button onClick={doImport} disabled={!preview || !preview.fresh.length} style={{ background: C.green, border: 'none', borderRadius: 980, padding: '9px 18px', fontSize: 13, fontWeight: 700, color: '#fff', cursor: 'pointer', opacity: preview && preview.fresh.length ? 1 : 0.5 }}>Import {preview ? preview.fresh.length : ''}</button>
            </div>
          </>
        ) : (
          <div style={{ textAlign: 'center', padding: '18px 0' }}>
            <div style={{ fontSize: 30 }}>✅</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.white, marginTop: 6 }}>Imported {done.added} buys</div>
            <div style={{ fontSize: 12, color: C.slateDim, marginTop: 4 }}>{done.dupes} duplicates skipped. Attribution + tiers applied automatically.</div>

          </div>
        )}
      </div>
    </div>
  );
}

// ---- V9: Quick Log — rapid buy entry for live-show nights ------------------
// Sticky seller, price-only repeat entry. Each entry = 1 card, pending, Hold.
function QuickLog({ data, onClose }) {
  const today = new Date().toISOString().split('T')[0];
  const [seller, setSeller] = React.useState('');
  const [price, setPrice] = React.useState('');
  const [session, setSession] = React.useState([]);
  const priceRef = React.useRef(null);
  const sellers = React.useMemo(() => {
    const m = {};
    (data.purchases || []).forEach(p => { const s = (p.sl || '').trim(); if (s) m[s] = (m[s] || 0) + 1; });
    return Object.keys(m).sort((a, b) => m[b] - m[a]);
  }, [data.purchases]);

  const add = async () => {
    const t = parseFloat(price);
    const sl = seller.trim();
    if (!sl || isNaN(t) || t < 0) return;
    const rec = { d: today, s: 'Whatnot', n: 1, t: Math.round(t * 100) / 100, sl, received: false, showId: '__hold' };
    await data.addPurchase(rec);
    setSession(s => [{ sl, t: rec.t }, ...s]);
    setPrice('');
    if (priceRef.current) priceRef.current.focus();
  };
  const total = session.reduce((s, x) => s + x.t, 0);
  const tierDot = (t) => t <= 8 ? '🟢' : t <= 14 ? '🔵' : '🟣';

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(6,13,26,0.55)', zIndex: 900, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
      <div onClick={e => e.stopPropagation()} style={{ background: '#fff', borderRadius: '18px 18px 0 0', padding: '20px 20px calc(20px + env(safe-area-inset-bottom))', width: '100%', maxWidth: 520, boxShadow: '0 -8px 40px rgba(0,0,0,0.18)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 700, color: C.white }}>⚡ Quick Log</div>
            <div style={{ fontSize: 11, color: C.slateDim }}>Whatnot · today · 1 card per entry · lands in Pending → Hold</div>
          </div>
          <button onClick={onClose} style={{ background: 'rgba(0,0,0,0.05)', border: 'none', borderRadius: 980, padding: '7px 14px', fontSize: 12, fontWeight: 700, color: C.white, cursor: 'pointer' }}>Done</button>
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
          <input list="vvc-sellers" value={seller} onChange={e => setSeller(e.target.value)} placeholder="Seller (stays put)"
            style={{ flex: 1.4, background: C.bg, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: '11px 12px', fontSize: 14, color: C.white, outline: 'none' }} />
          <datalist id="vvc-sellers">{sellers.slice(0, 60).map(s => <option key={s} value={s} />)}</datalist>
          <input ref={priceRef} type="number" inputMode="decimal" value={price} onChange={e => setPrice(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') add(); }} placeholder="$"
            style={{ flex: 1, background: C.bg, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: '11px 12px', fontSize: 16, fontWeight: 700, color: C.white, outline: 'none' }} />
          <button onClick={add} style={{ background: C.green, color: '#fff', border: 'none', borderRadius: 10, padding: '11px 18px', fontSize: 14, fontWeight: 800, cursor: 'pointer' }}>+</button>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: C.slateDim, marginBottom: 8 }}>
          <span>This session: <b style={{ color: C.white }}>{session.length}</b> card{session.length === 1 ? '' : 's'}</span>
          <span>Total: <b style={{ color: C.white }}>{fmt(total)}</b>{session.length > 0 ? ` · avg ${fmt(total / session.length)}` : ''}</span>
        </div>
        <div style={{ maxHeight: 180, overflowY: 'auto' }}>
          {session.map((x, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 4px', borderBottom: '1px solid rgba(0,0,0,0.05)', fontSize: 12.5 }}>
              <span style={{ color: C.white, fontWeight: 600 }}>{tierDot(x.t)} {x.sl}</span>
              <span style={{ color: C.white, fontWeight: 700 }}>{fmt(x.t)}</span>
            </div>
          ))}
          {session.length === 0 && <div style={{ textAlign: 'center', color: C.slateDim, fontSize: 12, padding: 18 }}>Type a price, hit Enter, repeat. Seller stays pinned between entries.</div>}
        </div>
      </div>
    </div>
  );
}

function VVCBusinessHubV3() {

  const [bsTab, setBsTab] = useState('dashboard');
  const [showsTab, setShowsTab] = useState('preshow');
  const [psaTab, setPsaTab] = useState('sub');
  const [activeSub, setActiveSub] = useState('sub_1');
  const [entryType, setEntryType] = useState(null);
  const [editingRow, setEditingRow] = useState(null);
  const [timeFilter, setTimeFilter] = useState('all');
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [diagOpen, setDiagOpen] = useState(false);
  const [exportOpen, setExportOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [snapshotOpen, setSnapshotOpen] = useState(false);
  const [cloudSyncOpen, setCloudSyncOpen] = useState(false);
  const [welcomeOpen, setWelcomeOpen] = useState(false); // V10 onboarding; opened on first run (effect below)
  const [slidePanel, setSlidePanel] = useState({ open: false, type: null, editing: null });
  const [fabOpen, setFabOpen] = useState(false);
  const [toast, setToast] = useState(null); // { msg, type: 'success'|'error', id }
  const toastTimer = React.useRef(null);
  const showToast = React.useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToast({ msg, type, id });
    if (type === 'success') {
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(t => t?.id === id ? null : t), 3000);
    }
  }, []);
  const openSlide = (type, editing = null) => setSlidePanel({ open: true, type, editing });
  const closeSlide = () => { setSlidePanel({ open: false, type: null, editing: null }); setEntryType(null); setEditingRow(null); };
  const [exportJson, setExportJson] = useState('');
  const [exportCopied, setExportCopied] = useState(false);
  const [includePSA, setIncludePSA] = useState('bs_psa'); // 'bs' | 'bs_psa'
  const [diagResults, setDiagResults] = useState(null);
  const [diagSaving, setDiagSaving] = useState(false);

  const runDiag = useCallback(async () => {
    const r = await data.getDiagnostics();
    setDiagResults(r);
    setDiagOpen(true);
  }, [data]);

  // V10 — first-run gate: show Welcome once, after load, until the user picks a path.
  useEffect(() => {
    if (loaded && workspace && !workspace.onboarded) setWelcomeOpen(true);
  }, [loaded, workspace]);

  // Adopt the built-in sample dataset (demo). No data change — just marks onboarded.
  const chooseDemo = useCallback(async () => {
    await data.saveWorkspace({ ...workspace, onboarded: true, mode: 'demo' });
    setWelcomeOpen(false);
    showToast('Exploring with sample data', 'success');
  }, [data, workspace, showToast]);

  // Spin up a clean, branded workspace for a real seller.
  const startLive = useCallback(async (info) => {
    await data.resetToEmpty();
    await data.saveWorkspace({ ...info, onboarded: true, mode: 'live' });
    setArea('home'); setMode('command'); setTimeFilter('all'); setSelectedMonth(null);
    setWelcomeOpen(false);
    showToast(`Workspace ready — ${info.brand}`, 'success');
  }, [data, showToast]);

  const window_ = useMemo(() => getFilterWindow(timeFilter, selectedMonth), [timeFilter, selectedMonth]);

  const filteredP = useMemo(() => purchases.map((p, i) => ({ ...p, _rk: i })).filter(p => window_.matches(p.d)), [purchases, window_]);
  const filteredS = useMemo(() => sales.filter(s => window_.matches(s.d)), [sales, window_]);
  const filteredSup = useMemo(() => supplies.filter(s => window_.matches(s.d)), [supplies, window_]);

  const monthly = useMemo(() => buildMonthlySeries(purchases, sales, supplies, timeFilter, selectedMonth), [purchases, sales, supplies, timeFilter, selectedMonth]);

  // Top-level stats for filtered window
  const stats = useMemo(() => {
    const purchSpent = filteredP.reduce((s, p) => s + p.t, 0);
    const suppSpent = filteredSup.reduce((s, p) => s + p.t, 0);
    const invested = purchSpent + suppSpent;
    const salesGross = filteredS.reduce((s, x) => s + x.g, 0);
    const salesNet = filteredS.reduce((s, x) => s + x.net, 0);
    const fees = filteredS.reduce((s, x) => s + x.f, 0);
    const cards = filteredP.reduce((s, p) => s + p.n, 0);
    const sold = filteredS.reduce((s, x) => s + x.n, 0);
    const pl = salesNet - invested;
    const roi = invested > 0 ? pl / invested : 0;
    const cardsOnlyPL = salesNet - purchSpent;
    const avgCostPerCard = cards > 0 ? purchSpent / cards : 0;
    const avgNetPerCard = sold > 0 ? salesNet / sold : 0;
    // Sources
    const bySource = Object.values(filteredP.reduce((acc, p) => {
      if (!acc[p.s]) acc[p.s] = { name: p.s, value: 0, cards: 0 };
      acc[p.s].value += p.t; acc[p.s].cards += p.n;
      return acc;
    }, {})).sort((a, b) => b.value - a.value);
    const byPlatform = Object.values(filteredS.reduce((acc, s) => {
      if (!acc[s.p]) acc[s.p] = { name: s.p, gross: 0, net: 0 };
      acc[s.p].gross += s.g; acc[s.p].net += s.net;
      return acc;
    }, {})).sort((a, b) => b.gross - a.gross);
    const bySupplyType = Object.values(filteredSup.reduce((acc, s) => {
      if (!acc[s.ty]) acc[s.ty] = { name: s.ty, value: 0, qty: 0 };
      acc[s.ty].value += s.t; acc[s.ty].qty += s.q;
      return acc;
    }, {})).sort((a, b) => b.value - a.value);
    const avgBySource = bySource.map(s => ({ name: s.name, avg: s.cards > 0 ? s.value / s.cards : 0, total: s.value, cards: s.cards }));
    // Committed-but-not-yet-received: dollars count at purchase, inventory at receipt
    const pendingSpend = filteredP.filter(p => p.received === false).reduce((s, p) => s + p.t, 0);
    const pendingCards = filteredP.filter(p => p.received === false).reduce((s, p) => s + p.n, 0);
    const spendByCategory = [
      { name: 'Card Purchases', value: purchSpent },
      { name: 'Supplies', value: suppSpent },
    ].filter(c => c.value > 0);
    return { purchSpent, suppSpent, invested, salesGross, salesNet, fees, cards, sold, pl, roi, cardsOnlyPL, avgCostPerCard, avgNetPerCard, bySource, byPlatform, bySupplyType, avgBySource, spendByCategory, pendingSpend, pendingCards };
  }, [filteredP, filteredS, filteredSup]);

  // ========================================================================
  // PHASE 1 — INVENTORY & COGS ENGINE (all-time, not window-filtered)
  // Real Cards-in-Hand from an editable baseline, weighted-avg cost basis,
  // and inventory valuation broken out by destination.
  // ========================================================================
  const inv = useMemo(() => {
    const bl = data.baseline || DEFAULT_BASELINE;
    const blDate = bl.date || '2026-05-01';
    const blCount = Number(bl.count) || 0;

    // Received = physically in hand (received !== false). Pending = in transit.
    const received = purchases.filter(p => p.received !== false);
    const pending = purchases.filter(p => p.received === false);

    // Weighted-average cost per card across ALL received inventory ever bought.
    const totalRecvCost = received.reduce((s, p) => s + (p.t || 0), 0);
    const totalRecvCards = received.reduce((s, p) => s + (p.n || 0), 0);
    const avgCost = totalRecvCards > 0 ? totalRecvCost / totalRecvCards : 0;

    // COGS cost pool: only tracking-period purchases (post-trackingStart).
    // Pre-tracking buys were flipped before we started counting — their cost
    // stays in cash P&L but must NOT inflate the COGS pool or dilute blendedAvg.
    const trackingStart = bl.trackingStart || '2026-04-11';
    const trackingRecv = received.filter(p => p.d >= trackingStart);
    const trackingRecvCost = trackingRecv.reduce((s, p) => s + (p.t || 0), 0);
    const trackingRecvCards = trackingRecv.reduce((s, p) => s + (p.n || 0), 0);

    // Cards in Hand = baseline + received-after-date − sold-after-date.
    const recvAfter = received.filter(p => p.d >= blDate).reduce((s, p) => s + (p.n || 0), 0);
    const soldAfter = sales.filter(s => s.d >= blDate).reduce((s, x) => s + (x.n || 0), 0);
    const inHandCount = blCount + recvAfter - soldAfter;
    const inHandValue = Math.max(0, inHandCount) * avgCost;

    // In-transit (committed, not yet received)
    const pendingCards = pending.reduce((s, p) => s + (p.n || 0), 0);
    const pendingCost = pending.reduce((s, p) => s + (p.t || 0), 0);

    // Cost basis of received inventory grouped by destination.
    const showLabel = (id) => {
      const sh = shows.find(s => s.id === id);
      if (!sh) return null;
      const dt = new Date(sh.d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `🎥 ${dt} ${sh.plat || ''}`.trim();
    };
    const destMap = {};
    let legacyCards = 0, legacyCost = 0; // pre-tracking / sold-through — kept OUT of the active allocation
    received.forEach(p => {
      const sid = p.showId;
      // Legacy and never-assigned cards are sold-through history, not live inventory headed somewhere.
      if (!sid || sid === '__legacy') { legacyCards += (p.n || 0); legacyCost += (p.t || 0); return; }
      let key, label, color;
      if (sid.startsWith('__')) {
        const d = findDest(sid);
        key = sid; label = d ? d.label : sid; color = d ? d.color : C.slate;
      } else {
        key = sid; label = showLabel(sid) || '🎥 Show'; color = C.cyan;
      }
      if (!destMap[key]) destMap[key] = { key, label, color, cost: 0, cards: 0 };
      destMap[key].cost += (p.t || 0);
      destMap[key].cards += (p.n || 0);
    });
    const byDestination = Object.values(destMap).sort((a, b) => b.cost - a.cost);

    const soldAllTime = sales.reduce((s, x) => s + (x.n || 0), 0);
    return { avgCost, inHandCount, inHandValue, recvAfter, soldAfter, blDate, blCount,
      pendingCards, pendingCost, totalRecvCost, totalRecvCards, byDestination, soldAllTime,
      legacyCards, legacyCost, trackingRecvCost, trackingRecvCards, trackingStart };
  }, [purchases, sales, shows, data.baseline]);

  // Phase 1 — basis-aware P&L for the active window. Cash = cost hits P&L at
  // purchase (legacy). COGS = only the cost of cards that have SOLD is expensed;
  // unsold/in-transit inventory is carried as an asset, so a buying week can't
  // read as a loss.
  const basisPL = useMemo(() => {
    // Cost pool: tracking-period received purchases + user-declared opening stock.
    // Pre-tracking (legacy) buys are EXCLUDED — they were flipped before we started
    // counting and their cost stays in cash P&L only.
    const openUnits = Number(data.baseline?.openUnits) || 0;
    const openCost  = Number(data.baseline?.openCost)  || 0;
    const goodsUnits = inv.trackingRecvCards + openUnits;
    const goodsCost  = inv.trackingRecvCost  + openCost;
    const blendedAvg = goodsUnits > 0 ? goodsCost / goodsUnits : inv.avgCost;
    // COGS = sold cards valued at blended avg, but it can NEVER exceed the cost of
    // all goods acquired (you can't expense cost you never paid). This cap is what
    // keeps a buy-heavy/early-stock history from inflating COGS past reality.
    const rawCogs = stats.sold * blendedAvg;
    // Periodic-inventory correction: cost still sitting on the shelf can't be
    // expensed. COGS ≤ goodsCost − ending inventory value (cards in hand at
    // blended cost). Falls back to the plain goodsCost cap when no physical
    // count is set (inHand ≤ 0).
    const endingInv = Math.max(0, (inv.inHandCount || 0)) * blendedAvg;
    const cogsCeiling = Math.max(0, goodsCost - endingInv);
    const cogs = Math.min(rawCogs, cogsCeiling, goodsCost);
    const capped = rawCogs > cogs + 0.01;
    const plCash = stats.salesNet - stats.invested;          // legacy behavior
    const plCogs = stats.salesNet - cogs - stats.suppSpent;  // expense COGS + supplies only
    const basis = data.plBasis || 'cash';
    const pl = basis === 'cogs' ? plCogs : plCash;
    const denom = basis === 'cogs' ? (cogs + stats.suppSpent) : stats.invested;
    const roi = denom > 0 ? pl / denom : 0;
    return { basis, cogs, rawCogs, capped, blendedAvg, goodsUnits, goodsCost, plCash, plCogs, pl, roi };
  }, [stats, inv.avgCost, inv.trackingRecvCards, inv.trackingRecvCost, inv.inHandCount, data.plBasis, data.baseline]);

  const enrichedShows = useMemo(() => shows.map(show => {
    const showId = show.id || `show_${show.d}_${show.plat}_${show.st || '000'}`;
    const ms = sales.filter(s => s.d === show.d && s.p === show.plat);
    const salesGross = ms.reduce((sum, s) => sum + s.g, 0);
    const salesNet = ms.reduce((sum, s) => sum + s.net, 0);
    const salesOrders = ms.reduce((sum, s) => sum + s.n, 0);
    // Fall back to show's stored pv/nf/sh fields when no sales records exist
    const gross = salesGross > 0 ? salesGross : (show.pv || 0);
    const net = salesNet > 0 ? salesNet : (show.nf || 0);
    const orders = salesOrders > 0 ? salesOrders : (show.sh || 0);
    const aov = orders > 0 ? gross / orders : 0;
    const attrP = purchases.filter(p => p.showId === showId);
    const attributedCost = attrP.reduce((s, p) => s + p.t, 0);
    const attributedCards = attrP.reduce((s, p) => s + p.n, 0);
    const showMargin = net - attributedCost;
    const showROI = attributedCost > 0 ? showMargin / attributedCost : null;
    const dowNum = new Date(show.d + 'T12:00:00').getDay();
    const dowName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dowNum];
    const hourNum = show.st ? parseInt(show.st.split(':')[0]) : null;
    const timeSlot = hourNum === null ? 'Unknown'
      : hourNum < 12 ? 'Morning'
      : hourNum < 17 ? 'Afternoon'
      : hourNum < 20 ? 'Early Eve (5-8pm)'
      : hourNum < 22 ? 'Prime (8-10pm)' : 'Late (10pm+)';
    return { ...show, id: showId, gross, net, orders, aov, attributedCost, attributedCards, showMargin, showROI, dowNum, dowName, timeSlot };
  }), [shows, sales, purchases]);

  const showsByDow = useMemo(() => {
    const map = {};
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((d, i) => {
      map[d] = { name: d, dowNum: i, count: 0, totalGross: 0, totalOrders: 0, totalViewers: 0, totalFollows: 0 };
    });
    enrichedShows.forEach(s => {
      const m = map[s.dowName]; if (!m) return;
      m.count += 1; m.totalGross += s.gross; m.totalOrders += s.orders;
      m.totalViewers += s.pv || 0; m.totalFollows += s.nf || 0;
    });
    return Object.values(map).map(d => ({
      ...d,
      avgGross: d.count > 0 ? d.totalGross / d.count : 0,
      avgAOV: d.totalOrders > 0 ? d.totalGross / d.totalOrders : 0,
      avgViewers: d.count > 0 ? d.totalViewers / d.count : 0,
    })).sort((a, b) => a.dowNum - b.dowNum);
  }, [enrichedShows]);

  const showsByTimeSlot = useMemo(() => {
    const slots = ['Morning','Afternoon','Early Eve (5-8pm)','Prime (8-10pm)','Late (10pm+)'];
    const map = {};
    slots.forEach(s => { map[s] = { name: s, count: 0, totalGross: 0, totalOrders: 0, totalViewers: 0 }; });
    enrichedShows.forEach(s => {
      const m = map[s.timeSlot]; if (!m) return;
      m.count += 1; m.totalGross += s.gross; m.totalOrders += s.orders; m.totalViewers += s.pv || 0;
    });
    return slots.map(s => {
      const m = map[s];
      return { ...m,
        avgGross: m.count > 0 ? m.totalGross / m.count : 0,
        avgAOV: m.totalOrders > 0 ? m.totalGross / m.totalOrders : 0,
        avgViewers: m.count > 0 ? m.totalViewers / m.count : 0,
      };
    });
  }, [enrichedShows]);

  const perSubStats = useMemo(() => psaData.subs.map(sub => {
    const rawTarget = sub.cards.reduce((s, c) => s + c.rawTarget, 0);
    const cardsBought = sub.cards.filter(c => c.rawActual != null).length;
    const isSubmitted = sub.status === 'submitted' || sub.status === 'returned';
    const gradingTarget = sub.cards.length * PSA_GRADING_COST;
    const gradingActual = isSubmitted ? gradingTarget : 0; // Only count grading when submitted
    const totalInAtTarget = rawTarget + gradingTarget;
    const projReturn = sub.cards.reduce((s, c) => s + c.comp10 * (1 - PSA_FEE_RATE), 0);
    const projGood = projReturn * 0.6 - totalInAtTarget;
    const projExp = projReturn * 0.5 - totalInAtTarget;
    const projBad = projReturn * 0.35 - totalInAtTarget;
    // Only count raw cost for NEW cards (inventory cost is already in B/S)
    const newRaw = sub.cards.reduce((s, c) => s + ((c.acqSource === 'inventory') ? 0 : (c.rawActual ?? 0)), 0);
    const actualInvested = newRaw + gradingActual; // Grading only when submitted
    return { id: sub.id, name: sub.name, totalCards: sub.cards.length, cardsBought, rawTarget, gradingTarget, gradingActual, isSubmitted, totalInAtTarget, actualInvested, projReturn, projGood, projExp, projBad };
  }), [psaData]);

  // PSA totals
  const psaStats = useMemo(() => {
    const all = psaData.subs.flatMap(s => s.cards);
    // Only count raw cost for NEW cards (inventory is already in B/S)
    const newRaw = all.reduce((s, c) => s + ((c.acqSource === 'inventory') ? 0 : (c.rawActual ?? 0)), 0);
    const invRaw = all.reduce((s, c) => s + ((c.acqSource === 'inventory') ? (c.rawActual ?? 0) : 0), 0);
    const cardsBought = all.filter(c => c.rawActual != null).length;
    const cardsNew = all.filter(c => c.acqSource !== 'inventory' && c.rawActual != null).length;
    const cardsInv = all.filter(c => c.acqSource === 'inventory').length;
    const cardsSold = all.filter(c => c.soldFor != null).length;
    const gradingTarget = all.length * PSA_GRADING_COST;
    // Only count grading cost for subs that are submitted
    const submittedSubs = psaData.subs.filter(s => s.status === 'submitted' || s.status === 'returned');
    const submittedCards = submittedSubs.flatMap(s => s.cards);
    const gradingActual = submittedCards.length * PSA_GRADING_COST;
    const actualInvested = newRaw + gradingActual; // No grading until submitted
    const realized = all.reduce((s, c) => s + ((c.soldFor ?? 0) * (1 - PSA_FEE_RATE)), 0);
    const projReturn = all.reduce((s, c) => s + c.comp10 * (1 - PSA_FEE_RATE), 0);
    const rawTarget = all.reduce((s, c) => s + c.rawTarget, 0);
    const expected = projReturn * 0.5 - (rawTarget + gradingTarget);
    return { totalCards: all.length, cardsBought, cardsNew, cardsInv, cardsSold, newRaw, invRaw, gradingTarget, gradingActual, actualInvested, realized, projReturn, rawTarget, expected };
  }, [psaData]);

  const availableMonths = useMemo(() => {
    const set = new Set();
    purchases.forEach(p => { if (p.d) set.add(p.d.slice(0, 7)); });
    sales.forEach(s => { if (s.d) set.add(s.d.slice(0, 7)); });
    return Array.from(set).sort().reverse();
  }, [purchases, sales]);

  const triggerDownload = useCallback((json) => {
    try {
      const fname = `vvc-backup-${new Date().toISOString().slice(0, 10)}.json`;
      const b = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(b);
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return true;
    } catch (e) { return false; }
  }, []);

  const handleExport = useCallback(() => {
    const blob = { purchases, sales, supplies, shows, psaData, slabs, showTargets: data.showTargets, baseline: data.baseline, basis: data.plBasis, exportedAt: new Date().toISOString(), version: 3 };
    const json = JSON.stringify(blob, null, 2);
    setExportJson(json);
    setExportCopied(false);
    triggerDownload(json);      // real file download (works in the standalone app)
    setExportOpen(true);        // modal stays as a fallback (copy) + re-download button
  }, [purchases, sales, supplies, shows, psaData, slabs, data, triggerDownload]);

  const generateSnapshot = useCallback(() => {
    const W = 1080, H = 1080;
    const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    const rr = (x, y, w, h, r) => { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); };
    const FA = '-apple-system, "SF Pro Display", Helvetica, Arial, sans-serif';
    const g = ctx.createLinearGradient(0, 0, W, H); g.addColorStop(0, '#0c0c0f'); g.addColorStop(1, '#1b1b22');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 2; rr(40, 40, W - 80, H - 80, 28); ctx.stroke();
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#f5f5f7'; ctx.font = '600 46px ' + FA; ctx.fillText('Vector Victor Cards', 90, 156);
    ctx.fillStyle = '#8e8e93'; ctx.font = '500 24px ' + FA; ctx.fillText('Business Hub', 90, 194);
    ctx.fillStyle = '#8e8e93'; ctx.font = '600 28px ' + FA; ctx.fillText((window_.label + ' · Profit & Loss'), 90, 430);
    const up = stats.pl >= 0;
    ctx.fillStyle = '#f5f5f7'; ctx.font = '700 150px ' + FA; ctx.fillText(fmt(stats.pl), 86, 575);
    const roiTxt = (up ? '\u25B2 ' : '\u25BC ') + Math.abs(stats.roi * 100).toFixed(0) + '% ROI';
    ctx.font = '600 34px ' + FA; const chipW = ctx.measureText(roiTxt).width + 56;
    ctx.fillStyle = up ? 'rgba(92,185,119,0.20)' : 'rgba(224,103,95,0.20)'; rr(90, 620, chipW, 62, 31); ctx.fill();
    ctx.fillStyle = up ? '#5cb977' : '#e0675f'; ctx.fillText(roiTxt, 118, 662);
    const trip = [['Spent', fmt(stats.purchSpent)], ['Net Sales', fmt(stats.salesNet)], ['Cards Sold', (stats.sold || 0).toLocaleString()]];
    let x = 90; const y = 850;
    trip.forEach(([l, v]) => {
      ctx.fillStyle = '#8e8e93'; ctx.font = '500 26px ' + FA; ctx.fillText(l, x, y);
      ctx.fillStyle = '#f5f5f7'; ctx.font = '600 50px ' + FA; ctx.fillText(v, x, y + 58);
      x += 320;
    });
    ctx.fillStyle = '#636366'; ctx.font = '500 22px ' + FA; ctx.fillText('@vectorvictorcards · ' + new Date().toLocaleDateString(), 90, H - 78);
    try {
      cv.toBlob(b => {
        const url = URL.createObjectURL(b); const a = document.createElement('a');
        a.href = url; a.download = `vvc-snapshot-${new Date().toISOString().slice(0, 10)}.png`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }, 'image/png');
    } catch (e) { alert('Snapshot blocked here — works in the standalone app.'); }
  }, [stats, window_]);

  const handleImportClick = useCallback(() => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

        const blob = JSON.parse(await file.text());
        if (!confirm(`Import ${file.name}?\nExported: ${blob.exportedAt || '?'}\nOverwrites current data.`)) return;
        const r = await data.handleImport(blob);
        alert(`✓ Imported: ${r.purchases}p / ${r.sales}s / ${r.supplies}sup / ${r.shows}sh / ${r.subs}psa`);
      } catch (err) { alert('Import failed: ' + err.message); }
    };
    input.click();
  }, [data]);

  // V5 F1: warn before close
  useEffect(() => {
    const h = (e) => { e.preventDefault(); e.returnValue = ''; };
    window.addEventListener('beforeunload', h);
    return () => window.removeEventListener('beforeunload', h);
  }, []);

  // Expose to CommandCenter velocity calc
  useEffect(() => {
    if (loaded) {
      window._vvcPurchases = purchases;
      window._vvcSales = sales;
    }
  }, [loaded, purchases, sales]);

  useEffect(() => {
    if (loaded) {
      window._vvcPurchases = purchases;
      window._vvcSales = sales;
      window._vvcShows = shows;
      window._vvcShowTargets = data.showTargets;
      window._vvcPsaData = psaData;
      window._vvcSlabs = slabs;
    }
  }, [loaded, purchases, sales, shows, psaData, slabs, data.showTargets]);

  // Translate saveStatus → toast
  useEffect(() => {
    if (!data.saveStatus) return;
    if (data.saveStatus === 'saving') return;
    if (data.saveStatus.ok === true) {
      showToast(`✓ Saved ${data.saveStatus.label}`, 'success');
    } else if (data.saveStatus.ok === false) {
      showToast(`✗ Save failed: ${(data.saveStatus.err || '').slice(0, 50)}`, 'error');
    }
  }, [data.saveStatus, showToast]);

  if (!loaded) return <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.cyan, fontFamily: "'Oswald', sans-serif", fontSize: 24 }}>Loading…</div>;

  // PHASE 2 — six task areas + PSA, replacing the 8-sub-tab sprawl.
  const AREAS = [
    { id: 'home',      label: 'Home',      icon: Home },
    { id: 'buy',       label: 'Buy',       icon: ShoppingCart },
    { id: 'inventory', label: 'Inventory', icon: Package },
    { id: 'shows',     label: 'Shows',     icon: Radio },
    { id: 'sell',      label: 'Sell',      icon: DollarSign },

  ];
  // Each area maps to existing screen(s). Buy/Sell/Money reuse BuySellMode with a
  // scoped sub-tab set (allowedTabs) so its internal nav only shows what belongs.
  const AREA_BS = {
    buy:   { allowed: ['pipeline', 'purchases', 'sellers'], def: 'pipeline' },
    sell:  { allowed: ['sales'], def: 'sales' },
    money: { allowed: ['dashboard', 'spending', 'supplies', 'tax'], def: 'dashboard' },

  const selectArea = (id) => {

    if (AREA_BS[id]) setBsTab(AREA_BS[id].def);
  };
  const showTimeFilter = ['home', 'buy', 'sell', 'money'].includes(area);
  // V10 — branding: live workspaces show the seller's own name; demo/unset falls back to VVC.
  const isDemo = !workspace || workspace.mode !== 'live';
  const brandName = (workspace && workspace.brand) ? workspace.brand : DEMO_BRAND;
  const brandHandle = (workspace && workspace.handle) ? workspace.handle : (isDemo ? DEMO_HANDLE : '');

  return (
    <div style={{ minHeight: '100vh', background: C.bg, fontFamily: "'Barlow', sans-serif", color: C.white }}>
      <style>{`
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif !important; }
        html, body { margin: 0; max-width: 100%; overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #f6f6f8; letter-spacing: -0.01em; scroll-behavior: smooth; }
        body, table, input, select { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1, 'cv01' 1, 'ss01' 1; }

        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); background-clip: content-box; }
        input, select, textarea, button { font-family: inherit !important; }
        h1,h2,h3 { letter-spacing: -0.02em; }
        button { transition: transform .12s ease, opacity .15s ease, background .15s ease, border-color .15s ease; }
        button:active { transform: scale(0.97); }
        input:focus, select:focus, textarea:focus { border-color: rgba(0,0,0,0.45) !important; box-shadow: 0 0 0 3px rgba(0,0,0,0.06) !important; }
        .vvc-card { transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease; animation: vvcCardIn .34s cubic-bezier(0.22,1,0.36,1) both; }
        .vvc-card:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(0,0,0,0.07), 0 2px 6px rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.08); }

      })()}
