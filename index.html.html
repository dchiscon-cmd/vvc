/* ----- localStorage-backed storage shim (replaces Claude artifact window.storage) ----- */
window.storage = {
  async get(key) {
    try { const v = localStorage.getItem('vvc:' + key); return v === null ? null : { key, value: v }; }
    catch (e) { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem('vvc:' + key, value); return { key, value }; }
    catch (e) { return null; }
  },
  async delete(key) {
    try { localStorage.removeItem('vvc:' + key); return { key, deleted: true }; }
    catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('vvc:')) {
          const bare = k.slice(4);
          if (!prefix || bare.startsWith(prefix)) keys.push(bare);
        }
      }
      return { keys };
    } catch (e) { return { keys: [] }; }
  }
};
</script>

// V10 — shared, scalable destination <option> set for any <select>. As shows pile
// up week over week, they stay organized instead of one endless flat list:
//   ⏸ Hold → Upcoming shows (soonest first) → Recent shows (newest first) → channels.
// Renders live off data.shows, so a newly-added show appears here automatically,
// slotted into Upcoming/Recent by its date.
function ShowAndChannelOptions({ shows, includeHold = true }) {
  const t = new Date().toISOString().split('T')[0];
  const list = (shows || []).filter(s => s && s.id);
  const upcoming = list.filter(s => s.d >= t).sort((a, b) => a.d.localeCompare(b.d));
  const past = list.filter(s => s.d < t).sort((a, b) => b.d.localeCompare(a.d));
  const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const lbl = (s) => { const d = new Date(s.d + 'T00:00:00'); return `${DOW[d.getDay()]} ${d.getMonth() + 1}/${d.getDate()} · ${s.plat}`; };
  return (
    <>
      {includeHold && <option value="__hold">⏸ Hold for Show</option>}
      {upcoming.length > 0 && <optgroup label="Upcoming shows">{upcoming.map(s => <option key={s.id} value={s.id}>🎥 {lbl(s)}</option>)}</optgroup>}
      {past.length > 0 && <optgroup label="Recent shows">{past.map(s => <option key={s.id} value={s.id}>🎥 {lbl(s)}</option>)}</optgroup>}
      <optgroup label="Sell-through &amp; other">
        {DEST_OPTS.filter(o => o.v !== '__hold').map(o => <option key={o.v} value={o.v}>{o.label}</option>)}
      </optgroup>
    </>
  );
}

// ---- Cloud sync helpers (Pantry / getpantry.cloud). One Pantry ID, no key. Works in the standalone app. ----
const PANTRY_BASKET = 'vvc-dashboard';
async function doCloudPull(cfg, setters) {
  if (!cfg || !cfg.pantryId) return { ok: false, msg: 'Not configured' };
  const r = await fetch(`https://getpantry.cloud/apiv1/pantry/${cfg.pantryId}/basket/${PANTRY_BASKET}`);
  if (r.status === 400) return { ok: true, applied: false }; // basket not created yet
  if (!r.ok) throw new Error('Pull HTTP ' + r.status);
  const rec = await r.json();
  if (rec && Array.isArray(rec.purchases)) {
    // MIGRATION GUARD: never let a stale cloud copy (old aggregate Whatnot data)
    // overwrite the itemized converted ledger. If the incoming purchases are
    // pre-conversion while this build is converted, skip applying purchases and
    // instead schedule a push so the cloud gets upgraded.
    const incomingWn = rec.purchases.filter(x => x && x.s === 'Whatnot').length;
    const seedWn = SEED_PURCHASES.filter(x => x.s === 'Whatnot').length;
    const incomingSpend = rec.purchases.reduce((s, p) => s + (p.t || 0), 0);
    const seedSpend = SEED_PURCHASES.reduce((s, p) => s + (p.t || 0), 0);
    // Block stale cloud: either pre-conversion record count, or old-premium totals
    if ((seedWn >= 1500 && incomingWn < 1500) || (seedWn >= 1500 && Math.abs(incomingSpend - seedSpend) > 2000)) {
      try { window._vvcCloudStale = true; } catch (e) {}
      return { ok: true, applied: false, stale: true };
    }
    setters.setPurchases(rec.purchases);
    if (Array.isArray(rec.sales)) setters.setSales(rec.sales);
    if (Array.isArray(rec.supplies)) setters.setSupplies(rec.supplies);
    if (Array.isArray(rec.shows)) setters.setShows(rec.shows);
    if (rec.psaData) setters.setPsaData(rec.psaData);
    if (Array.isArray(rec.slabs)) setters.setSlabs(rec.slabs);
    if (rec.showTargets) setters.setShowTargets(rec.showTargets);
    if (rec.baseline) setters.setBaseline(rec.baseline);
    if (rec.basis) setters.setPlBasis(rec.basis);
    try {
      window.storage.set(KEYS.purchases, JSON.stringify(rec.purchases));
      if (rec.sales) window.storage.set(KEYS.sales, JSON.stringify(rec.sales));
      if (rec.supplies) window.storage.set(KEYS.supplies, JSON.stringify(rec.supplies));
      if (rec.shows) window.storage.set(KEYS.shows, JSON.stringify(rec.shows));
      if (rec.psaData) window.storage.set(KEYS.psa, JSON.stringify(rec.psaData));
      if (rec.slabs) window.storage.set(KEYS.slabs, JSON.stringify(rec.slabs));
      if (rec.showTargets) window.storage.set(KEYS.showTargets, JSON.stringify(rec.showTargets));
      if (rec.baseline) window.storage.set(KEYS.baseline, JSON.stringify(rec.baseline));
      if (rec.basis) window.storage.set(KEYS.basis, JSON.stringify({ basis: rec.basis }));
    } catch (e) {}
    return { ok: true, applied: true };
  }
  return { ok: true, applied: false };
}

async function doCloudPush(cfg, blob) {
  if (!cfg || !cfg.pantryId) return { ok: false, msg: 'Not configured' };
  const r = await fetch(`https://getpantry.cloud/apiv1/pantry/${cfg.pantryId}/basket/${PANTRY_BASKET}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(blob),
  });
  if (!r.ok) throw new Error('Push HTTP ' + r.status);
  return { ok: true };
}

  const [plBasis, setPlBasis] = useState('cash');             // Phase 1: 'cash' | 'cogs'
  const [workspace, setWorkspace] = useState(DEFAULT_WORKSPACE); // V10: multi-seller identity
  // Save status: null = idle, 'saving' = in flight, { ok: true, at: Date } = success, { ok: false, err: string } = fail
  const [saveStatus, setSaveStatus] = useState(null);
  const [lastSaved, setLastSaved] = useState({});
  const saveTimers = React.useRef({});  // { purchases: Date, sales: Date, ... }
  // ---- Cloud sync (JSONBin) ----
  const [cloudCfg, setCloudCfg] = useState({ pantryId: '' });
  const [cloudStatus, setCloudStatus] = useState({ state: 'idle' });
  const cloudPushTimer = React.useRef(null);
  const cloudReadyRef = React.useRef(false);
  const CLOUD_KEY = 'vvc-cloud-sync-v1';

  useEffect(() => {
    (async () => {
      // SIMPLE RULE: If storage has data, use it. Period.
      // Storage is the user's edits. Seed is only a fallback for first-ever load.
      // This means deletions, edits, and additions all persist correctly.
      const tryGet = async (key, seed) => {
        try {
          const result = await window.storage.get(key);
          if (result && result.value) {
            const parsed = JSON.parse(result.value);
            if (Array.isArray(parsed) || (parsed && typeof parsed === 'object')) {
              return parsed;
            }
          }
        } catch (e) { console.error(`Load ${key} failed`, e); }
        return seed;
      };
      const p = await (async () => {
        const stored = await tryGet(KEYS.purchases, SEED_PURCHASES);
        // ONE-TIME AUTO-MIGRATION: triggers if either (a) saved data is the old
        // pre-conversion aggregate set, or (b) seed version has changed (e.g. buyer
        // premium stripped, new CSV import). Writes SEED_PURCHASES to storage.
        const storedWn = stored.filter(x => x.s === 'Whatnot').length;
        const seedWn = SEED_PURCHASES.filter(x => x.s === 'Whatnot').length;
        let storedVer = 0;
        try { const vr = await window.storage.get(KEYS.seedVersion); if (vr && vr.value) storedVer = Number(JSON.parse(vr.value)) || 0; } catch (e) {}
        const needsMigration = (seedWn >= 1500 && storedWn < 1500) || (SEED_VERSION > storedVer);
        if (needsMigration) {
          try {
            await window.storage.set(KEYS.purchases, JSON.stringify(SEED_PURCHASES));
            await window.storage.set(KEYS.sales, JSON.stringify(SEED_SALES));
            await window.storage.set(KEYS.shows, JSON.stringify(SEED_SHOWS));
            await window.storage.set(KEYS.seedVersion, JSON.stringify(SEED_VERSION));
          } catch (e) {}
          try { window._vvcMigrated = true; } catch (e) {}
          return SEED_PURCHASES;
        }
        // Update showId on existing matches + add any missing entries
        let changed = false;
        const updated = stored.map(sp => {
          const match = NEW_SEED_PURCHASES.find(np => np.d === sp.d && np.sl === sp.sl && np.t === sp.t);
          if (match && match.showId && sp.showId !== match.showId && !sp.showId) { changed = true; return { ...sp, showId: match.showId }; }
          return sp;
        });
        const toAdd = NEW_SEED_PURCHASES.filter(np =>
          !stored.some(sp => sp.d === np.d && sp.sl === np.sl && sp.t === np.t)
        );
        let base = (toAdd.length > 0 || changed) ? [...updated, ...toAdd] : updated;
        // Normalize: historical records have no `received` field — treat them as
        // in-hand. Only an explicit received:false counts as pending.
        let normChanged = false;
        base = base.map(p => {
          if (p.received === undefined) { normChanged = true; return { ...p, received: true }; }
          return p;
        });
        // Phase 1: assign a stable per-record id to any purchase missing one, so
        // two identical same-day/same-price cards both count (the old date+seller+price
        // dedup could falsely merge them). Existing ids are preserved.
        base = base.map((p, i) => {
          if (!p.id) { normChanged = true; return { ...p, id: mkPurchaseId(p, i) }; }
          return p;
        });
        if (toAdd.length > 0 || changed || normChanged) {
          try { await window.storage.set(KEYS.purchases, JSON.stringify(base)); } catch(e) {}
        }
        return base;
      })();
      const sa = await (async () => {
        let storedSa = await tryGet(KEYS.sales, SEED_SALES);
        // One-time cleanup: the seeded 2026-05-22 Whatnot sale was removed; drop it from any stored copy too.
        const had522 = storedSa.some(ss => ss.d === '2026-05-22' && ss.p === 'Whatnot' && ss.g === 3074);
        if (had522) storedSa = storedSa.filter(ss => !(ss.d === '2026-05-22' && ss.p === 'Whatnot' && ss.g === 3074));
        const toAddSa = SEED_SALES.filter(ns => !storedSa.some(ss => ss.d === ns.d && ss.p === ns.p && ss.g === ns.g));
        if (toAddSa.length > 0 || had522) {
          const merged = [...storedSa, ...toAddSa];
          try { await window.storage.set(KEYS.sales, JSON.stringify(merged)); } catch(e) {}
          return merged;
        }
        return storedSa;
      })();
      const su = await tryGet(KEYS.supplies, SEED_SUPPLIES);
      const sh = await (async () => {
        const storedSh = await tryGet(KEYS.shows, SEED_SHOWS);
        let changed = false;
        const updated = storedSh.map(ss => {
          const match = SEED_SHOWS.find(ns => ns.id === ss.id);
          if (match && (match.pv !== ss.pv || match.nf !== ss.nf || match.sh !== ss.sh)) {
            changed = true; return { ...ss, ...match };
          }
          return ss;
        });
        const toAddSh = SEED_SHOWS.filter(ns => !storedSh.some(ss => ss.id === ns.id));
        if (toAddSh.length > 0 || changed) {
          const merged = [...updated, ...toAddSh];
          try { await window.storage.set(KEYS.shows, JSON.stringify(merged)); } catch(e) {}
          return merged;
        }
        return storedSh;
      })();
      const psa = await tryGet(KEYS.psa, SEED_PSA);
      const sl = await tryGet(KEYS.slabs, []);
      const st = await tryGet(KEYS.showTargets, {});
      const bl = await tryGet(KEYS.baseline, DEFAULT_BASELINE);
      const bs = await tryGet(KEYS.basis, { basis: 'cash' });
      const ws = await tryGet(KEYS.workspace, DEFAULT_WORKSPACE);
      setPurchases(p); setSales(sa); setSupplies(su); setShows(sh); setPsaData(psa); setSlabs(sl); setShowTargets(st);
      setBaseline(bl && typeof bl.count === 'number' ? bl : DEFAULT_BASELINE);
      setPlBasis('cash'); // COGS removed
      setWorkspace(ws && typeof ws === 'object' ? { ...DEFAULT_WORKSPACE, ...ws } : DEFAULT_WORKSPACE);
      try {
        // meta load skipped
      } catch (e) {}
      // Load cloud-sync config; if set, pull the shared copy (cloud is source of truth across devices)
      try {
        const cc = await window.storage.get(CLOUD_KEY);
        if (cc && cc.value) {
          const cfg = JSON.parse(cc.value);
          if (cfg && cfg.pantryId) {
            setCloudCfg(cfg);
            await doCloudPull(cfg, { setPurchases, setSales, setSupplies, setShows, setPsaData, setSlabs, setShowTargets, setBaseline, setPlBasis });
          }
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  // Generic saver — takes a single key+value, saves independently, updates status
  const saveOne = useCallback(async (key, value, label) => {
    setSaveStatus('saving');
    try {
      const json = JSON.stringify(value);
      try { await window.storage.set(key, json); } catch(e) {}
      const now = new Date();
      setLastSaved(prev => {
        const next = { ...prev, [label]: now.toISOString() };
        try { window.storage.set(KEYS.meta, JSON.stringify(next)); } catch(e) {}
        return next;
      });
      setSaveStatus({ ok: true, at: now, label, bytes: json.length });
      setTimeout(() => setSaveStatus(s => (s && s.ok && s.at === now) ? null : s), 4000);
      return { ok: true, bytes: json.length };
    } catch (e) {
      console.error(`Save ${label} failed`, e);
      setSaveStatus({ ok: false, err: e.message || String(e), label });
      return { ok: false, err: e.message };
    }
  }, []);

  // ---- Cloud sync wrappers (status-aware) ----
  const cloudPull = useCallback(async (cfgOverride) => {
    const cfg = cfgOverride || cloudCfg;
    if (!cfg.pantryId) return { ok: false, msg: 'Not configured' };
    setCloudStatus({ state: 'syncing' });
    try {
      const res = await doCloudPull(cfg, { setPurchases, setSales, setSupplies, setShows, setPsaData, setSlabs, setShowTargets, setBaseline, setPlBasis });
      setCloudStatus({ state: 'ok', at: new Date(), msg: res.applied ? 'Pulled from cloud' : 'Cloud is empty — nothing to pull yet' });
      return res;
    } catch (e) { setCloudStatus({ state: 'error', msg: e.message || String(e) }); return { ok: false, msg: e.message }; }
  }, [cloudCfg]);

  const cloudPush = useCallback(async (cfgOverride) => {
    const cfg = cfgOverride || cloudCfg;
    if (!cfg.pantryId) return { ok: false };
    setCloudStatus({ state: 'syncing' });
    try {
      const blob = { purchases, sales, supplies, shows, psaData, slabs, showTargets, baseline, basis: plBasis, _ts: Date.now() };
      await doCloudPush(cfg, blob);
      setCloudStatus({ state: 'ok', at: new Date(), msg: 'Synced to cloud' });
      return { ok: true };
    } catch (e) { setCloudStatus({ state: 'error', msg: e.message || String(e) }); return { ok: false, msg: e.message }; }
  }, [cloudCfg, purchases, sales, supplies, shows, psaData, slabs, showTargets, baseline, plBasis]);

  const saveCloudConfig = useCallback(async (cfg) => {
    setCloudCfg(cfg);
    try { await window.storage.set(CLOUD_KEY, JSON.stringify(cfg)); } catch (e) {}
  }, []);

  // Auto-push: debounce a sync whenever data changes (after initial load/pull)
  useEffect(() => {
    if (!loaded || !cloudCfg.pantryId) return;
    if (!cloudReadyRef.current) { cloudReadyRef.current = true; return; }
    clearTimeout(cloudPushTimer.current);
    cloudPushTimer.current = setTimeout(() => { cloudPush(); }, 2500);
    return () => clearTimeout(cloudPushTimer.current);
  }, [purchases, sales, supplies, shows, psaData, slabs, showTargets, baseline, plBasis, loaded, cloudCfg, cloudPush]);

  // Each mutation saves ONLY its own slice
  // Bulk update multiple purchases in one save — avoids rate limit
  const bulkUpdatePurchases = useCallback(async (updates) => {
    // updates = array of { oldItem, newItem }
    let next = [...purchases];
    for (const { oldItem, newItem } of updates) {
      let idx = oldItem.id ? next.findIndex(p => p.id === oldItem.id) : -1;
      if (idx === -1) idx = oldItem._rk != null
        ? oldItem._rk
        : next.findIndex(p => p.d === oldItem.d && p.s === oldItem.s && p.n === oldItem.n && p.t === oldItem.t);
      if (idx === -1 || idx >= next.length) continue;
      const clean = { ...newItem }; delete clean._rk;
      if (!clean.id && next[idx].id) clean.id = next[idx].id;
      next[idx] = clean;
    }
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
  }, [purchases, saveOne]);

  const addPurchase = useCallback(async item => {
    const withId = item.id ? item : { ...item, id: `p_${Date.now()}_${Math.random().toString(36).slice(2,7)}` };
    const next = [...purchases, withId];
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
  }, [purchases, saveOne]);

  // V9: bulk insert (CSV import / quick-log sessions) — one state write, one save.
  const bulkAddPurchases = useCallback(async items => {
    if (!items || !items.length) return 0;
    const stamped = items.map((it, i) => it.id ? it : { ...it, id: `p_${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}` });
    const next = [...purchases, ...stamped];
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
    return stamped.length;
  }, [purchases, saveOne]);

  const updatePurchase = useCallback(async (oldI, newI) => {
    let idx = oldI.id ? purchases.findIndex(p => p.id === oldI.id) : -1;
    if (idx === -1) idx = oldI._rk != null ? oldI._rk : purchases.findIndex(p => p.d === oldI.d && p.s === oldI.s && p.n === oldI.n && p.t === oldI.t);
    if (idx === -1 || idx >= purchases.length) return;
    const clean = { ...newI }; delete clean._rk;
    if (!clean.id && purchases[idx].id) clean.id = purchases[idx].id;
    const next = [...purchases]; next[idx] = clean;
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
  }, [purchases, saveOne]);

  const deletePurchase = useCallback(async item => {
    let idx = item.id ? purchases.findIndex(p => p.id === item.id) : -1;
    if (idx === -1) idx = item._rk != null ? item._rk : purchases.findIndex(p => p.d === item.d && p.s === item.s && p.n === item.n && p.t === item.t);
    if (idx === -1 || idx >= purchases.length) return;
    const next = purchases.filter((_, i) => i !== idx);
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
  }, [purchases, saveOne]);

  const addSale = useCallback(async item => {
    const next = [...sales, item];
    setSales(next);
    await saveOne(KEYS.sales, next, 'sales');
  }, [sales, saveOne]);

  const updateSale = useCallback(async (oldI, newI) => {
    const idx = sales.findIndex(s => s.d === oldI.d && s.p === oldI.p && s.n === oldI.n && s.g === oldI.g);
    if (idx === -1) return;
    const next = [...sales]; next[idx] = newI;
    setSales(next);
    await saveOne(KEYS.sales, next, 'sales');
  }, [sales, saveOne]);

  const deleteSale = useCallback(async item => {
    const idx = sales.findIndex(s => s.d === item.d && s.p === item.p && s.n === item.n && s.g === item.g);
    if (idx === -1) return;
    const next = sales.filter((_, i) => i !== idx);
    setSales(next);
    await saveOne(KEYS.sales, next, 'sales');
  }, [sales, saveOne]);

  const addSupply = useCallback(async item => {
    const next = [...supplies, item];
    setSupplies(next);
    await saveOne(KEYS.supplies, next, 'supplies');
  }, [supplies, saveOne]);

  const updateSupply = useCallback(async (oldI, newI) => {
    const idx = supplies.findIndex(s => s.d === oldI.d && s.ty === oldI.ty && s.q === oldI.q && s.t === oldI.t);
    if (idx === -1) return;
    const next = [...supplies]; next[idx] = newI;
    setSupplies(next);
    await saveOne(KEYS.supplies, next, 'supplies');
  }, [supplies, saveOne]);

  const deleteSupply = useCallback(async item => {
    const idx = supplies.findIndex(s => s.d === item.d && s.ty === item.ty && s.q === item.q && s.t === item.t);
    if (idx === -1) return;
    const next = supplies.filter((_, i) => i !== idx);
    setSupplies(next);
    await saveOne(KEYS.supplies, next, 'supplies');
  }, [supplies, saveOne]);

  const addShow = useCallback(async item => {
    const showId = item.id || `show_${item.d}_${item.plat}_${item.st || '000'}`;
    const next = [...shows, { ...item, id: showId }];
    setShows(next);
    await saveOne(KEYS.shows, next, 'shows');
  }, [shows, saveOne]);

  const updateShow = useCallback(async (oldI, newI) => {
    const idx = shows.findIndex(s => (oldI.id && s.id === oldI.id) || (s.d === oldI.d && s.plat === oldI.plat && s.st === oldI.st));
    if (idx === -1) return;
    const preservedId = oldI.id || `show_${newI.d}_${newI.plat}_${newI.st || '000'}`;
    const next = [...shows]; next[idx] = { ...newI, id: preservedId };
    setShows(next);
    await saveOne(KEYS.shows, next, 'shows');
  }, [shows, saveOne]);

  const deleteShow = useCallback(async item => {
    const idx = shows.findIndex(s => (item.id && s.id === item.id) || (s.d === item.d && s.plat === item.plat && s.st === item.st));
    if (idx === -1) return;
    const next = shows.filter((_, i) => i !== idx);
    setShows(next);
    await saveOne(KEYS.shows, next, 'shows');
  }, [shows, saveOne]);

  // Tag or untag a purchase to/from a show
  const attributePurchase = useCallback(async (purchaseItem, showId) => {
    // Phase 1: prefer the stable id; fall back to _rk, then field match.
    let idx = purchaseItem.id ? purchases.findIndex(p => p.id === purchaseItem.id) : -1;
    if (idx === -1) idx = purchaseItem._rk !== undefined
      ? purchaseItem._rk
      : purchases.findIndex(p => p.d === purchaseItem.d && p.s === purchaseItem.s && p.n === purchaseItem.n && p.t === purchaseItem.t && p.sl === purchaseItem.sl);
    if (idx === -1) return;
    const next = [...purchases];
    next[idx] = { ...next[idx], showId: showId === '' ? null : (showId || null) };
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
  }, [purchases, saveOne]);

  // Auto-attribute: backfill Whatnot shows from sales history, then route every
  // unassigned/hold received purchase to the first Whatnot show on/after its buy
  // date (cards bought feed the next show). eBay/Card-Show/Other left untouched.
  const autoAttribute = useCallback(async () => {
    const wnDates = [...new Set(sales.filter(s => s.p === 'Whatnot').map(s => s.d))].sort();
    const haveDate = new Set(shows.map(s => s.d));
    const newShows = wnDates.filter(d => !haveDate.has(d)).map(d => ({
      d, plat: 'Whatnot', st: '21:00', dur: 0, pv: 0, nf: 0, sh: 0, note: 'auto-backfilled from sales',
      status: 'complete', id: `show_${d}_Whatnot_21:00`,
    }));
    const allShows = [...shows, ...newShows];
    const cal = [...new Set(allShows.filter(s => s.plat === 'Whatnot').map(s => s.d))].sort();
    const isAssigned = (sid) => sid && (sid.startsWith('show_') || ['__ebay', '__cardshow', '__comc', '__personal'].includes(sid));
    let moved = 0;
    const nextP = purchases.map(p => {
      if (p.received === false) return p;          // pending stays pending
      if (isAssigned(p.showId)) return p;          // already routed
      const dt = cal.find(d => d >= p.d);          // first show on/after buy date
      if (!dt) return p;                            // no show yet (bought after last show)
      moved++;
      return { ...p, showId: `show_${dt}_Whatnot_21:00` };
    });
    if (newShows.length) { setShows(allShows); await saveOne(KEYS.shows, allShows, 'shows'); }
    setPurchases(nextP); await saveOne(KEYS.purchases, nextP, 'purchases');
    return { moved, backfilled: newShows.length };
  }, [purchases, sales, shows, saveOne]);

  // Tag pre-tracking buys (before the cutoff date) as Legacy — archives them out of
  // the active pipeline/show pools while keeping their cost in lifetime P&L, and makes
  // them available as COGS opening inventory.
  const tagLegacy = useCallback(async (cutoffDate) => {
    if (!cutoffDate) return { tagged: 0, cards: 0, cost: 0 };
    let tagged = 0, cards = 0, cost = 0;
    const next = purchases.map(p => {
      if (p.d < cutoffDate && p.showId !== '__legacy') {
        tagged++; cards += (p.n || 0); cost += (p.t || 0);
        return { ...p, showId: '__legacy', received: p.received !== false };
      }
      return p;
    });
    setPurchases(next);
    await saveOne(KEYS.purchases, next, 'purchases');
    return { tagged, cards, cost };
  }, [purchases, saveOne]);

  const updatePsaCard = useCallback(async (subId, cardId, updates) => {
    const next = { ...psaData, subs: psaData.subs.map(s => s.id === subId
      ? { ...s, cards: s.cards.map(c => c.id === cardId ? { ...c, ...updates } : c) } : s) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  const addPsaSub = useCallback(async (name) => {
    const id = `sub_${Date.now()}`;
    const newSub = { id, name, status: 'building', submissionDate: '', returnDate: '', cards: [] };
    const next = { ...psaData, subs: [...psaData.subs, newSub] };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
    return id;
  }, [psaData, saveOne]);

  const renamePsaSub = useCallback(async (subId, newName) => {
    const next = { ...psaData, subs: psaData.subs.map(s => s.id === subId ? { ...s, name: newName } : s) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  const deletePsaSub = useCallback(async (subId) => {
    const next = { ...psaData, subs: psaData.subs.filter(s => s.id !== subId) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  const updatePsaSubStatus = useCallback(async (subId, status, dateField) => {
    const next = { ...psaData, subs: psaData.subs.map(s => s.id === subId ? { ...s, status, ...(dateField ? { [dateField]: today() } : {}) } : s) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  const addPsaCard = useCallback(async (subId, card) => {
    const next = { ...psaData, subs: psaData.subs.map(s => s.id === subId
      ? { ...s, cards: [...s.cards, card] } : s) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  const deletePsaCard = useCallback(async (subId, cardId) => {
    const next = { ...psaData, subs: psaData.subs.map(s => s.id === subId
      ? { ...s, cards: s.cards.filter(c => c.id !== cardId) } : s) };
    setPsaData(next);
    await saveOne(KEYS.psa, next, 'psa');
  }, [psaData, saveOne]);

  // Slab inventory CRUD
  const addSlab = useCallback(async (slab) => {
    const id = `slab_${Date.now()}`;
    const next = [...slabs, { ...slab, id }];
    setSlabs(next);
    await saveOne(KEYS.slabs, next, 'slabs');
  }, [slabs, saveOne]);

  const updateSlab = useCallback(async (slabId, updates) => {
    const next = slabs.map(s => s.id === slabId ? { ...s, ...updates } : s);
    setSlabs(next);
    await saveOne(KEYS.slabs, next, 'slabs');
  }, [slabs, saveOne]);

  const deleteSlab = useCallback(async (slabId) => {
    const next = slabs.filter(s => s.id !== slabId);
    setSlabs(next);
    await saveOne(KEYS.slabs, next, 'slabs');
  }, [slabs, saveOne]);

  const handleImport = useCallback(async (blob) => {
    const p = Array.isArray(blob.purchases) ? blob.purchases : SEED_PURCHASES;
    const s = Array.isArray(blob.sales) ? blob.sales : SEED_SALES;
    const su = Array.isArray(blob.supplies) ? blob.supplies : SEED_SUPPLIES;
    const sh = Array.isArray(blob.shows) ? blob.shows : SEED_SHOWS;
    const psa = (blob.psaData && Array.isArray(blob.psaData.subs)) ? blob.psaData : SEED_PSA;
    const sl = Array.isArray(blob.slabs) ? blob.slabs : [];
    const bl = (blob.baseline && typeof blob.baseline.count === 'number') ? blob.baseline : DEFAULT_BASELINE;
    const bs = 'cash'; // COGS removed
    const r1 = await saveOne(KEYS.purchases, p, 'purchases');
    const r2 = await saveOne(KEYS.sales, s, 'sales');
    const r3 = await saveOne(KEYS.supplies, su, 'supplies');
    const r4 = await saveOne(KEYS.shows, sh, 'shows');
    const r5 = await saveOne(KEYS.psa, psa, 'psa');
    const r6 = await saveOne(KEYS.slabs, sl, 'slabs');
    await saveOne(KEYS.baseline, bl, 'baseline');
    await saveOne(KEYS.basis, { basis: bs }, 'basis');
    setPurchases(p); setSales(s); setSupplies(su); setShows(sh); setPsaData(psa); setSlabs(sl);
    setBaseline(bl); setPlBasis(bs);
    const allOk = r1.ok && r2.ok && r3.ok && r4.ok && r5.ok && r6.ok;
    return { purchases: p.length, sales: s.length, supplies: su.length, shows: sh.length, subs: psa.subs.length, slabs: sl.length, allOk };
  }, [saveOne]);

  const resetToSeed = useCallback(async () => {
    await saveOne(KEYS.purchases, SEED_PURCHASES, 'purchases');
    await saveOne(KEYS.sales, SEED_SALES, 'sales');
    await saveOne(KEYS.supplies, SEED_SUPPLIES, 'supplies');
    await saveOne(KEYS.shows, SEED_SHOWS, 'shows');
    await saveOne(KEYS.psa, SEED_PSA, 'psa');
    await saveOne(KEYS.slabs, [], 'slabs');
    setPurchases(SEED_PURCHASES); setSales(SEED_SALES); setSupplies(SEED_SUPPLIES); setShows(SEED_SHOWS); setPsaData(SEED_PSA); setSlabs([]);
  }, [saveOne]);

  // V10 — wipe every data slice to a clean slate for a brand-new seller. Keeps the
  // app's structure (shows/PSA scaffolding empty) so a live workspace starts at zero
  // instead of inheriting Victor's 2,300+ buys. Does NOT touch cloud config.
  const resetToEmpty = useCallback(async () => {
    await saveOne(KEYS.purchases, [], 'purchases');
    await saveOne(KEYS.sales, [], 'sales');
    await saveOne(KEYS.supplies, [], 'supplies');
    await saveOne(KEYS.shows, [], 'shows');
    await saveOne(KEYS.psa, EMPTY_PSA, 'psa');
    await saveOne(KEYS.slabs, [], 'slabs');
    await saveOne(KEYS.showTargets, {}, 'showTargets');
    await saveOne(KEYS.baseline, DEFAULT_BASELINE, 'baseline');
    setPurchases([]); setSales([]); setSupplies([]); setShows([]); setPsaData(EMPTY_PSA); setSlabs([]);
    setShowTargets({}); setBaseline(DEFAULT_BASELINE);
  }, [saveOne]);

  const saveWorkspace = useCallback(async (next) => {
    const merged = { ...DEFAULT_WORKSPACE, ...next };
    setWorkspace(merged);
    await saveOne(KEYS.workspace, merged, 'workspace');
    return merged;
  }, [saveOne]);

  // Diagnostic: read raw storage, show sizes + last saved
  const getDiagnostics = useCallback(async () => {
    const results = {};
    for (const [label, key] of Object.entries(KEYS)) {
      try {
        const _dr = await window.storage.get(key); const val = _dr ? _dr.value : null;
          if (val) {
          let parsedLen = null;
          try {
            const p = JSON.parse(val);
            parsedLen = Array.isArray(p) ? p.length : (p?.subs?.length ?? null);
          } catch {}
          results[label] = { exists: true, bytes: val.length, parsedLen, lastSaved: lastSaved[label] || null };
        } else {
          results[label] = { exists: false };
        }
      } catch (e) {
        // A missing key throws in this environment — that just means the slice
        // has never been edited/saved and loads from seed. Not an error.
        results[label] = { exists: false, unsaved: true };
      }
    }
    return results;
  }, [lastSaved]);

  // Persist every slice to this device (sequential to avoid storage rate limits)
  const persistAll = useCallback(async () => {
    await saveOne(KEYS.purchases, purchases, 'purchases');
    await saveOne(KEYS.sales, sales, 'sales');
    await saveOne(KEYS.supplies, supplies, 'supplies');
    await saveOne(KEYS.shows, shows, 'shows');
    await saveOne(KEYS.psa, psaData, 'psa');
    await saveOne(KEYS.slabs, slabs, 'slabs');
    await saveOne(KEYS.showTargets, showTargets, 'showTargets');
    await saveOne(KEYS.baseline, baseline, 'baseline');
    await saveOne(KEYS.basis, { basis: plBasis }, 'basis');
  }, [saveOne, purchases, sales, supplies, shows, psaData, slabs, showTargets, baseline, plBasis]);

  return {
    purchases, sales, supplies, shows, psaData, loaded,
    saveStatus, lastSaved,
    addPurchase, bulkAddPurchases, updatePurchase, deletePurchase, bulkUpdatePurchases,
    addSale, updateSale, deleteSale,
    addSupply, updateSupply, deleteSupply,
    addShow, updateShow, deleteShow, attributePurchase,
    updatePsaCard, addPsaCard, deletePsaCard,
    addPsaSub, renamePsaSub, deletePsaSub, updatePsaSubStatus,
    slabs, addSlab, updateSlab, deleteSlab,
    showTargets, saveShowTargets: async (next) => { setShowTargets(next); await saveOne(KEYS.showTargets, next, "showTargets"); },
    baseline, saveBaseline: async (next) => { setBaseline(next); await saveOne(KEYS.baseline, next, "baseline"); },
    plBasis, savePlBasis: async (next) => { setPlBasis(next); await saveOne(KEYS.basis, { basis: next }, "basis"); },
    autoAttribute, tagLegacy,
    handleImport, resetToSeed, resetToEmpty, getDiagnostics, persistAll,
    workspace, saveWorkspace,
    cloudCfg, cloudStatus, cloudPull, cloudPush, saveCloudConfig,
  };
}

// ============================================================================
// FILTERING — one source of truth, used everywhere
// ============================================================================
function getFilterWindow(timeFilter, selectedMonth) {
  const now = new Date();
  const Y = now.getFullYear();
  const M = now.getMonth() + 1;
  if (timeFilter === 'all') return { matches: () => true, label: 'All-Time', months: null };
  if (timeFilter === 'ytd') {
    const yr = String(Y);
    return {
      matches: (d) => typeof d === 'string' && d.slice(0, 4) === yr,
      label: `YTD ${yr}`,
      // months to render in chart
      months: Array.from({ length: M }, (_, i) => `${yr}-${String(i+1).padStart(2,'0')}`),
    };
  }
  if (timeFilter === 'mtd') {
    const ym = `${Y}-${String(M).padStart(2,'0')}`;
    return {
      matches: (d) => typeof d === 'string' && d.slice(0, 7) === ym,
      label: `MTD ${ym}`, months: [ym],
    };
  }
  if (timeFilter === 'month' && selectedMonth) {
    return {
      matches: (d) => typeof d === 'string' && d.slice(0, 7) === selectedMonth,
      label: selectedMonth, months: [selectedMonth],
    };
  }
  return { matches: () => true, label: 'All-Time', months: null };
}

// Build a monthly series: always renders the right months even if data has gaps
function buildMonthlySeries(purchases, sales, supplies, timeFilter, selectedMonth) {
  // Pick months to render
  let months;
  const win = getFilterWindow(timeFilter, selectedMonth);
  if (win.months) {
    months = win.months;
  } else {
    // All-time: show every month that has data
    const all = new Set();
    purchases.forEach(p => typeof p.d === 'string' && all.add(p.d.slice(0,7)));
    sales.forEach(s => typeof s.d === 'string' && all.add(s.d.slice(0,7)));
    months = Array.from(all).sort();
  }
  return months.map(ym => {
    const spent = purchases.filter(p => typeof p.d === 'string' && p.d.slice(0,7) === ym).reduce((s, p) => s + p.t, 0);
    const net = sales.filter(s => typeof s.d === 'string' && s.d.slice(0,7) === ym).reduce((s, x) => s + x.net, 0);
    const gross = sales.filter(s => typeof s.d === 'string' && s.d.slice(0,7) === ym).reduce((s, x) => s + x.g, 0);
    const sup = supplies.filter(s => typeof s.d === 'string' && s.d.slice(0,7) === ym).reduce((s, x) => s + x.t, 0);
    const cards = purchases.filter(p => typeof p.d === 'string' && p.d.slice(0,7) === ym).reduce((s, p) => s + p.n, 0);
    const sold = sales.filter(s => typeof s.d === 'string' && s.d.slice(0,7) === ym).reduce((s, x) => s + x.n, 0);
    const [yy, mm] = ym.split('-');
    const label = new Date(parseInt(yy), parseInt(mm) - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    return { ym, label, spent, net, gross, supplies: sup, cards, sold, pl: net - spent - sup, cardOnlyPL: net - spent };
  });
}

// Buffers input locally — only commits to parent on blur or Enter
function InlineNumberInput({ value, onChange, placeholder = '—', style = {} }) {
  const [local, setLocal] = useState(value != null ? String(value) : '');
  useEffect(() => { setLocal(value != null ? String(value) : ''); }, [value]);
  const commit = () => {
    const num = local.trim() ? parseFloat(local) : null;
    if (num !== value) onChange(num);
  };
  return (
    <input type="number" value={local} placeholder={placeholder}
      onChange={e => setLocal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === 'Enter') { e.target.blur(); }}}
      style={{ background: C.navy, border: `1px solid ${C.navyMid}`, borderRadius: 4, padding: '5px 8px', color: C.white, fontSize: 12, width: 75, ...style }} />
  );

function EntryForm({ type, onSubmit, initialValues, editing, shows = [] }) {
  // "Assign at buy" — default a new purchase's destination to the next upcoming show.
  const nextShowId = (() => {
    const t = today();
    const up = [...shows].filter(s => s.d >= t).sort((a, b) => a.d.localeCompare(b.d))[0];
    return up ? (up.id || `show_${up.d}_${up.plat}_${up.st || '000'}`) : '__hold';
  })();
  const [form, setForm] = useState(() => {
    if (initialValues) {
      if (type === 'purchase') return { d: initialValues.d, s: initialValues.s, n: String(initialValues.n), t: String(initialValues.t), sl: initialValues.sl || '', showId: initialValues.showId || '' };
      if (type === 'sale') return { d: initialValues.d, p: initialValues.p, n: String(initialValues.n), g: String(initialValues.g), netOverride: String(initialValues.net) };
      if (type === 'supply') return { d: initialValues.d, ty: initialValues.ty, q: String(initialValues.q), t: String(initialValues.t) };
      if (type === 'show') return { d: initialValues.d, plat: initialValues.plat, st: initialValues.st || '19:00',
        dur: initialValues.dur ? String(initialValues.dur) : '', pv: initialValues.pv ? String(initialValues.pv) : '',
        nf: initialValues.nf ? String(initialValues.nf) : '', sh: initialValues.sh ? String(initialValues.sh) : '', note: initialValues.note || '' };
    }
    if (type === 'purchase') return { d: today(), s: 'Whatnot', n: '', t: '', sl: '', showId: nextShowId };
    if (type === 'sale') return { d: today(), p: 'Whatnot', n: '', g: '', netOverride: '' };
    if (type === 'supply') return { d: today(), ty: 'Bubble Mailers', q: '', t: '' };
    if (type === 'show') return { d: today(), plat: 'Whatnot', st: '19:00', dur: '', pv: '', nf: '', sh: '', note: '' };
  });

  const submit = () => {
    if (type === 'purchase') {
      if (!form.n || !form.t) return;
      onSubmit({ d: form.d, s: form.s, n: parseInt(form.n), t: parseFloat(form.t), sl: form.sl || '', showId: form.showId || null, received: editing ? (initialValues && initialValues.received !== undefined ? initialValues.received : true) : false });
    } else if (type === 'sale') {
      if (!form.n || !form.g) return;
      const gross = parseFloat(form.g);
      const fees = calcFees(form.p, gross);
      const autoNet = Math.round((gross - fees) * 100) / 100;
      const manualNet = form.netOverride !== '' ? parseFloat(form.netOverride) : null;
      const finalNet = manualNet !== null ? manualNet : autoNet;
      const finalFees = manualNet !== null ? Math.round((gross - manualNet) * 100) / 100 : Math.round(fees * 100) / 100;
      onSubmit({ d: form.d, p: form.p, n: parseInt(form.n), g: gross, f: finalFees, net: finalNet });
    } else if (type === 'supply') {
      if (!form.q || !form.t) return;
      onSubmit({ d: form.d, ty: form.ty, q: parseFloat(form.q), t: parseFloat(form.t) });
    } else if (type === 'show') {
      if (!form.d) return;
      onSubmit({ d: form.d, plat: form.plat, st: form.st, dur: form.dur ? parseInt(form.dur) : 0,
        pv: form.pv ? parseInt(form.pv) : 0, nf: form.nf ? parseInt(form.nf) : 0,
        sh: form.sh ? parseInt(form.sh) : 0, note: form.note || '' });
    }
    if (editing) return;
    if (type === 'purchase') setForm({ d: today(), s: 'Whatnot', n: '', t: '', sl: '', showId: nextShowId });
    else if (type === 'sale') setForm({ d: today(), p: 'Whatnot', n: '', g: '', netOverride: '' });
    else if (type === 'supply') setForm({ d: today(), ty: 'Bubble Mailers', q: '', t: '' });
    else if (type === 'show') setForm({ d: today(), plat: 'Whatnot', st: '19:00', dur: '', pv: '', nf: '', sh: '', note: '' });
  };

  const fields = type === 'purchase' ? (
    <>
      <FormField label="Date"><input type="date" value={form.d} onChange={e => setForm({...form, d: e.target.value})} style={inputStyle} /></FormField>
      <FormField label="Source"><select value={form.s} onChange={e => setForm({...form, s: e.target.value})} style={selectStyle}>{SOURCES.map(s => <option key={s} value={s}>{s}</option>)}</select></FormField>
      <FormField label="Seller"><input type="text" value={form.sl} onChange={e => setForm({...form, sl: e.target.value})} placeholder="username / name" style={inputStyle} /></FormField>
      <FormField label="Destination">
        <select value={form.showId} onChange={e => setForm({...form, showId: e.target.value})} style={{...selectStyle, borderColor: form.showId ? C.cyan : C.navyMid}}>
          <option value="">— None / Inventory —</option>
          <ShowAndChannelOptions shows={shows} />
        </select>
      </FormField>
      <FormField label="# Cards"><input type="number" value={form.n} onChange={e => setForm({...form, n: e.target.value})} placeholder="0" style={inputStyle} /></FormField>
      <FormField label="Total $"><input type="number" step="0.01" value={form.t} onChange={e => setForm({...form, t: e.target.value})} placeholder="0.00" style={inputStyle} /></FormField>
    </>
  ) : type === 'sale' ? (
    <>
      <FormField label="Date"><input type="date" value={form.d} onChange={e => setForm({...form, d: e.target.value})} style={inputStyle} /></FormField>
      <FormField label="Platform"><select value={form.p} onChange={e => setForm({...form, p: e.target.value})} style={selectStyle}>{PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}</select></FormField>
      <FormField label="# Sold"><input type="number" value={form.n} onChange={e => setForm({...form, n: e.target.value})} placeholder="0" style={inputStyle} /></FormField>
      <FormField label="Gross $"><input type="number" step="0.01" value={form.g} onChange={e => setForm({...form, g: e.target.value})} placeholder="0.00" style={inputStyle} /></FormField>
      <FormField label="Net $ (override)"><input type="number" step="0.01" value={form.netOverride} onChange={e => setForm({...form, netOverride: e.target.value})} placeholder="Auto-calc" style={{...inputStyle, borderColor: form.netOverride ? C.cyan : C.navyMid}} /></FormField>
    </>
  ) : type === 'supply' ? (
    <>
      <FormField label="Date"><input type="date" value={form.d} onChange={e => setForm({...form, d: e.target.value})} style={inputStyle} /></FormField>
      <FormField label="Type"><select value={form.ty} onChange={e => setForm({...form, ty: e.target.value})} style={selectStyle}>{SUPPLY_TYPES.map(s => <option key={s} value={s}>{s}</option>)}</select></FormField>
      <FormField label="Qty"><input type="number" value={form.q} onChange={e => setForm({...form, q: e.target.value})} placeholder="0" style={inputStyle} /></FormField>
      <FormField label="Total $"><input type="number" step="0.01" value={form.t} onChange={e => setForm({...form, t: e.target.value})} placeholder="0.00" style={inputStyle} /></FormField>
    </>
  ) : (
    <>
      <FormField label="Show Date"><input type="date" value={form.d} onChange={e => setForm({...form, d: e.target.value})} style={inputStyle} /></FormField>
      <FormField label="Platform"><select value={form.plat} onChange={e => setForm({...form, plat: e.target.value})} style={selectStyle}>{['Whatnot','eBay Live','TikTok','Other'].map(p => <option key={p} value={p}>{p}</option>)}</select></FormField>

      <FormField label="Duration (min)"><input type="number" value={form.dur} onChange={e => setForm({...form, dur: e.target.value})} placeholder="optional" style={inputStyle} /></FormField>
      <FormField label="Peak Viewers"><input type="number" value={form.pv} onChange={e => setForm({...form, pv: e.target.value})} placeholder="0" style={inputStyle} /></FormField>
      <FormField label="New Follows"><input type="number" value={form.nf} onChange={e => setForm({...form, nf: e.target.value})} placeholder="0" style={inputStyle} /></FormField>
      <FormField label="Total Followers"><input type="number" value={form.tf||''} onChange={e => setForm({...form, tf: e.target.value})} placeholder="after show" style={inputStyle} /></FormField>
    </>
  );

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 12, alignItems: 'end' }}>
      {fields}
      <div><button onClick={submit} style={btnStyle()}><PlusCircle size={14} /> {editing ? 'Save' : 'Add'}</button></div>
    </div>
  );
}

function DataTable({ data, columns, onEdit, onDelete }) {
  const [sortCol, setSortCol] = useState(0);

  const [hoverRow, setHoverRow] = useState(null);
  const sorted = useMemo(() => {
    const col = columns[sortCol];
    return [...data].map((row, i) => ({ ...row, _rk: row._rk != null ? row._rk : i })).sort((a, b) => {
      const va = col.accessor(a), vb = col.accessor(b);
      const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [data, sortCol, sortDir, columns]);

  const numericCols = columns.map(col => { try { const v = data.length ? col.accessor(data[0]) : null; return typeof v === 'number'; } catch { return false; } });

  return (
    <>
    {data.length === 0 ? (

      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
        <thead>
          <tr>
            {columns.map((col, i) => (
              <th key={i} onClick={() => { if (sortCol === i) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(i); setSortDir('desc'); }}}
                style={{ padding: '11px 14px', textAlign: numericCols[i] ? 'right' : 'left', color: C.slate, fontWeight: 600, fontSize: 12, cursor: 'pointer', background: C.navyLight, borderBottom: `1px solid rgba(0,0,0,0.06)`, whiteSpace: 'nowrap' }}>
                {col.header}
              </th>
            ))}
            {onEdit && <th style={{ padding: '11px 8px', background: C.navyLight, borderBottom: `1px solid rgba(0,0,0,0.06)`, width: 40 }} />}
            {onDelete && <th style={{ padding: '11px 8px', background: C.navyLight, borderBottom: `1px solid rgba(0,0,0,0.06)`, width: 40 }} />}
          </tr>
        </thead>
        <tbody>{sorted.map((row, i) => {
          const isHover = hoverRow === i;
          const zebraBase = i % 2 === 0 ? C.navyLight : C.navy;
          const rowBg = isHover ? `${C.cyan}1f` : zebraBase;
          return (
          <tr key={i}
            onMouseEnter={() => setHoverRow(i)}
            onMouseLeave={() => setHoverRow(null)}
            onClick={() => onEdit && onEdit(row)}
            style={{ borderBottom: `1px solid rgba(0,0,0,0.06)`, background: rowBg, cursor: onEdit ? 'pointer' : 'default', transition: 'background 0.1s' }}>
            {columns.map((col, j) => (
              <td key={j} style={{ padding: '10px 14px', textAlign: numericCols[j] ? 'right' : 'left', color: col.color || C.white, whiteSpace: 'nowrap', fontSize: 13 }}>
                {col.render ? col.render(col.accessor(row), row) : col.accessor(row)}
              </td>
            ))}
            {onEdit && <td style={{ padding: '4px 8px', textAlign: 'center' }}>
              <button onClick={e => { e.stopPropagation(); onEdit(row); }} style={{ background: 'transparent', border: 'none', color: isHover ? C.cyan : C.slateDim, cursor: 'pointer', padding: '2px 6px', transition: 'color 0.1s' }}>
                <Edit3 size={13} />
              </button>
            </td>}
            {onDelete && <td style={{ padding: '4px 8px', textAlign: 'center' }}>
              {confirmKey === row._rk ? (
                <div style={{ display: 'flex', gap: 4 }}>
                  <button onClick={e => { e.stopPropagation(); onDelete(row); setConfirmKey(null); }}
                    style={{ background: C.orange, border: 'none', borderRadius: 4, padding: '2px 8px', color: '#fff', fontSize: 10, cursor: 'pointer', fontWeight: 700 }}>DEL</button>
                  <button onClick={e => { e.stopPropagation(); setConfirmKey(null); }}
                    style={{ background: 'transparent', border: `1px solid ${C.slateDim}`, borderRadius: 4, padding: '2px 6px', color: C.slateDim, fontSize: 10, cursor: 'pointer' }}>✕</button>
                </div>
              ) : (
                <button onClick={e => { e.stopPropagation(); setConfirmKey(row._rk); }} style={{ background: 'transparent', border: 'none', color: C.slateDim, cursor: 'pointer', padding: '2px 6px' }}>
                  <X size={12} />
                </button>
              )}
            </td>}
          </tr>
          );
        })}</tbody>
      </table>
      {data.length > 50 && <div style={{ padding: 8, textAlign: 'center', color: C.slateDim, fontSize: 11 }}>{data.length} rows total</div>}
    </div>
    )}

  );

const TIER_META = {

const tierOf = (avg) => (avg <= 8 ? 'opener' : avg <= 14 ? 'core' : 'premium');

// ---- Buying pipeline: Pending receipt → In hand (Hold) → Assigned ----------
function BuyingPipeline({ data, enrichedShows, openSlide }) {
  const purchases = data.purchases || [];
  const todayStr = new Date().toISOString().split('T')[0];
  const upcoming = (enrichedShows || []).filter(s => s.d >= todayStr).sort((a, b) => a.d.localeCompare(b.d));
  const [assignId, setAssignId] = React.useState(upcoming[0]?.id || '');
  const trackingStart = (data.baseline && data.baseline.trackingStart) || '';
  const [showLegacy, setShowLegacy] = React.useState(false);
  const [csEdit, setCsEdit] = React.useState(false);
  const [csDraft, setCsDraft] = React.useState(trackingStart || '2026-04-11');

  // Index purchases so we can act on the exact record.
  const allIdx = purchases.map((p, i) => ({ ...p, _rk: i }));
  // PHASE: hide pre-tracking bulk buys (before seller/cost tracking began) from the
  // actionable pipeline — they're historical sold-through stock, not cards in hand.
  const cutoff = (!showLegacy && trackingStart) ? trackingStart : '';
  const idx = cutoff ? allIdx.filter(p => p.d >= cutoff) : allIdx;
  const hiddenArr = cutoff ? allIdx.filter(p => p.d < cutoff) : [];
  const hiddenCards = hiddenArr.reduce((s, p) => s + (p.n || 0), 0);
  const pending  = idx.filter(p => p.received === false);
  const inHand   = idx.filter(p => p.received !== false && (!p.showId || p.showId === '__hold'));
  const assigned = idx.filter(p => p.received !== false && p.showId && p.showId !== '__hold' && p.showId !== '__legacy');
  const legacy   = allIdx.filter(p => p.showId === '__legacy'); // archived, ignores cutoff

  const sum = (arr) => ({ cards: arr.reduce((s, p) => s + (p.n || 0), 0), cost: arr.reduce((s, p) => s + (p.t || 0), 0) });
  const sP = sum(pending), sH = sum(inHand), sA = sum(assigned), sL = sum(legacy);

  const markReceived = (p) => data.updatePurchase(p, { ...p, received: true });
  const assignToShow = (p, showId) => data.attributePurchase(p, showId);
  const removeCard = (p) => { if (typeof window !== 'undefined' && window.confirm(`Remove this ${p.sl || p.s} purchase (${fmt(p.t)})? This deletes the record permanently.`)) data.deletePurchase(p); };
  const [expanded, setExpanded] = React.useState({});

  const destChip = (showId) => {
    if (!showId || showId === '__hold') return null;
    if (showId.startsWith('__')) { const d = findDest(showId); return d ? d.label : showId; }
    const sh = (enrichedShows || []).find(s => s.id === showId);
    return sh ? `🎥 ${new Date(sh.d + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}` : '🎥 Show';
  };

  const Card = ({ p, children }) => (
    <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: '10px 12px', marginBottom: 8, boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8 }}>
        <div style={{ fontSize: 12.5, fontWeight: 600, color: C.white, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.sl || p.s || 'Unknown seller'}</div>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.white, whiteSpace: 'nowrap' }}>{fmt(p.t)}</div>
      </div>
      <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 2 }}>{p.d} · {p.n} card{p.n === 1 ? '' : 's'} · {p.s}</div>
      {children}
    </div>
  );

  const Column = ({ title, color, icon: Icon, count, cost, children, empty }) => (
    <div style={{ flex: 1, minWidth: 260, background: C.bg, borderRadius: 14, border: '1px solid rgba(0,0,0,0.06)', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '12px 14px', borderBottom: '1px solid rgba(0,0,0,0.06)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 52, background: C.bg, borderRadius: '14px 14px 0 0', zIndex: 2 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon size={15} color={color} />
          <span style={{ fontSize: 12.5, fontWeight: 700, color: C.white, textTransform: 'uppercase', letterSpacing: '0.03em', fontFamily: "'Oswald', sans-serif" }}>{title}</span>
          <span style={{ background: `${color}1f`, color, borderRadius: 980, padding: '1px 8px', fontSize: 11, fontWeight: 700 }}>{count}</span>
        </div>
        <span style={{ fontSize: 11, color: C.slateDim, fontWeight: 600 }}>{fmt(cost)}</span>
      </div>
      <div style={{ padding: 12, overflowY: 'auto', maxHeight: 620 }}>
        {children}
        {(!children || (Array.isArray(children) && children.length === 0)) && (
          <div style={{ textAlign: 'center', color: C.slateDim, fontSize: 12, padding: '28px 12px', lineHeight: 1.6 }}>{empty}</div>
        )}
      </div>
    </div>
  );

  const cap = (arr) => arr.slice(0, 80);

  return (
    <div>
      <div style={{ marginBottom: 14 }}>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 19, fontWeight: 700, color: C.white, margin: 0 }}>Buying Pipeline</h2>
        <p style={{ fontSize: 12.5, color: C.slateDim, margin: '4px 0 0' }}>Move cards left → right: mark them received, then assign in-hand stock to a show. The dollar figure on each column and group is <b style={{ color: C.slate }}>cost basis</b> — what you paid to source those cards, not their sale value.</p>
      </div>

      {/* One-click: backfill Whatnot shows + route unassigned to nearest show */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', background: `${C.cyan}0d`, border: `1px solid ${C.cyan}33`, borderRadius: 10, padding: '11px 14px', marginBottom: 12 }}>
        <Zap size={15} color={C.cyan} />
        <span style={{ fontSize: 12.5, color: C.slate, flex: 1, minWidth: 200 }}>
          {sH.cards > 0
            ? <>Route the <b style={{ color: C.white }}>{sH.cards.toLocaleString()}</b> in-hand/unassigned cards to the nearest Whatnot show by purchase date (backfills past shows from your sales).</>
            : <>Nothing unassigned — every received card is routed to a show or channel. ✓</>}
        </span>
        {sH.cards > 0 && (
          <button onClick={async () => {
              if (typeof window !== 'undefined' && !window.confirm(`Auto-attribute ~${sH.cards} unassigned cards to their nearest Whatnot show, and backfill any missing past shows from your sales? Export a backup first if you want a restore point.`)) return;
              const r = await data.autoAttribute();
              if (typeof window !== 'undefined') window.alert(`Done — routed ${r.moved} cards to shows${r.backfilled ? ` and backfilled ${r.backfilled} past shows` : ''}.`);
            }}
            style={{ background: '#1d1d1f', color: '#fff', border: 'none', borderRadius: 980, padding: '8px 16px', fontSize: 12, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}>
            <Zap size={13} /> Auto-attribute
          </button>
        )}
        {trackingStart && (
          <button onClick={async () => {
              if (typeof window !== 'undefined' && !window.confirm(`Archive all buys before ${trackingStart} as Legacy (pre-tracking)? Their cost stays in lifetime P&L — they just leave the active pipeline and show pools. Export a backup first if you want a restore point.`)) return;
              const r = await data.tagLegacy(trackingStart);
              if (typeof window !== 'undefined') window.alert(`Archived ${r.tagged} buys (${r.cards.toLocaleString()} cards · ${fmt(r.cost)}) as Legacy. They now show as their own slice in Inventory and stay in lifetime P&L.`);
            }}
            style={{ background: 'transparent', color: C.slate, border: '1px solid rgba(0,0,0,0.15)', borderRadius: 980, padding: '8px 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}>
            📚 Tag pre-{trackingStart} as Legacy
          </button>
        )}
      </div>

      {/* Tracking-start cutoff: hide pre-tracking bulk buys from the actionable pipeline */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', background: C.bg, border: '1px solid rgba(0,0,0,0.06)', borderRadius: 10, padding: '9px 13px', marginBottom: 16 }}>
        <Activity size={13} color={C.slate} />
        {!csEdit ? (
          <>
            <span style={{ fontSize: 12, color: C.slate }}>
              {trackingStart
                ? <>Showing buys from <b style={{ color: C.white }}>{trackingStart}</b> onward{(!showLegacy && hiddenCards > 0) ? <> · <b style={{ color: C.white }}>{hiddenCards.toLocaleString()}</b> pre-tracking cards hidden</> : ''}</>
                : <>No tracking-start date set — showing all buys</>}
            </span>
            {trackingStart && hiddenCards > 0 && (
              <button onClick={() => setShowLegacy(s => !s)} style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '4px 11px', fontSize: 11, fontWeight: 600, color: C.slate, cursor: 'pointer' }}>{showLegacy ? 'Hide legacy' : 'Show all'}</button>
            )}
            <button onClick={() => { setCsDraft(trackingStart || '2026-04-11'); setCsEdit(true); }} style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '4px 11px', fontSize: 11, fontWeight: 600, color: C.slate, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}><Edit3 size={11} /> {trackingStart ? 'Change' : 'Set date'}</button>
          </>
        ) : (
          <>
            <span style={{ fontSize: 12, color: C.slateDim }}>Tracking starts</span>
            <input type="date" value={csDraft} onChange={e => setCsDraft(e.target.value)} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.18)', borderRadius: 8, padding: '5px 8px', fontSize: 12, color: C.white }} />
            <button onClick={async () => { await data.saveBaseline({ ...(data.baseline || {}), trackingStart: csDraft }); setCsEdit(false); }} style={{ background: C.green, border: 'none', borderRadius: 980, padding: '5px 12px', fontSize: 11, fontWeight: 700, color: '#fff', cursor: 'pointer' }}>Save</button>
            <button onClick={async () => { await data.saveBaseline({ ...(data.baseline || {}), trackingStart: '' }); setCsEdit(false); }} style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '5px 10px', fontSize: 11, color: C.slate, cursor: 'pointer' }}>Clear</button>
            <button onClick={() => setCsEdit(false)} style={{ background: 'transparent', border: 'none', padding: '5px 8px', fontSize: 11, color: C.slateDim, cursor: 'pointer' }}>Cancel</button>
          </>
        )}
      </div>
      <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start', flexWrap: 'wrap' }}>
        <Column title="Pending Receipt" color={C.orange} icon={ShoppingCart} count={sP.cards} cost={sP.cost}
          empty="Nothing in transit. Everything you've bought is in hand. ✓">
          {pending.length > 0 && (() => {
            // V9: group by seller — one-tap "receive all" per group.
            const groups = {};
            pending.forEach(p => { const k = p.sl || p.s || '?'; (groups[k] = groups[k] || []).push(p); });
            const ordered = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
            return ordered.map(([sl, items]) => (
              <div key={sl} style={{ marginBottom: 10 }}>
                {items.length > 1 && (
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 2px 6px' }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: C.slate, textTransform: 'uppercase', letterSpacing: '0.02em' }}>{sl} · {items.length}</span>
                    <button onClick={() => data.bulkUpdatePurchases(items.map(p => ({ oldItem: p, newItem: { ...p, received: true } })))}
                      style={{ background: `${C.green}14`, border: `1px solid ${C.green}44`, borderRadius: 980, padding: '3px 10px', fontSize: 10.5, fontWeight: 700, color: C.green, cursor: 'pointer' }}>✓ Receive all {items.length}</button>
                  </div>
                )}
                {items.slice(0, 40).map(p => (
                  <Card key={p._rk} p={p}>
                    <button onClick={() => markReceived(p)}
                      style={{ marginTop: 8, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, background: C.green, color: '#fff', border: 'none', borderRadius: 8, padding: '7px 10px', fontSize: 11.5, fontWeight: 700, cursor: 'pointer' }}>
                      <Check size={13} /> Mark received →
                    </button>
                  </Card>
                ))}
              </div>
            ));
          })()}
        </Column>

        <Column title="In Hand · Hold" color={C.blue} icon={Package} count={sH.cards} cost={sH.cost}
          empty="No unassigned stock. Everything in hand is routed to a show or channel.">
          {inHand.length > 0 && cap(inHand).map(p => (
            <Card key={p._rk} p={p}>
              <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                <select value="" onChange={e => { if (e.target.value) assignToShow(p, e.target.value); }}
                  style={{ flex: 1, background: '#fff', border: '1px solid rgba(0,0,0,0.15)', borderRadius: 8, padding: '6px 8px', fontSize: 11, color: C.white, cursor: 'pointer' }}>
                  <option value="">→ Assign to…</option>
                  {upcoming.map(s => <option key={s.id} value={s.id}>🎥 {s.d} {s.plat}</option>)}
                  {DEST_OPTS.filter(d => d.v !== '__hold').map(d => <option key={d.v} value={d.v}>{d.label}</option>)}
                </select>
                <button onClick={() => removeCard(p)} title="Remove (sold / mistake)"
                  style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 8, padding: '6px 9px', fontSize: 11, color: C.crimson, cursor: 'pointer' }}>✕</button>
              </div>
            </Card>
          ))}
          {inHand.length > 80 && <div style={{ textAlign:'center', fontSize:11, color:C.slateDim, padding:8 }}>+{inHand.length - 80} more</div>}
        </Column>

        <Column title="Assigned" color={C.green} icon={ArrowRight} count={sA.cards} cost={sA.cost}
          empty="Nothing assigned yet. Route in-hand cards to a show or channel.">
          {assigned.length > 0 && (() => {
            // Group assigned cards by destination (show or sell-channel) — summary first, drill down on tap.
            const groups = {};
            assigned.forEach(p => {
              const k = p.showId;
              if (!groups[k]) groups[k] = { key: k, items: [], cards: 0, cost: 0 };
              groups[k].items.push(p); groups[k].cards += (p.n || 0); groups[k].cost += (p.t || 0);
            });
            const sh = (id) => (enrichedShows || []).find(s => s.id === id);
            const list = Object.values(groups).map(g => ({
              ...g,
              label: destChip(g.key) || g.key,
              avg: g.cards > 0 ? g.cost / g.cards : 0,
              sortKey: sh(g.key)?.d || g.key,
            })).sort((a, b) => (a.sortKey < b.sortKey ? 1 : -1));
            return list.map(g => (
              <div key={g.key} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, marginBottom: 8, overflow: 'hidden', boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }}>
                <button onClick={() => setExpanded(e => ({ ...e, [g.key]: !e[g.key] }))}
                  style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, background: 'transparent', border: 'none', cursor: 'pointer', padding: '11px 12px', textAlign: 'left' }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.white, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{g.label}</div>
                    <div style={{ fontSize: 10.5, color: C.slateDim, marginTop: 2 }}>{g.cards} card{g.cards === 1 ? '' : 's'} · {fmt(g.avg)}/card avg</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: C.white }}>{fmt(g.cost)}</span>
                    <ChevronRight size={15} color={C.slateDim} style={{ transform: expanded[g.key] ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }} />
                  </div>
                </button>
                {expanded[g.key] && (
                  <div style={{ borderTop: '1px solid rgba(0,0,0,0.06)', padding: '6px 8px', background: C.bg }}>
                    {g.items.slice(0, 60).map(p => (
                      <div key={p._rk} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, padding: '6px 6px' }}>
                        <div style={{ minWidth: 0 }}>
                          <span style={{ fontSize: 12, color: C.white, fontWeight: 600 }}>{p.sl || p.s}</span>
                          <span style={{ fontSize: 10.5, color: C.slateDim, marginLeft: 6 }}>{p.d} · {p.n}c · {fmt(p.t)}</span>
                        </div>
                        <div style={{ display: 'flex', gap: 5, flexShrink: 0 }}>
                          <button onClick={() => assignToShow(p, '__hold')} title="Send back to Hold"
                            style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 7, padding: '3px 7px', fontSize: 10, color: C.slate, cursor: 'pointer' }}>↩ Hold</button>
                          <button onClick={() => removeCard(p)} title="Remove record"
                            style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 7, padding: '3px 7px', fontSize: 10, color: C.crimson, cursor: 'pointer' }}>✕</button>
                        </div>
                      </div>
                    ))}
                    {g.items.length > 60 && <div style={{ textAlign: 'center', fontSize: 10.5, color: C.slateDim, padding: 6 }}>+{g.items.length - 60} more in this group</div>}
                  </div>
                )}
              </div>
            ));
          })()}
        </Column>
      </div>

      {/* Legacy archive — pre-tracking cost, kept out of the active board */}
      {sL.cards > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', background: C.bg, border: '1px dashed rgba(0,0,0,0.15)', borderRadius: 12, padding: '12px 16px', marginTop: 14 }}>
          <span style={{ fontSize: 18 }}>📚</span>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: C.white, fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase', letterSpacing: '0.03em' }}>Legacy Archive · {sL.cards.toLocaleString()} cards · {fmt(sL.cost)}</div>
            <div style={{ fontSize: 11, color: C.slateDim, marginTop: 2 }}>Pre-tracking buys — counted in lifetime cash P&amp;L only. Shown as their own slice on the Inventory screen.</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- Inventory screen: real cards in hand, value, tier mix, by destination -
function InventoryScreen({ inv, baseline, saveBaseline, stats, purchases, basisPL, plBasis, savePlBasis, setArea }) {
  const [blEdit, setBlEdit] = React.useState(false);
  const [blDraft, setBlDraft] = React.useState({ count: '', date: '' });
  const [opEdit, setOpEdit] = React.useState(false);
  const [opDraft, setOpDraft] = React.useState({ units: '', cost: '' });
  // Reconciliation gap: cards sold but never logged as a purchase (pre-tracking pulls/breaks).
  const gap = Math.max(0, (inv.soldAllTime || 0) - (inv.totalRecvCards || 0));
  const legacyTot = (purchases || []).filter(p => p.showId === '__legacy')
    .reduce((a, p) => ({ units: a.units + (p.n || 0), cost: a.cost + (p.t || 0) }), { units: 0, cost: 0 });

  // Tier mix from received inventory (per-card avg cost).
  const tierMix = React.useMemo(() => {
    const m = { opener: { cards: 0, cost: 0 }, core: { cards: 0, cost: 0 }, premium: { cards: 0, cost: 0 } };
    const legacy = { cards: 0, cost: 0 };
    (purchases || []).filter(p => p.received !== false).forEach(p => {
      // Match the destination breakdown: legacy + never-assigned are sold-through, not active inventory.
      if (!p.showId || p.showId === '__legacy') { legacy.cards += (p.n || 0); legacy.cost += (p.t || 0); return; }
      const avg = p.n > 0 ? p.t / p.n : p.t;
      const t = tierOf(avg);
      m[t].cards += (p.n || 0); m[t].cost += (p.t || 0);
    });
    const total = m.opener.cards + m.core.cards + m.premium.cards;
    return { m, total, legacy };
  }, [purchases]);

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 16, flexWrap: 'wrap', gap: 10 }}>
        <div>
          <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 22, fontWeight: 700, color: C.white, margin: 0 }}>Inventory</h2>
          <p style={{ fontSize: 12.5, color: C.slateDim, margin: '4px 0 0' }}>What you're holding, what it's worth, and where it's headed.</p>
        </div>
        {!blEdit ? (
          <button onClick={() => { setBlDraft({ count: String(inv.blCount), date: inv.blDate }); setBlEdit(true); }}
            style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'rgba(0,0,0,0.04)', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '7px 14px', color: C.slate, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
            <Edit3 size={13} /> Set physical count
          </button>
        ) : (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, color: C.slateDim }}>Counted</span>
            <input type="number" value={blDraft.count} onChange={e => setBlDraft(d => ({ ...d, count: e.target.value }))} placeholder="0" style={{ width: 80, background: '#fff', border: '1px solid rgba(0,0,0,0.18)', borderRadius: 8, padding: '6px 8px', fontSize: 12, color: C.white }} />
            <span style={{ fontSize: 11, color: C.slateDim }}>as of</span>
            <input type="date" value={blDraft.date} onChange={e => setBlDraft(d => ({ ...d, date: e.target.value }))} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.18)', borderRadius: 8, padding: '6px 8px', fontSize: 12, color: C.white }} />
            <button onClick={async () => { await saveBaseline({ ...baseline, count: Number(blDraft.count) || 0, date: blDraft.date || inv.blDate }); setBlEdit(false); }} style={{ background: C.green, border: 'none', borderRadius: 980, padding: '7px 14px', color: '#fff', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>Save</button>
            <button onClick={() => setBlEdit(false)} style={{ background: 'transparent', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 980, padding: '7px 12px', color: C.slate, fontSize: 12, cursor: 'pointer' }}>Cancel</button>
          </div>
        )}
      </div>

      {/* Big tiles */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
        <div className="vvc-card" style={{ background: C.navyLight, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 16, padding: 18 }}>
          <div style={{ fontSize: 11, color: C.slateDim, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Cards in Hand</div>
          <div style={{ fontSize: 38, fontWeight: 700, color: C.white, lineHeight: 1.05, marginTop: 4 }}>{inv.inHandCount.toLocaleString()}</div>
          <div style={{ fontSize: 11, color: C.slateDim, marginTop: 6 }}>{inv.blCount.toLocaleString()} baseline + {inv.recvAfter.toLocaleString()} recv − {inv.soldAfter.toLocaleString()} sold</div>
        </div>
        <div className="vvc-card" style={{ background: C.navyLight, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 16, padding: 18 }}>
          <div style={{ fontSize: 11, color: C.slateDim, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Inventory Value</div>
          <div style={{ fontSize: 38, fontWeight: 700, color: C.cyan, lineHeight: 1.05, marginTop: 4 }}>{fmtShort(inv.inHandValue)}</div>
          <div style={{ fontSize: 11, color: C.slateDim, marginTop: 6 }}>@ {fmt(inv.avgCost)}/card weighted avg</div>
        </div>
        <div className="vvc-card" style={{ background: C.navyLight, border: '1px solid rgba(0,0,0,0.08)', borderRadius: 16, padding: 18 }}>
          <div style={{ fontSize: 11, color: C.slateDim, textTransform: 'uppercase', letterSpacing: '0.04em' }}>In Transit</div>
          <div style={{ fontSize: 38, fontWeight: 700, color: inv.pendingCards > 0 ? C.orange : C.slate, lineHeight: 1.05, marginTop: 4 }}>{inv.pendingCards.toLocaleString()}</div>
          <div style={{ fontSize: 11, color: C.slateDim, marginTop: 6 }}>{fmt(inv.pendingCost)} committed, not received</div>
        </div>
